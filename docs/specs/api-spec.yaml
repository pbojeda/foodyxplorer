                  value:
                    success: false
                    error:
                      message: "OPENAI_API_KEY is not configured"
                      code: "EMBEDDING_PROVIDER_UNAVAILABLE"
        '401':
          description: Missing or invalid admin API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Admin API key required"
                  code: "UNAUTHORIZED"
        '500':
