                            nutrients:
                              calories: 550
                              proteins: 25
                              carbohydrates: 46
                              sugars: 9
                              fats: 28
                              saturatedFats: 10
                              fiber: 3
                              salt: 2.2
                              sodium: 880
                              transFats: 0.5
                              cholesterol: 80
                              potassium: 0
                              monounsaturatedFats: 0
                              polyunsaturatedFats: 0
                              alcohol: 0
                              referenceBasis: "per_serving"
