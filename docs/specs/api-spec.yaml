                      intent: comparison
                      actorId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      comparison:
                        dishA:
                          query: "big mac"
                          chainSlug: null
                          portionMultiplier: 1.0
                          level1Hit: true
                          level2Hit: false
