                          sugars: 9
                          fats: 28
                          saturatedFats: 10
                          fiber: 3
                          salt: 2.2
                          sodium: 880
                          transFats: 0.5
                          cholesterol: 80
                          potassium: 0
                          monounsaturatedFats: 0
                          polyunsaturatedFats: 0
                          alcohol: 0
                          referenceBasis: "per_serving"
                        confidenceLevel: "high"
                        estimationMethod: "official"
                        source:
                          id: "uuid-of-source"
                          name: "McDonald's Spain Official PDF"
                          type: "official"
                          url: "https://www.mcdonalds.es/.../nutritional.pdf"
                      cachedAt: null
                ftsFoodHit:
                  summary: FTS food match — USDA generic food fallback (Level 1 hit)
                  value:
                    success: true
                    data:
                      query: "pollo"
                      chainSlug: null
                      portionMultiplier: 1.0
                      level1Hit: true
                      level2Hit: false
                      level3Hit: false
                      level4Hit: false
                      matchType: "fts_food"
                      result:
                        entityType: "food"
