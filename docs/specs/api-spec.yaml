                            level4Hit: false
                            matchType: ingredient_dish_fts
                            result:
                              entityId: "uuid-of-dish"
                              entityType: dish
                              name: "Caesar salad with chicken"
                              nameEs: "Ensalada César con pollo"
                              restaurantId: null
                              chainSlug: null
                              portionGrams: 350
                              nutrients:
                                calories: 320
                                proteins: 28
                                carbohydrates: 12
                                fats: 18
                                saturatedFats: 4
                                sugars: 3
                                fiber: 2
                                salt: 1.1
                                sodium: 440
                                transFats: 0
                                cholesterol: 72
                                potassium: 0
                                monounsaturatedFats: 0
                                polyunsaturatedFats: 0
                                alcohol: 0
                                referenceBasis: per_serving
                              confidenceLevel: medium
                              estimationMethod: ingredients
                              source:
                                id: "uuid-of-source"
                                name: "Computed from ingredients"
                                url: null
                                type: estimated
                              similarityDistance: null
                            cachedAt: null
        '400':
          description: Validation error — missing file, unsupported mode value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFile:
                  summary: No file part in multipart body
                  value:
                    success: false
                    error:
                      message: "No file uploaded"
                      code: VALIDATION_ERROR
                invalidMode:
                  summary: Unknown mode value
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: VALIDATION_ERROR
                      details:
                        - path: ["mode"]
                          message: "Invalid enum value. Expected 'auto' | 'ocr' | 'vision' | 'identify'"
                          code: invalid_enum_value
        '401':
          description: Missing or invalid API key (anonymous requests not permitted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "API key required"
                  code: UNAUTHORIZED
        '413':
          description: Uploaded file exceeds the 10 MB size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "File size exceeds the 10 MB limit"
                  code: FST_REQ_FILE_TOO_LARGE
        '422':
          description: |
            Analysis failed. Sub-cases:
            - `INVALID_IMAGE`: file is not a supported type (not JPEG/PNG/WebP/PDF), or
              the detected MIME type (from magic bytes) does not match a supported type.
            - `OCR_FAILED`: OCR pipeline produced zero lines or only whitespace lines
              (applies to `ocr` mode and to the OCR fallback path in `vision`/`identify`
              mode).
            - `MENU_ANALYSIS_FAILED`: Both the Vision API call AND the OCR fallback
              produced fewer than 3 meaningful dish name candidates. Nothing to estimate.
            - `VISION_API_UNAVAILABLE`: `OPENAI_API_KEY` is not configured and the
              requested mode requires the Vision API (`vision` or `identify`), or `auto`
              was selected with an image file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidImage:
                  summary: Unsupported file type
                  value:
                    success: false
                    error:
                      message: "Uploaded file is not a supported type (JPEG, PNG, WebP, or PDF)"
                      code: INVALID_IMAGE
                ocrFailed:
                  summary: OCR produced no output
                  value:
                    success: false
                    error:
                      message: "OCR extraction produced no readable text"
                      code: OCR_FAILED
                menuAnalysisFailed:
                  summary: Vision API + OCR fallback both produced < 3 dish names
                  value:
                    success: false
                    error:
                      message: "Could not extract dish names from the provided file"
                      code: MENU_ANALYSIS_FAILED
                visionApiUnavailable:
                  summary: OPENAI_API_KEY not configured
                  value:
                    success: false
                    error:
                      message: "Vision API is not configured. Use mode=ocr or provide OPENAI_API_KEY."
                      code: VISION_API_UNAVAILABLE
        '429':
          description: |
            Rate limit exceeded. Either the standard tier limit or the analysis-specific
            limit of 10 requests per hour per key has been reached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Rate limit exceeded. Menu analysis is limited to 10 requests per hour per key."
                  code: RATE_LIMIT_EXCEEDED
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # Conversation Core (F070)
  # ---------------------------------------------------------------------------

  /conversation/message:
    post:
      tags: [Conversation]
      operationId: processConversationMessage
      summary: Process a natural language message and return structured intent + data
      description: |
        Accepts plain-text natural language input from any adapter (Telegram bot, future
        web client). Detects intent, extracts entities, resolves chain context, runs the
        estimation cascade, and returns a structured JSON response. Never returns formatted
        text — formatting is the adapter's responsibility ("backend calcula, frontend explica").

        **Intent resolution pipeline (in priority order):**
        1. Length guard: text > 500 chars → `error` intent with code `TEXT_TOO_LONG`.
        2. Context-set detection: "estoy en <chain>" → chain resolution via DB, write
           `conv:ctx:{actorId}` to Redis (TTL 2h), return `context_set` intent.
        3. Comparison detection: "big mac vs whopper" pattern → two parallel estimation
           cascade calls, return `comparison` intent with both EstimateData objects.
        4. Single-dish estimation: extract query + portion modifier, apply fallback chain
           context from Redis, run estimation cascade, return `estimation` intent.

        **Context management:** Conversational context (active chain) is stored in Redis
        under key `conv:ctx:{actorId}` (TTL 7200s). Fail-open: Redis errors are treated as
        absent context. Context is shared across channels for the same actor (bot + web
        continuity). The `activeContext` field in the response always echoes the current
        context (null if none) so adapters can display it without a separate lookup.

        **Actor identification:** Uses the `X-Actor-Id` header resolved by the F069
        actor middleware (`request.actorId`). Anonymous actors are auto-created. Per-actor
        daily rate limit applies (50 queries/day, 429 when exceeded).

        **Estimation:** Internally calls `runEstimationCascade` (F023) + `detectExplicitBrand`
        (F068) + Redis cache (same key scheme as GET /estimate: `fxp:estimate:<query>:<chainSlug>:<restaurantId>:<multiplier>`).
        Query logging (query_logs) is recorded fire-and-forget after the response is sent.

        **ADR-001 compliance:** No LLM is used to calculate nutritional values. The LLM
        is only invoked at Level 4 to identify/match food entities (same as GET /estimate).
      parameters:
        - $ref: '#/components/parameters/XActorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationMessageBody'
            examples:
              estimationSimple:
                summary: Simple single-dish query
                value:
                  text: "big mac"
              estimationWithContext:
                summary: Dish query with implicit active context
                value:
                  text: "cuántas calorías tiene el big mac"
              contextSet:
                summary: Set chain context
                value:
                  text: "estoy en mcdonalds"
              comparison:
                summary: Comparison query
                value:
                  text: "qué tiene más proteínas, big mac o whopper"
      responses:
        '200':
          description: |
            Message processed successfully. The `intent` field identifies the response
            type; only the corresponding data field is populated.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/ConversationMessageResponse'
              examples:
                estimation:
                  summary: intent=estimation — single dish resolved
                  value:
                    success: true
                    data:
                      intent: estimation
                      actorId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      estimation:
                        query: "big mac"
                        chainSlug: "mcdonalds-es"
                        portionMultiplier: 1.0
                        level1Hit: true
                        level2Hit: false
                        level3Hit: false
                        level4Hit: false
                        matchType: "exact_dish"
                        result:
                          entityType: "dish"
                          entityId: "uuid-of-dish"
                          name: "Big Mac"
                          nameEs: "Big Mac"
                          restaurantId: "uuid-of-restaurant"
                          chainSlug: "mcdonalds-es"
                          portionGrams: 200
                          nutrients:
                            calories: 550
                            proteins: 25
                            carbohydrates: 46
                            sugars: 9
                            fats: 28
                            saturatedFats: 10
                            fiber: 3
                            salt: 2.2
                            sodium: 880
                            transFats: 0.5
                            cholesterol: 80
                            potassium: 0
                            monounsaturatedFats: 0
                            polyunsaturatedFats: 0
                            alcohol: 0
                            referenceBasis: "per_serving"
                          confidenceLevel: "high"
                          estimationMethod: "official"
                          source:
                            id: "00000000-0000-0000-0000-000000000001"
                            name: "McDonald's Spain Official PDF"
                            type: "official_pdf"
                            url: null
                          similarityDistance: null
                        cachedAt: null
                      activeContext:
                        chainSlug: "mcdonalds-es"
                        chainName: "McDonald's"
                contextSet:
                  summary: intent=context_set — chain context written to Redis
                  value:
                    success: true
                    data:
                      intent: context_set
                      actorId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      contextSet:
                        chainSlug: "mcdonalds-es"
                        chainName: "McDonald's"
                      activeContext:
                        chainSlug: "mcdonalds-es"
                        chainName: "McDonald's"
                contextSetAmbiguous:
