                  value:
                    success: true
                    data:
                      intent: error
                      actorId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      errorCode: "TEXT_TOO_LONG"
                      activeContext: null
        '400':
          description: |
            Validation error. Sub-cases:
            - `text` is missing, empty, or not a string.
            - `actorId` is resolved from middleware but is missing (middleware misconfigured).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingText:
                  summary: text field missing
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["text"]
                          message: "Required"
                          code: "invalid_type"
        '429':
          description: Per-actor daily rate limit exceeded (F069).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Daily query limit exceeded. Try again tomorrow."
                  code: "ACTOR_RATE_LIMIT_EXCEEDED"
        '500':
          description: Database or unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbError:
                  value:
                    success: false
                    error:
                      message: "Database query failed during estimation lookup"
                      code: "DB_UNAVAILABLE"

  /conversation/audio:
    post:
      tags: [Conversation]
      operationId: conversationAudio
      summary: Transcribe a voice message and process via ConversationCore
      description: |
        Accepts a multipart/form-data audio file (OGG, MP3, MP4, WAV, WebM).
        Transcribes via OpenAI Whisper (`whisper-1`, `language: es`, `temperature: 0`),
        applies a hallucination filter for known bad Whisper outputs, then delegates
        to the Conversation Core pipeline (`processMessage()`).

        Returns the same `ConversationMessageData` envelope as `POST /conversation/message`.
        On transcription failure or empty result, returns a 422 error with a specific code.

        **Architecture decision (F075):** Transcription runs in the API (not the bot)
        to keep the bot as a thin adapter. The same endpoint can be reused by the
        future web assistant (Phase C, F093) without duplicating Whisper logic.

        **Rate limiting:** Shares the `queries` bucket with `GET /estimate` and
        `POST /conversation/message` — 50/day per actor. A voice message counts as 1 query.

        **Query logging:** Fire-and-forget, same pattern as `/conversation/message`.
        The transcribed text (not the filename) is logged as `queryText`.
        Whisper latency is logged via application logger (`audioTranscriptionMs`) —
        not stored in the `query_logs` table (no schema changes).
      parameters:
        - $ref: '#/components/parameters/XActorId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - audio
                - duration
              properties:
                audio:
                  type: string
                  format: binary
                  description: |
                    Audio file. Accepted MIME types: audio/ogg, audio/mpeg, audio/mp4,
                    audio/wav, audio/webm. Max 10 MB (handled by @fastify/multipart).
                duration:
                  type: number
                  description: |
                    Audio duration in seconds. Required — comes from Telegram's
                    `msg.voice.duration` field (or client-side measurement).
                    Must be a number between 0 and 120. Out-of-range returns 400 VALIDATION_ERROR.
                  minimum: 0
                  maximum: 120
                chainSlug:
                  type: string
                  description: Legacy chain context slug (optional, same as /conversation/message).
                  example: "mcdonalds-es"
                chainName:
                  type: string
                  description: Legacy chain context name (optional, same as /conversation/message).
                  example: "McDonald's"
            examples:
              voiceOgg:
                summary: Telegram voice note (OGG/Opus)
                value:
                  audio: "<binary OGG file>"
                  duration: 8
      responses:
        '200':
          description: |
            Audio transcribed and processed successfully. Returns the same
            ConversationMessageData envelope as POST /conversation/message.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/ConversationMessageResponse'
              example:
                success: true
                data:
                  intent: estimation
                  actorId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  estimation:
                    query: "dos pinchos de tortilla y una caña"
                    chainSlug: null
                    portionMultiplier: 1.0
                    level1Hit: false
                    level2Hit: false
                    level3Hit: true
                    level4Hit: false
                    matchType: "embedding_dish"
                    result: null
                    cachedAt: null
                  activeContext: null
        '400':
          description: |
            Validation error. Sub-cases:
            - `audio` file part is missing from the multipart body.
            - MIME type is not one of: audio/ogg, audio/mpeg, audio/mp4, audio/wav, audio/webm.
            - `duration` field is missing or not a number.
            - `duration` exceeds 120 seconds.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingAudio:
                  summary: audio file part missing
                  value:
                    success: false
                    error:
                      message: "Missing audio file part in multipart request"
                      code: "VALIDATION_ERROR"
                unsupportedMime:
                  summary: unsupported MIME type
                  value:
                    success: false
                    error:
                      message: "Unsupported audio MIME type: application/pdf"
                      code: "VALIDATION_ERROR"
                durationTooLong:
                  summary: duration > 120
                  value:
                    success: false
                    error:
                      message: "Audio duration must be between 0 and 120 seconds"
                      code: "VALIDATION_ERROR"
        '413':
          description: Audio file exceeds 10 MB limit (handled by @fastify/multipart).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "request file too large, please check multipart config"
                  code: "PAYLOAD_TOO_LARGE"
        '422':
          description: |
            Empty transcription. Whisper returned empty/whitespace text or a known
            hallucination string (background noise, silence).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyTranscription:
                  summary: Whisper returned empty or hallucinated text
                  value:
                    success: false
                    error:
                      message: "Audio transcription returned empty text"
                      code: "EMPTY_TRANSCRIPTION"
        '502':
          description: |
            Upstream transcription failure. Whisper API returned an error after retry
            (or OPENAI_API_KEY not configured). The client's audio was valid but the
            server-side transcription service failed. Retrying may succeed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                transcriptionFailed:
                  summary: Whisper API error after retry
                  value:
                    success: false
                    error:
                      message: "Audio transcription failed"
                      code: "TRANSCRIPTION_FAILED"
        '429':
          description: Per-actor daily rate limit exceeded (shares 'queries' bucket with GET /estimate).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Daily queries limit exceeded (50/day). Try again tomorrow."
                  code: "ACTOR_RATE_LIMIT_EXCEEDED"

components:
  parameters:
    XActorId:
      name: X-Actor-Id
      in: header
      required: false
      description: |
        Anonymous identity header (F069, ADR-016). Web clients send a UUID v4
        (persisted in localStorage). Telegram bot sends "telegram:<chat_id>".
        If missing or invalid, the server auto-creates a new anonymous actor and
        returns the assigned UUID in the X-Actor-Id response header.
        Used for per-actor rate limiting and analytics.
      schema:
        type: string
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

  schemas:
    # -------------------------------------------------------------------------
    # Conversation Core (F070)
    # -------------------------------------------------------------------------

    ConversationMessageBody:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 500
          description: |
            Plain-text natural language input from the user. Spanish is the primary
            language. Maximum 500 characters (same guard as the bot NL handler).
          example: "cuántas calorías tiene el big mac en mcdonalds-es"

    ConversationIntent:
      type: string
      enum:
        - context_set
        - comparison
        - menu_estimation
        - estimation
        - text_too_long
      description: |
        Resolved intent of the user's message:
        - `context_set`:      message was recognised as "estoy en <chain>" — context written to Redis.
        - `comparison`:       message was recognised as a two-dish comparison query.
        - `menu_estimation`:  message was recognised as a multi-dish "menú del día" query (F076).
        - `estimation`:       message was resolved as a single-dish nutritional query.
        - `text_too_long`:    input exceeded 500 characters and was rejected.

    ConversationContext:
      type: object
      description: Active chain context for this actor, stored in Redis.
      required:
        - chainSlug
        - chainName
      properties:
        chainSlug:
          type: string
          description: Chain slug set via "estoy en <chain>" or /contexto command.
          example: "mcdonalds-es"
        chainName:
          type: string
          description: Human-readable chain name.
          example: "McDonald's"

    ConversationComparisonData:
      type: object
      description: Payload for a comparison intent — two EstimateData objects.
      required:
        - dishA
        - dishB
      properties:
        dishA:
          $ref: '#/components/schemas/EstimateData'
          description: |
            Estimation result for the first dish. `result` may be null if the cascade
            produced a total miss (no match at any level).
        dishB:
          $ref: '#/components/schemas/EstimateData'
          description: |
            Estimation result for the second dish. `result` may be null if the cascade
            produced a total miss.
        nutrientFocus:
          type: string
          nullable: true
          description: |
            The nutrient the user asked to compare (e.g. "calorías", "proteínas").
            Null when no specific nutrient focus was detected in the query.
          example: "calorías"

    MenuEstimationItem:
      type: object
      description: A single dish in a menu estimation (F076).
      required:
        - query
        - estimation
      properties:
        query:
          type: string
          description: The dish text as parsed from user input.
        estimation:
          $ref: '#/components/schemas/EstimateData'
          description: |
            Estimation result for this dish. Always non-null; "not found" is represented
            by estimation.result === null.

    MenuEstimationTotals:
      type: object
      description: Aggregated nutrients across all matched menu items (F076). All 15 nutrient fields.
      properties:
        calories:
          type: number
          minimum: 0
        proteins:
          type: number
          minimum: 0
        carbohydrates:
          type: number
          minimum: 0
        sugars:
          type: number
          minimum: 0
        fats:
          type: number
          minimum: 0
        saturatedFats:
          type: number
          minimum: 0
        fiber:
          type: number
          minimum: 0
        salt:
          type: number
          minimum: 0
        sodium:
          type: number
          minimum: 0
        transFats:
          type: number
          minimum: 0
        cholesterol:
          type: number
          minimum: 0
        potassium:
          type: number
          minimum: 0
        monounsaturatedFats:
          type: number
          minimum: 0
        polyunsaturatedFats:
          type: number
          minimum: 0
        alcohol:
          type: number
          minimum: 0
          description: Alcohol in grams (F077). 7 kcal/g. BEDCA tagname ALC.

    MenuEstimationData:
      type: object
      description: Full menu estimation response payload (F076).
      required:
        - items
        - totals
        - itemCount
        - matchedCount
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MenuEstimationItem'
        totals:
          $ref: '#/components/schemas/MenuEstimationTotals'
        itemCount:
          type: integer
          minimum: 0
          description: Total items parsed from the menu input.
        matchedCount:
          type: integer
          minimum: 0
          description: Items that produced a non-null estimation result.

    ConversationMessageResponse:
      type: object
      description: |
        Structured response from ConversationCore.processMessage(). The `intent` field
        identifies which data field is populated. Only one of `contextSet`, `estimation`,
        `comparison`, or `menuEstimation` is present per response. `activeContext` is always
        present (null if no context is active for this actor).
      required:
        - intent
        - actorId
        - activeContext
      properties:
        intent:
          $ref: '#/components/schemas/ConversationIntent'
        actorId:
          type: string
          format: uuid
          description: The actor UUID resolved from X-Actor-Id header (F069).
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        contextSet:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ConversationContext'
          description: |
            Present and non-null when intent is `context_set` and the chain was
            unambiguously resolved. Null when ambiguous or when intent is not `context_set`.
        ambiguous:
          type: boolean
          nullable: true
          description: |
            Present and true when intent is `context_set` but the chain identifier
            matched multiple chains. `contextSet` is null and no Redis write is made.
            Absent (not just false) when not applicable.
          example: true
        estimation:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EstimateData'
          description: |
            Present when intent is `estimation`. Contains the full estimation cascade
            result (same shape as GET /estimate response data). Null for other intents.
        comparison:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ConversationComparisonData'
          description: |
            Present when intent is `comparison`. Contains two EstimateData objects.
            Null for other intents.
        menuEstimation:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MenuEstimationData'
          description: |
            Present when intent is `menu_estimation` (F076). Contains per-item estimation
            results, aggregated totals, and match count. Null for other intents.
        activeContext:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ConversationContext'
          description: |
            The chain context currently active for this actor after processing this message.
            Non-null if the actor has set a chain context (either in this request via
            context_set, or in a prior request). Null if no context is active.
            Adapters should use this field to display context indicators to the user.
        usedContextFallback:
          type: boolean
          description: |
            True when chainSlug was injected from active context rather than explicitly
            provided in the query. Bot adapters use this to show context indicators.
            Only meaningful for estimation/comparison intents.

    # -------------------------------------------------------------------------
    # Ingestion
    # -------------------------------------------------------------------------

    IngestPdfSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the PDF row.
          example: "Bebida Grande"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    NormalizedDish:
      type: object
      description: |
        A dish that has been extracted from the PDF, normalized via
        `normalizeNutrients` / `normalizeDish`, and is ready for (or has been
        written to) the database. Mirrors `NormalizedDishDataSchema` from
        `packages/scraper/src/base/types.ts`.
      required:
        - name
        - nutrients
        - confidenceLevel
        - estimationMethod
        - availability
        - restaurantId
        - sourceId
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: "Big Mac"
        nameEs:
          type: string
          maxLength: 255
          nullable: true
          example: "Big Mac"
        description:
          type: string
          nullable: true
          example: "Hamburguesa con dos filetes de carne"
        externalId:
          type: string
          maxLength: 100
          nullable: true
          description: Chain-specific dish ID. Not present for PDF ingestion (PDFs do not carry machine IDs).
        availability:
          type: string
          enum: [available, unavailable, seasonal, discontinued]
          default: available
          example: available
        portionGrams:
          type: number
          nullable: true
          example: 200
        priceEur:
          type: number
          nullable: true
          example: 4.99
        aliases:
          type: array
          items:
            type: string
          default: []
        nutrients:
          type: object
          required:
            - calories
            - proteins
            - carbohydrates
            - fats
            - saturatedFats
            - sugars
            - fiber
            - salt
            - sodium
            - transFats
            - cholesterol
            - potassium
            - monounsaturatedFats
            - polyunsaturatedFats
            - alcohol
            - referenceBasis
          properties:
            calories:
              type: number
              minimum: 0
              maximum: 9000
              example: 550
            proteins:
              type: number
              minimum: 0
              example: 25
            carbohydrates:
              type: number
              minimum: 0
              example: 46
            fats:
              type: number
              minimum: 0
              example: 28
            saturatedFats:
              type: number
              minimum: 0
              example: 10
            sugars:
              type: number
              minimum: 0
              example: 9
            fiber:
              type: number
              minimum: 0
              example: 3
            salt:
              type: number
              minimum: 0
              description: Grams. Derived from sodium if not directly stated (salt_g = sodium_mg / 1000 * 2.5).
              example: 2.2
            sodium:
              type: number
              minimum: 0
              description: Milligrams. Derived from salt if not directly stated.
              example: 880
            transFats:
              type: number
              minimum: 0
              default: 0
              example: 0.5
            cholesterol:
              type: number
              minimum: 0
              default: 0
              example: 80
            potassium:
              type: number
              minimum: 0
              default: 0
              example: 0
            monounsaturatedFats:
              type: number
              minimum: 0
              default: 0
              example: 0
            polyunsaturatedFats:
              type: number
              minimum: 0
              default: 0
              example: 0
            alcohol:
              type: number
              minimum: 0
              default: 0
              description: Alcohol in grams (F077). 7 kcal/g. BEDCA tagname ALC.
              example: 0
            referenceBasis:
              type: string
              enum: [per_100g, per_serving, per_package]
              default: per_serving
              description: Always "per_serving" for restaurant / PDF-sourced data (ADR-004).
              example: per_serving
            extra:
              type: object
              additionalProperties:
                type: number
              description: Any additional nutrients present in the PDF but not in the standard columns.
              nullable: true
        confidenceLevel:
          type: string
          enum: [low, medium, high]
          description: Always "medium" for PDF-ingested data.
          example: medium
        estimationMethod:
          type: string
          enum: [official, scraped, calculated, extrapolated, manual]
          description: Always "scraped" for PDF-ingested data.
          example: scraped
        restaurantId:
          type: string
          format: uuid
          example: "00000000-0000-0000-0000-000000000001"
        sourceId:
          type: string
          format: uuid
          example: "00000000-0000-0000-0000-000000000002"

    IngestPdfResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the PDF before normalization.
          example: 48
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 45
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 3
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestPdfSkippedReason'

    IngestPdfResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestPdfResult'

    # -------------------------------------------------------------------------
    # Ingestion — PDF-URL (F009)
    # -------------------------------------------------------------------------

    IngestPdfUrlBody:
      type: object
      required:
        - url
        - restaurantId
        - sourceId
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: |
            A direct URL to a PDF file. Must use http or https scheme.
            Private/loopback addresses (localhost, 127.x.x.x, 10.x.x.x,
            192.168.x.x, 169.254.x.x, ::1, ::ffff:*) are rejected with
            422 INVALID_URL.
          example: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
        restaurantId:
          type: string
          format: uuid
          description: UUID of the Restaurant row this data belongs to.
          example: "00000000-0000-0000-0000-000000000001"
        sourceId:
          type: string
          format: uuid
          description: UUID of the DataSource row representing this PDF's origin.
          example: "00000000-0000-0000-0000-000000000002"
        dryRun:
          type: boolean
          default: false
          description: |
            When true, downloads, extracts, and normalizes but skips all DB writes.
            The response still contains the full `dishes` array for inspection.
        chainSlug:
          type: string
          pattern: "^[a-z0-9-]+$"
          minLength: 1
          maxLength: 100
          description: |
            Optional chain identifier from CHAIN_PDF_REGISTRY (e.g. "burger-king-es",
            "kfc-es", "telepizza-es"). When provided, applies chain-specific text
            preprocessing to the extracted PDF text before parsing. This handles
            multi-line headers, paired 100g/portion columns, and kJ/kcal dual energy
            columns that the generic parser cannot handle. See ADR-007.
            When omitted, no preprocessing is applied (backward-compatible).
          example: "kfc-es"

    IngestPdfUrlSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the PDF row.
          example: "Bebida Grande"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    IngestPdfUrlResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - sourceUrl
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the PDF before normalization.
          example: 52
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 50
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 2
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        sourceUrl:
          type: string
          format: uri
          description: |
            The PDF URL that was downloaded. Echoed back from the request for
            traceability when callers ingest multiple PDF URLs in sequence
            (e.g. F010 batch runner).
          example: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestPdfUrlSkippedReason'

    IngestPdfUrlResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestPdfUrlResult'

    # -------------------------------------------------------------------------
    # Ingestion — Image URL (F012)
    # -------------------------------------------------------------------------

    IngestImageUrlBody:
      type: object
      required:
        - url
        - restaurantId
        - sourceId
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: |
            A direct URL to a JPEG or PNG image file. Must use http or https scheme.
            Private/loopback addresses (localhost, 127.x.x.x, 10.x.x.x,
            192.168.x.x, 169.254.x.x, ::1, ::ffff:*) are rejected with
            422 INVALID_URL.
            Content-Type `application/octet-stream` is accepted as a CDN passthrough;
            magic bytes (FFD8FF for JPEG, 89504E47 for PNG) are the authoritative
            format check applied after download.
          example: "https://alergenos.dominospizza.es/img/tabla_nutricional.jpg"
        restaurantId:
          type: string
          format: uuid
          description: UUID of the Restaurant row this data belongs to.
          example: "00000000-0000-0000-0006-000000000014"
        sourceId:
          type: string
          format: uuid
          description: UUID of the DataSource row representing this image's origin.
          example: "00000000-0000-0000-0000-000000000014"
        dryRun:
          type: boolean
          default: false
          description: |
            When true, downloads, OCRs, extracts, and normalizes but skips all DB
            writes. The response still contains the full `dishes` array for inspection.
            Use dryRun=true to verify OCR output quality before a live ingest.
        chainSlug:
          type: string
          pattern: "^[a-z0-9-]+$"
          minLength: 1
          maxLength: 100
          description: |
            Optional chain identifier (e.g. "dominos-es"). When provided, applies
            chain-specific text preprocessing to the OCR-extracted lines before
            parsing. This handles OCR artifacts and layout-specific formatting
            (e.g. whitespace normalization, numeric token cleanup). See ADR-007.
            When omitted, no preprocessing is applied (backward-compatible).
          example: "dominos-es"

    IngestImageUrlSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the OCR-parsed row.
          example: "Pizza Pepperoni"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    IngestImageUrlResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - sourceUrl
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the image (after OCR) before normalization.
          example: 42
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 40
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 2
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        sourceUrl:
          type: string
          format: uri
          description: |
            The image URL that was downloaded. Echoed back from the request for
            traceability when callers ingest multiple image URLs in sequence
            (e.g. F012 batch runner iterating imageUrls for a chain).
          example: "https://alergenos.dominospizza.es/img/tabla_nutricional.jpg"
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestImageUrlSkippedReason'

    IngestImageUrlResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestImageUrlResult'

    # -------------------------------------------------------------------------
    # Ingestion — Image Upload / multipart (F031)
    # -------------------------------------------------------------------------

    IngestImageSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the OCR-parsed row.
          example: "Bebida"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    IngestImageResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the image (after OCR) before normalization.
          example: 9
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 8
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 1
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
