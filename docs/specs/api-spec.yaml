openapi: 3.0.3
info:
  title: foodXPlorer API
  description: |
    API specification for the foodXPlorer nutritional information platform.
    Update this file BEFORE implementing new endpoints.

    **Response envelope:**
    - All successful responses use `{ success: true, data: <payload> }`.
    - All error responses use `{ success: false, error: { message, code, details? } }`.

    **Validation:**
    - Request bodies and query params are validated via `fastify-type-provider-zod`.
    - Zod schemas in `packages/shared/src/schemas/` are the single source of truth.
  version: 0.1.0
  contact:
    name: foodXPlorer
  license:
    name: TBD

servers:
  - url: http://localhost:3001
    description: Local development

tags:
  - name: System
    description: Infrastructure and health endpoints
  - name: Ingestion
    description: |
      Data ingestion endpoints (F007b, F007c, F009). Accept external nutritional data
      (PDF upload, URL scrape, or PDF download from URL), normalize to the shared
      dish/nutrient schema, and persist to the database. These endpoints are NOT
      part of F007 — they are specified and implemented in F007b, F007c, and F009
      respectively.

paths:
  /ingest/pdf:
    post:
      summary: Ingest nutritional data from a PDF upload
      description: |
        Accepts a PDF file upload containing nutritional data (restaurant menu PDFs,
        nutrition guide PDFs), extracts text, parses nutritional tables using
        heuristic/regex detection, normalizes the data through the shared
        `normalizeNutrients` / `normalizeDish` pipeline (packages/scraper), and
        persists the resulting dishes to the database.

        - Targets Spanish restaurant chain nutritional PDFs and nutrition guides.
        - Image-based (scanned) PDFs are not supported — only PDFs with embedded text.
        - Use `dryRun=true` to inspect parsed dishes without writing to the database.
        - Partial success (some dishes skipped) returns HTTP 200. Only total failure
          (zero parseable dishes) returns HTTP 422.
      operationId: ingestPdf
      tags:
        - Ingestion
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - restaurantId
                - sourceId
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    PDF file containing nutritional data. Must be a text-based PDF
                    (not a scanned image). Maximum size: 10 MB.
                restaurantId:
                  type: string
                  format: uuid
                  description: UUID of the Restaurant row this data belongs to.
                  example: "00000000-0000-0000-0000-000000000001"
                sourceId:
                  type: string
                  format: uuid
                  description: UUID of the DataSource row representing this PDF's origin.
                  example: "00000000-0000-0000-0000-000000000002"
                dryRun:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: |
                    When "true", runs extraction and normalization but skips all DB writes.
                    The response still contains the full `dishes` array for inspection.
      responses:
        '200':
          description: |
            Ingestion successful (or dryRun completed). At least one dish was parsed
            and upserted (or would be upserted in dryRun mode). Partial success
            (some dishes skipped) also returns 200 — see `dishesSkipped` and
            `skippedReasons` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestPdfResponse'
              examples:
                success:
                  summary: 45 dishes upserted, 3 skipped
                  value:
                    success: true
                    data:
                      dishesFound: 48
                      dishesUpserted: 45
                      dishesSkipped: 3
                      dryRun: false
                      dishes:
                        - name: "Big Mac"
                          nameEs: "Big Mac"
                          nutrients:
                            calories: 550
                            proteins: 25
                            carbohydrates: 46
                            fats: 28
                            saturatedFats: 10
                            sugars: 9
                            fiber: 3
                            salt: 2.2
                            sodium: 880
                            transFats: 0.5
                            cholesterol: 80
                            potassium: 0
                            monounsaturatedFats: 0
                            polyunsaturatedFats: 0
                            referenceBasis: "per_serving"
                          confidenceLevel: "medium"
                          estimationMethod: "scraped"
                          availability: "available"
                          restaurantId: "00000000-0000-0000-0000-000000000001"
                          sourceId: "00000000-0000-0000-0000-000000000002"
                      skippedReasons:
                        - dishName: "Bebida Grande"
                          reason: "Missing required field: proteins"
                dryRun:
                  summary: dryRun=true — no DB writes
                  value:
                    success: true
                    data:
                      dishesFound: 10
                      dishesUpserted: 0
                      dishesSkipped: 0
                      dryRun: true
                      dishes: []
                      skippedReasons: []
        '400':
          description: Validation error (missing fields, invalid UUID format, file missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingRestaurantId:
                  summary: restaurantId missing
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["restaurantId"]
                          message: "Required"
                          code: "invalid_type"
                fileMissing:
                  summary: No file part in multipart body
                  value:
                    success: false
                    error:
                      message: "No file uploaded"
                      code: "VALIDATION_ERROR"
        '404':
          description: restaurantId or sourceId not found in the database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                restaurantNotFound:
                  summary: Restaurant row does not exist
                  value:
                    success: false
                    error:
                      message: "Restaurant not found"
                      code: "NOT_FOUND"
        '408':
          description: PDF processing exceeded the 30-second timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                timeout:
                  value:
                    success: false
                    error:
                      message: "PDF processing timed out"
                      code: "PROCESSING_TIMEOUT"
        '413':
          description: Uploaded file exceeds the 10 MB size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                fileTooLarge:
                  value:
                    success: false
                    error:
                      message: "File size exceeds the 10 MB limit"
                      code: "VALIDATION_ERROR"
        '422':
          description: |
            Unprocessable PDF. One of three sub-cases:
            - `INVALID_PDF`: file is not a valid PDF (bad magic bytes or MIME type).
            - `UNSUPPORTED_PDF`: PDF is image-based (no extractable text).
            - `NO_NUTRITIONAL_DATA_FOUND`: PDF contains text but no parseable
              nutritional table, or all parsed rows failed normalization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPdf:
                  summary: Not a PDF
                  value:
                    success: false
                    error:
                      message: "File is not a valid PDF"
                      code: "INVALID_PDF"
                unsupportedPdf:
                  summary: Image-based PDF (no text)
                  value:
                    success: false
                    error:
                      message: "PDF contains no extractable text. Scanned PDFs are not supported."
                      code: "UNSUPPORTED_PDF"
                noData:
                  summary: No nutritional data found
                  value:
                    success: false
                    error:
                      message: "No nutritional data could be parsed from this PDF"
                      code: "NO_NUTRITIONAL_DATA_FOUND"
        '500':
          description: Database error during upsert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbError:
                  value:
                    success: false
                    error:
                      message: "Database write failed"
                      code: "DB_UNAVAILABLE"

  /ingest/pdf-url:
    post:
      summary: Ingest nutritional data from a PDF at a given URL
      description: |
        Accepts a JSON body with a URL pointing directly to a PDF file, downloads
        it (plain `fetch`, no browser), and pipes the buffer through the existing
        F007b pipeline: magic-bytes check → `extractText` → `parseNutritionTable`
        → `normalizeNutrients` / `normalizeDish` → Prisma `$transaction` upsert.

        - Input is a JSON body (not multipart — there is no file to upload).
        - Targets direct PDF download URLs (S3, CDN, static server). No JavaScript
          rendering is required; if a URL redirects to a login page the
          Content-Type check catches it.
        - Image-based (scanned) PDFs are not supported — returns `UNSUPPORTED_PDF`.
        - `sourceUrl` in the response echoes back the submitted URL for traceability
          (useful for F010 batch runner).
        - Partial success (some dishes skipped) returns HTTP 200. Only total failure
          returns HTTP 422.
        - SSRF guard: private/loopback URLs (localhost, 127.x, 10.x, 172.16–31.x,
          192.168.x, 169.254.x, ::1, ::ffff:*) are rejected with 422 INVALID_URL.
        - Size limit: 20 MB. Responses larger than this are rejected with 413.
        - Download + pipeline timeout: 30 seconds.
      operationId: ingestPdfUrl
      tags:
        - Ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestPdfUrlBody'
            examples:
              live:
                summary: Live run — download and persist (KFC Spain)
                value:
                  url: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
                  restaurantId: "00000000-0000-0000-0000-000000000001"
                  sourceId: "00000000-0000-0000-0000-000000000002"
                  dryRun: false
              dryRun:
                summary: Dry run — download and parse without DB writes
                value:
                  url: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
                  restaurantId: "00000000-0000-0000-0000-000000000001"
                  sourceId: "00000000-0000-0000-0000-000000000002"
                  dryRun: true
      responses:
        '200':
          description: |
            Ingestion successful (or dryRun completed). At least one dish was parsed
            and upserted (or would be upserted in dryRun mode). Partial success
            (some dishes skipped) also returns 200 — see `dishesSkipped` and
            `skippedReasons` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestPdfUrlResponse'
              examples:
                success:
                  summary: 50 dishes upserted, 2 skipped
                  value:
                    success: true
                    data:
                      dishesFound: 52
                      dishesUpserted: 50
                      dishesSkipped: 2
                      dryRun: false
                      sourceUrl: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
                      dishes:
                        - name: "Zinger Burger"
                          nameEs: "Zinger Burger"
                          nutrients:
                            calories: 490
                            proteins: 29
                            carbohydrates: 44
                            fats: 21
                            saturatedFats: 4
                            sugars: 5
                            fiber: 2
                            salt: 1.8
                            sodium: 720
                            transFats: 0
                            cholesterol: 65
                            potassium: 0
                            monounsaturatedFats: 0
                            polyunsaturatedFats: 0
                            referenceBasis: "per_serving"
                          confidenceLevel: "medium"
                          estimationMethod: "scraped"
                          availability: "available"
                          restaurantId: "00000000-0000-0000-0000-000000000001"
                          sourceId: "00000000-0000-0000-0000-000000000002"
                      skippedReasons:
                        - dishName: "Bebida Grande"
                          reason: "Missing required field: proteins"
                dryRun:
                  summary: dryRun=true — no DB writes
                  value:
                    success: true
                    data:
                      dishesFound: 10
                      dishesUpserted: 0
                      dishesSkipped: 0
                      dryRun: true
                      sourceUrl: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
                      dishes: []
                      skippedReasons: []
        '400':
          description: Validation error (missing fields, invalid UUID format, invalid URL format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingUrl:
                  summary: url field missing
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["url"]
                          message: "Required"
                          code: "invalid_type"
                invalidUrl:
                  summary: url is not a valid URL string
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["url"]
                          message: "Invalid url"
                          code: "invalid_string"
        '404':
          description: restaurantId or sourceId not found in the database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                restaurantNotFound:
                  summary: Restaurant row does not exist
                  value:
                    success: false
                    error:
                      message: "Restaurant not found"
                      code: "NOT_FOUND"
        '408':
          description: Download + processing exceeded the 30-second timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                timeout:
                  value:
                    success: false
                    error:
                      message: "PDF processing timed out"
                      code: "PROCESSING_TIMEOUT"
        '413':
          description: Downloaded PDF exceeds the 20 MB size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                tooLarge:
                  value:
                    success: false
                    error:
                      message: "PDF exceeds the 20 MB size limit"
                      code: "PAYLOAD_TOO_LARGE"
        '422':
          description: |
            Unprocessable request. Sub-cases:
            - `INVALID_URL`: URL scheme is not http/https, or the URL resolves to a
              private/loopback address (SSRF guard).
            - `FETCH_FAILED`: network error, DNS failure, non-2xx HTTP response when
              downloading the PDF.
            - `INVALID_PDF`: response Content-Type is not application/pdf or
              application/octet-stream, OR buffer does not start with `%PDF-`.
            - `UNSUPPORTED_PDF`: PDF contains no extractable text (image-based/scanned).
            - `NO_NUTRITIONAL_DATA_FOUND`: PDF text contains no parseable nutritional
              table, or all parsed rows failed normalization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidUrl:
                  summary: Non-http/https scheme or private IP
                  value:
                    success: false
                    error:
                      message: "URL must use http or https scheme and must not target a private address"
                      code: "INVALID_URL"
                fetchFailed:
                  summary: Network or HTTP error during PDF download
                  value:
                    success: false
                    error:
                      message: "Failed to download PDF"
                      code: "FETCH_FAILED"
                invalidPdf:
                  summary: URL did not return a PDF
                  value:
                    success: false
                    error:
                      message: "URL did not return a PDF (Content-Type: text/html)"
                      code: "INVALID_PDF"
                unsupportedPdf:
                  summary: Image-based PDF (no text)
                  value:
                    success: false
                    error:
                      message: "PDF contains no extractable text. Scanned PDFs are not supported."
                      code: "UNSUPPORTED_PDF"
                noData:
                  summary: No nutritional data found
                  value:
                    success: false
                    error:
                      message: "No nutritional data could be parsed from this PDF"
                      code: "NO_NUTRITIONAL_DATA_FOUND"
        '500':
          description: Database error during upsert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbError:
                  value:
                    success: false
                    error:
                      message: "Database write failed"
                      code: "DB_UNAVAILABLE"

  /ingest/url:
    post:
      summary: Ingest nutritional data from a web page URL
      description: |
        Accepts a URL, fetches the page using Crawlee/Playwright (handles JS-rendered
        pages and basic anti-bot mitigations), extracts visible text from the HTML
        (table-aware, using node-html-parser), parses nutritional tables using the
        same heuristic/regex detection as POST /ingest/pdf, normalizes the data
        through the shared `normalizeNutrients` / `normalizeDish` pipeline
        (packages/scraper), and persists the resulting dishes to the database.

        - Input is a JSON body (not multipart — there is no file to upload).
        - Uses Crawlee/Playwright for fetching: handles JavaScript rendering and
          basic anti-bot challenges.
        - Phase 1: text-based HTML pages only. Pages that render nutritional data
          exclusively in canvas/SVG/images will return NO_NUTRITIONAL_DATA_FOUND.
        - `sourceUrl` in the response echoes back the submitted URL for traceability.
        - Partial success (some dishes skipped) returns HTTP 200. Only total failure
          (zero parseable dishes) returns HTTP 422.
        - SSRF guard: private/loopback URLs (localhost, 127.x.x.x, 192.168.x.x,
          10.x.x.x, 169.254.x.x) are rejected with 422 INVALID_URL.
      operationId: ingestUrl
      tags:
        - Ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestUrlBody'
            examples:
              live:
                summary: Live run — fetch and persist
                value:
                  url: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
                  restaurantId: "00000000-0000-0000-0000-000000000001"
                  sourceId: "00000000-0000-0000-0000-000000000002"
                  dryRun: false
              dryRun:
                summary: Dry run — fetch and parse without DB writes
                value:
                  url: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
                  restaurantId: "00000000-0000-0000-0000-000000000001"
                  sourceId: "00000000-0000-0000-0000-000000000002"
                  dryRun: true
      responses:
        '200':
          description: |
            Ingestion successful (or dryRun completed). At least one dish was parsed
            and upserted (or would be upserted in dryRun mode). Partial success
            (some dishes skipped) also returns 200 — see `dishesSkipped` and
            `skippedReasons` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestUrlResponse'
              examples:
                success:
                  summary: 30 dishes upserted, 2 skipped
                  value:
                    success: true
                    data:
                      dishesFound: 32
                      dishesUpserted: 30
                      dishesSkipped: 2
                      dryRun: false
                      sourceUrl: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
                      dishes:
                        - name: "Big Mac"
                          nameEs: null
                          nutrients:
                            calories: 550
                            proteins: 25
                            carbohydrates: 46
                            fats: 28
                            saturatedFats: 10
                            sugars: 9
                            fiber: 3
                            salt: 2.2
                            sodium: 880
                            transFats: 0.5
                            cholesterol: 80
                            potassium: 0
                            monounsaturatedFats: 0
                            polyunsaturatedFats: 0
                            referenceBasis: "per_serving"
                          confidenceLevel: "medium"
                          estimationMethod: "scraped"
                          availability: "available"
                          restaurantId: "00000000-0000-0000-0000-000000000001"
                          sourceId: "00000000-0000-0000-0000-000000000002"
                      skippedReasons:
                        - dishName: "Bebida"
                          reason: "Missing required field: proteins"
                dryRun:
                  summary: dryRun=true — no DB writes
                  value:
                    success: true
                    data:
                      dishesFound: 10
                      dishesUpserted: 0
                      dishesSkipped: 0
                      dryRun: true
                      sourceUrl: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
                      dishes: []
                      skippedReasons: []
        '400':
          description: Validation error (missing fields, invalid UUID format, invalid URL format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingUrl:
                  summary: url field missing
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["url"]
                          message: "Required"
                          code: "invalid_type"
                invalidUrl:
                  summary: url is not a valid URL string
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["url"]
                          message: "Invalid url"
                          code: "invalid_string"
        '404':
          description: restaurantId or sourceId not found in the database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                restaurantNotFound:
                  summary: Restaurant row does not exist
                  value:
                    success: false
                    error:
                      message: "Restaurant not found"
                      code: "NOT_FOUND"
        '408':
          description: URL processing exceeded the 30-second timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                timeout:
                  value:
                    success: false
                    error:
                      message: "URL processing timed out"
                      code: "PROCESSING_TIMEOUT"
        '422':
          description: |
            Unprocessable request. One of five sub-cases:
            - `INVALID_URL`: URL scheme is not http/https, or the URL resolves to a
              private/loopback address (SSRF guard).
            - `FETCH_FAILED`: network error, DNS failure, or non-2xx HTTP response.
            - `SCRAPER_BLOCKED`: server returned HTTP 403 or 429 (anti-bot protection).
            - `NO_NUTRITIONAL_DATA_FOUND`: page fetched but no parseable nutritional
              table found, or all parsed rows failed normalization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidUrl:
                  summary: Non-http/https scheme or private IP
                  value:
                    success: false
                    error:
                      message: "URL must use http or https scheme and must not target a private address"
                      code: "INVALID_URL"
                fetchFailed:
                  summary: Network or HTTP error
                  value:
                    success: false
                    error:
                      message: "Failed to fetch URL"
                      code: "FETCH_FAILED"
                scraperBlocked:
                  summary: Anti-bot block (403/429)
                  value:
                    success: false
                    error:
                      message: "Access to this URL is blocked (HTTP 403/429)"
                      code: "SCRAPER_BLOCKED"
                noData:
                  summary: No nutritional data found
                  value:
                    success: false
                    error:
                      message: "No nutritional data could be parsed from this URL"
                      code: "NO_NUTRITIONAL_DATA_FOUND"
        '500':
          description: Database error during upsert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbError:
                  value:
                    success: false
                    error:
                      message: "Database write failed"
                      code: "DB_UNAVAILABLE"

  /health:
    get:
      summary: Health check
      description: |
        Returns server liveness. Optionally checks DB connectivity (`?db=true`)
        and/or Redis connectivity (`?redis=true`). Both parameters can be combined.
        The `db` and `redis` fields are present in the response only when the
        respective check is requested.
      operationId: healthCheck
      tags:
        - System
      parameters:
        - name: db
          in: query
          required: false
          description: Include a database connectivity check (SELECT 1 via Prisma) when set to "true".
          schema:
            type: string
            enum: ["true"]
        - name: redis
          in: query
          required: false
          description: Include a Redis connectivity check (PING) when set to "true".
          schema:
            type: string
            enum: ["true"]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                basic:
                  summary: Basic health check
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                withDb:
                  summary: Health check with DB connectivity
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                    db: connected
                withRedis:
                  summary: Health check with Redis connectivity
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                    redis: connected
                withDbAndRedis:
                  summary: Health check with both DB and Redis connectivity
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                    db: connected
                    redis: connected
        '500':
          description: Service is unhealthy (e.g. DB or Redis unreachable when respective check is requested)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbUnavailable:
                  summary: Database unreachable
                  value:
                    success: false
                    error:
                      message: "Database connectivity check failed"
                      code: "DB_UNAVAILABLE"
                redisUnavailable:
                  summary: Redis unreachable
                  value:
                    success: false
                    error:
                      message: "Redis connectivity check failed"
                      code: "REDIS_UNAVAILABLE"

components:
  schemas:
    # -------------------------------------------------------------------------
    # Ingestion
    # -------------------------------------------------------------------------

    IngestPdfSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the PDF row.
          example: "Bebida Grande"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    NormalizedDish:
      type: object
      description: |
        A dish that has been extracted from the PDF, normalized via
        `normalizeNutrients` / `normalizeDish`, and is ready for (or has been
        written to) the database. Mirrors `NormalizedDishDataSchema` from
        `packages/scraper/src/base/types.ts`.
      required:
        - name
        - nutrients
        - confidenceLevel
        - estimationMethod
        - availability
        - restaurantId
        - sourceId
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: "Big Mac"
        nameEs:
          type: string
          maxLength: 255
          nullable: true
          example: "Big Mac"
        description:
          type: string
          nullable: true
          example: "Hamburguesa con dos filetes de carne"
        externalId:
          type: string
          maxLength: 100
          nullable: true
          description: Chain-specific dish ID. Not present for PDF ingestion (PDFs do not carry machine IDs).
        availability:
          type: string
          enum: [available, unavailable, seasonal, discontinued]
          default: available
          example: available
        portionGrams:
          type: number
          nullable: true
          example: 200
        priceEur:
          type: number
          nullable: true
          example: 4.99
        aliases:
          type: array
          items:
            type: string
          default: []
        nutrients:
          type: object
          required:
            - calories
            - proteins
            - carbohydrates
            - fats
            - saturatedFats
            - sugars
            - fiber
            - salt
            - sodium
            - transFats
            - cholesterol
            - potassium
            - monounsaturatedFats
            - polyunsaturatedFats
            - referenceBasis
          properties:
            calories:
              type: number
              minimum: 0
              maximum: 9000
              example: 550
            proteins:
              type: number
              minimum: 0
              example: 25
            carbohydrates:
              type: number
              minimum: 0
              example: 46
            fats:
              type: number
              minimum: 0
              example: 28
            saturatedFats:
              type: number
              minimum: 0
              example: 10
            sugars:
              type: number
              minimum: 0
              example: 9
            fiber:
              type: number
              minimum: 0
              example: 3
            salt:
              type: number
              minimum: 0
              description: Grams. Derived from sodium if not directly stated (salt_g = sodium_mg / 1000 * 2.5).
              example: 2.2
            sodium:
              type: number
              minimum: 0
              description: Milligrams. Derived from salt if not directly stated.
              example: 880
            transFats:
              type: number
              minimum: 0
              default: 0
              example: 0.5
            cholesterol:
              type: number
              minimum: 0
              default: 0
              example: 80
            potassium:
              type: number
              minimum: 0
              default: 0
              example: 0
            monounsaturatedFats:
              type: number
              minimum: 0
              default: 0
              example: 0
            polyunsaturatedFats:
              type: number
              minimum: 0
              default: 0
              example: 0
            referenceBasis:
              type: string
              enum: [per_100g, per_serving, per_package]
              default: per_serving
              description: Always "per_serving" for restaurant / PDF-sourced data (ADR-004).
              example: per_serving
            extra:
              type: object
              additionalProperties:
                type: number
              description: Any additional nutrients present in the PDF but not in the standard columns.
              nullable: true
        confidenceLevel:
          type: string
          enum: [low, medium, high]
          description: Always "medium" for PDF-ingested data.
          example: medium
        estimationMethod:
          type: string
          enum: [official, scraped, calculated, extrapolated, manual]
          description: Always "scraped" for PDF-ingested data.
          example: scraped
        restaurantId:
          type: string
          format: uuid
          example: "00000000-0000-0000-0000-000000000001"
        sourceId:
          type: string
          format: uuid
          example: "00000000-0000-0000-0000-000000000002"

    IngestPdfResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the PDF before normalization.
          example: 48
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 45
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 3
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestPdfSkippedReason'

    IngestPdfResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestPdfResult'

    # -------------------------------------------------------------------------
    # Ingestion — PDF-URL (F009)
    # -------------------------------------------------------------------------

    IngestPdfUrlBody:
      type: object
      required:
        - url
        - restaurantId
        - sourceId
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: |
            A direct URL to a PDF file. Must use http or https scheme.
            Private/loopback addresses (localhost, 127.x.x.x, 10.x.x.x,
            192.168.x.x, 169.254.x.x, ::1, ::ffff:*) are rejected with
            422 INVALID_URL.
          example: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
        restaurantId:
          type: string
          format: uuid
          description: UUID of the Restaurant row this data belongs to.
          example: "00000000-0000-0000-0000-000000000001"
        sourceId:
          type: string
          format: uuid
          description: UUID of the DataSource row representing this PDF's origin.
          example: "00000000-0000-0000-0000-000000000002"
        dryRun:
          type: boolean
          default: false
          description: |
            When true, downloads, extracts, and normalizes but skips all DB writes.
            The response still contains the full `dishes` array for inspection.

    IngestPdfUrlSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the PDF row.
          example: "Bebida Grande"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    IngestPdfUrlResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - sourceUrl
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the PDF before normalization.
          example: 52
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 50
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 2
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        sourceUrl:
          type: string
          format: uri
          description: |
            The PDF URL that was downloaded. Echoed back from the request for
            traceability when callers ingest multiple PDF URLs in sequence
            (e.g. F010 batch runner).
          example: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestPdfUrlSkippedReason'

    IngestPdfUrlResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestPdfUrlResult'

    # -------------------------------------------------------------------------
    # Ingestion — URL (F007c)
    # -------------------------------------------------------------------------

    IngestUrlBody:
      type: object
      required:
        - url
        - restaurantId
        - sourceId
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: |
            The URL to fetch and parse. Must use http or https scheme.
            Private/loopback addresses (localhost, 127.x.x.x, 192.168.x.x,
            10.x.x.x, 169.254.x.x) are rejected with 422 INVALID_URL.
          example: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
        restaurantId:
          type: string
          format: uuid
          description: UUID of the Restaurant row this data belongs to.
          example: "00000000-0000-0000-0000-000000000001"
        sourceId:
          type: string
          format: uuid
          description: UUID of the DataSource row representing this URL's origin.
          example: "00000000-0000-0000-0000-000000000002"
        dryRun:
          type: boolean
          default: false
          description: |
            When true, runs fetch, extraction, and normalization but skips all DB
            writes. The response still contains the full `dishes` array for inspection.

    IngestUrlSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the HTML row.
          example: "Bebida"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    IngestUrlResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - sourceUrl
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the page before normalization.
          example: 32
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 30
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 2
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        sourceUrl:
          type: string
          format: uri
          description: |
            The URL that was fetched. Echoed back from the request for traceability
            when callers ingest multiple URLs in sequence.
          example: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestUrlSkippedReason'

    IngestUrlResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestUrlResult'

    # -------------------------------------------------------------------------
    # System / Infrastructure
    # -------------------------------------------------------------------------

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - version
        - uptime
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        timestamp:
          type: string
          format: date-time
          example: "2026-03-11T10:00:00.000Z"
        version:
          type: string
          description: Package version from package.json
          example: "0.1.0"
        uptime:
          type: number
          description: Process uptime in seconds
          example: 42.3
        db:
          type: string
          enum: [connected, unavailable]
          description: |
            Present only when ?db=true is passed. Reflects whether a lightweight
            SELECT 1 succeeded against the PostgreSQL database.
          example: connected
        redis:
          type: string
          enum: [connected, unavailable]
          description: |
            Present only when ?redis=true is passed. Reflects whether a Redis PING
            succeeded against the configured Redis instance.
          example: connected

    # -------------------------------------------------------------------------
    # Shared response envelopes
    # -------------------------------------------------------------------------

    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - message
            - code
          properties:
            message:
              type: string
              example: "Validation failed"
            code:
              type: string
              example: "VALIDATION_ERROR"
            details:
              type: array
              description: |
                Present on validation errors (400). Each item identifies the
                failing field and reason, matching Zod's ZodError.issues shape.
              items:
                type: object
                required:
                  - path
                  - message
                properties:
                  path:
                    type: array
                    items:
                      type: string
                    example: ["name"]
                  message:
                    type: string
                    example: "Required"
                  code:
                    type: string
                    example: "invalid_type"

    SuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

    PaginatedResponse:
      type: object
      required:
        - success
        - data
        - pagination
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
        pagination:
          type: object
          required:
            - page
            - pageSize
            - totalItems
            - totalPages
          properties:
            page:
              type: integer
              example: 1
            pageSize:
              type: integer
              example: 20
            totalItems:
              type: integer
              example: 150
            totalPages:
              type: integer
              example: 8

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication (introduced in F026)
