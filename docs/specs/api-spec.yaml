          $ref: '#/components/schemas/IngestImageResult'

    # -------------------------------------------------------------------------
    # Ingestion — URL (F007c)
    # -------------------------------------------------------------------------

    IngestUrlBody:
      type: object
      required:
        - url
        - restaurantId
        - sourceId
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: |
            The URL to fetch and parse. Must use http or https scheme.
            Private/loopback addresses (localhost, 127.x.x.x, 192.168.x.x,
            10.x.x.x, 169.254.x.x) are rejected with 422 INVALID_URL.
          example: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
        restaurantId:
          type: string
          format: uuid
          description: UUID of the Restaurant row this data belongs to.
          example: "00000000-0000-0000-0000-000000000001"
        sourceId:
          type: string
          format: uuid
          description: UUID of the DataSource row representing this URL's origin.
          example: "00000000-0000-0000-0000-000000000002"
        dryRun:
          type: boolean
          default: false
          description: |
            When true, runs fetch, extraction, and normalization but skips all DB
            writes. The response still contains the full `dishes` array for inspection.

    IngestUrlSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the HTML row.
          example: "Bebida"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    IngestUrlResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - sourceUrl
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the page before normalization.
          example: 32
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 30
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 2
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        sourceUrl:
          type: string
          format: uri
          description: |
            The URL that was fetched. Echoed back from the request for traceability
            when callers ingest multiple URLs in sequence.
          example: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
