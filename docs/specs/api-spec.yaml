  # -------------------------------------------------------------------------
  # Calculation — Recipe (F035)
  # -------------------------------------------------------------------------

  /calculate/recipe:
    post:
      summary: Calculate aggregate nutritional information for a recipe
      description: |
        Accepts a recipe in structured (typed ingredient array) or free-form (plain text) mode.
        Resolves each ingredient via a food-only cascade (direct_id → exact_food → fts_food →
        similarity_food → llm_food_match). Returns per-ingredient breakdown plus aggregated totals.
        Partial resolution allowed (200 with unresolvedIngredients and confidenceLevel: "low").
        Zero resolution returns 422 RECIPE_UNRESOLVABLE.
        Route timeout: 30s → 408 PROCESSING_TIMEOUT. Cached in Redis for 300s.
      tags: [Calculation]
      operationId: calculateRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [mode, ingredients]
                  properties:
                    mode:
                      type: string
                      enum: [structured]
                    ingredients:
                      type: array
                      minItems: 1
                      maxItems: 50
                      items:
                        type: object
                        properties:
                          foodId:
                            type: string
                            format: uuid
                          name:
                            type: string
                            minLength: 1
                            maxLength: 255
                          grams:
                            type: number
                            exclusiveMinimum: 0
                            maximum: 5000
                          portionMultiplier:
                            type: number
                            minimum: 0.1
                            maximum: 5.0
                            default: 1.0
                          cookingState:
                            $ref: '#/components/schemas/CookingState'
                            description: |
                              Declares whether this ingredient's gram weight is pre-cooking
                              (raw) or post-cooking (cooked) (F072). When omitted, default
                              assumptions fire based on the resolved food's food group.
                              Not applicable in free-form mode — defaults apply to all
                              resolved ingredients (F074 will extract state from text).
                        required: [grams]
                    portions:
                      type: integer
                      minimum: 1
                      maximum: 50
                      description: |
                        F087 — Number of portions to divide the recipe into ("El Tupper" meal prep).
                        When provided, the response includes perPortion nutrients (totalNutrients ÷ portions).
                - type: object
                  required: [mode, text]
                  properties:
                    mode:
                      type: string
                      enum: [free-form]
                    text:
                      type: string
                      minLength: 1
                      maxLength: 2000
                    portions:
                      type: integer
                      minimum: 1
                      maximum: 50
                      description: |
                        F087 — Number of portions to divide the recipe into ("El Tupper" meal prep).
                        When provided, the response includes perPortion nutrients (totalNutrients ÷ portions).
              discriminator:
                propertyName: mode
      responses:
        "200":
          description: Recipe calculated successfully (partial or full resolution)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum: [structured, free-form]
                      resolvedCount:
                        type: integer
                      unresolvedCount:
                        type: integer
                      confidenceLevel:
                        type: string
                        enum: [medium, low]
                      totalNutrients:
                        $ref: "#/components/schemas/RecipeNutrients"
                      ingredients:
                        type: array
                        items:
                          type: object
                          properties:
                            input:
                              type: object
                              properties:
                                foodId:
                                  type: string
                                  nullable: true
                                name:
                                  type: string
                                  nullable: true
                                grams:
                                  type: number
                                portionMultiplier:
                                  type: number
                            resolved:
                              type: boolean
                            resolvedAs:
                              type: object
                              nullable: true
                              properties:
                                entityId:
                                  type: string
                                name:
                                  type: string
                                nameEs:
                                  type: string
                                  nullable: true
                                matchType:
                                  type: string
                                yieldAdjustment:
                                  $ref: '#/components/schemas/YieldAdjustment'
                                  description: |
                                    Documents whether/how yield correction was applied for
                                    this ingredient (F072). Always present when the ingredient
                                    is resolved. Null when ingredient is unresolved.
                            nutrients:
                              $ref: "#/components/schemas/RecipeNutrients"
                              nullable: true
                      unresolvedIngredients:
                        type: array
                        items:
                          type: string
                      parsedIngredients:
                        type: array
                        description: Only present in free-form mode
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            grams:
                              type: number
                            portionMultiplier:
                              type: number
                      cachedAt:
                        type: string
                        format: date-time
                        nullable: true
                      portions:
                        type: integer
                        minimum: 1
                        maximum: 50
                        nullable: true
                        description: F087 — Number of portions the recipe was divided into. Null if not requested.
                      perPortion:
                        nullable: true
                        description: F087 — Per-portion nutrients (totalNutrients ÷ portions). Null if portions not requested.
                        allOf:
                          - $ref: "#/components/schemas/RecipeNutrients"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "408":
          description: Processing timeout (30s exceeded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Recipe unresolvable or free-form parse failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/queries:
    get:
      summary: Query log analytics
      description: |
        Aggregates query_logs into operational metrics. Admin-only.
        Returns totalQueries, cacheHitRate (4 decimals, 0 when empty), avgResponseTimeMs
        (null when empty), byLevel (l1/l2/l3/l4/miss counts), byChain (top chains by
        query volume), bySource (api/bot breakdown), and topQueries (top N terms).
        All counts are scoped by timeRange and optionally by chainSlug.
      operationId: getQueryAnalytics
      tags:
        - Analytics
      security:
        - AdminKeyAuth: []
      parameters:
        - name: timeRange
          in: query
          required: false
          schema:
            type: string
            enum: [24h, 7d, 30d, all]
            default: 7d
          description: Time window to scope the aggregation. 'all' applies no time filter.
        - name: chainSlug
          in: query
          required: false
          schema:
            type: string
            pattern: '^[a-z0-9-]+$'
          description: Optional chain slug to scope all aggregations to a single chain.
        - name: topN
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Maximum number of top query terms to return.
      responses:
        '200':
          description: Analytics aggregation successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsQueryResponse'
              example:
                success: true
                data:
                  totalQueries: 1500
                  cacheHitRate: 0.7500
                  avgResponseTimeMs: 42.5
                  byLevel:
                    l1: 900
                    l2: 200
                    l3: 300
                    l4: 50
                    miss: 50
                  byChain:
                    - chainSlug: mcdonalds-es
                      count: 800
                    - chainSlug: subway-es
                      count: 700
                  bySource:
                    api: 1200
                    bot: 300
                  topQueries:
                    - queryText: big mac
                      count: 150
                    - queryText: whopper
                      count: 120
                  timeRange: 7d
        '400':
          description: Validation error (invalid timeRange, topN out of range, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
        '401':
          description: Missing or invalid admin API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Unauthorized"
                  code: "UNAUTHORIZED"
        '500':
          description: Database unavailable during aggregation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Database query failed during analytics aggregation"
                  code: "DB_UNAVAILABLE"

  /analytics/missed-queries:
    get:
      summary: Top missed queries
      description: |
        Surfaces the most frequently missed queries (estimation cascade returning null
        across all 4 levels). Aggregates query_logs WHERE level_hit IS NULL, grouped by
        normalized query_text. LEFT JOINs missed_query_tracking for disposition status.
        Filters short queries (< 3 chars). Admin-only (F079).
      operationId: getMissedQueries
      tags:
        - Analytics
      security:
        - AdminKeyAuth: []
      parameters:
        - name: timeRange
          in: query
          required: false
          schema:
            type: string
            enum: [24h, 7d, 30d, all]
            default: 30d
          description: Time window for aggregation.
        - name: topN
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of missed queries to return.
        - name: minCount
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 2
          description: Minimum hit count threshold to include a query.
      responses:
        '200':
          description: Top missed queries with tracking status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      missedQueries:
                        type: array
                        items:
                          type: object
                          properties:
                            queryText:
                              type: string
                              example: gazpacho andaluz
                            count:
                              type: integer
                              example: 15
                            trackingId:
                              type: string
                              format: uuid
                              nullable: true
                            trackingStatus:
                              type: string
                              enum: [pending, resolved, ignored]
                              nullable: true
                      totalMissCount:
                        type: integer
                        example: 250
                      timeRange:
                        type: string
                        example: 30d
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /analytics/missed-queries/track:
    post:
      summary: Batch track missed queries
      description: |
        Creates tracking entries for missed queries (upsert on query_text).
        Used by the monthly expansion batch process. Admin-only (F079).
      operationId: batchTrackMissedQueries
      tags:
        - Analytics
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [queries]
              properties:
                queries:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [queryText, hitCount]
                    properties:
                      queryText:
                        type: string
                        minLength: 3
                        maxLength: 255
                      hitCount:
                        type: integer
                        minimum: 1
      responses:
        '200':
          description: Tracking entries created/updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
