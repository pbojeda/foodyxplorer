    # -------------------------------------------------------------------------
    # Quality Monitor (F018)
    # -------------------------------------------------------------------------

    QualityChainSummary:
      type: object
      description: Per-chain overview computed from check results. Sorted by issueCount DESC.
      required:
        - chainSlug
        - totalDishes
        - nutrientCoveragePercent
        - issueCount
      properties:
        chainSlug:
          type: string
          example: "mcdonalds-es"
        totalDishes:
          type: integer
          minimum: 0
          example: 178
        nutrientCoveragePercent:
          type: number
          minimum: 0
          maximum: 100
          description: "(totalDishes - dishesWithoutNutrients) / totalDishes * 100. Returns 0 when no dishes."
          example: 100.0
        issueCount:
          type: integer
          minimum: 0
          description: "Sum of: dishesWithoutNutrients + ghostRowCount + caloriesAboveThreshold + totalDuplicateDishes for this chain."
          example: 0

    QualityNutrientCompletenessChain:
      type: object
      description: Per-chain nutrient completeness breakdown.
      required:
        - chainSlug
        - totalDishes
        - dishesWithoutNutrients
        - ghostRowCount
        - zeroCaloriesCount
      properties:
        chainSlug:
          type: string
          example: "mcdonalds-es"
        totalDishes:
          type: integer
          minimum: 0
          example: 178
        dishesWithoutNutrients:
          type: integer
          minimum: 0
          description: Dishes with no DishNutrient row at all.
          example: 0
        ghostRowCount:
          type: integer
          minimum: 0
          description: |
            DishNutrient rows where ALL FOUR core macros (calories, proteins,
            carbohydrates, fats) are exactly 0 simultaneously. Reliable indicator
            of a failed or placeholder ingestion.
          example: 0
        zeroCaloriesCount:
          type: integer
          minimum: 0
          description: DishNutrient rows where calories = 0 (individually). More granular than ghostRowCount.
          example: 0

    QualityNutrientCompleteness:
      type: object
      required:
        - dishesWithNutrients
        - dishesWithoutNutrients
        - dishesWithoutNutrientsPercent
        - ghostRowCount
        - zeroCaloriesCount
        - byChain
      properties:
        dishesWithNutrients:
          type: integer
          minimum: 0
          description: Total dishes that have at least one DishNutrient row (totalDishes - dishesWithoutNutrients).
          example: 897
        dishesWithoutNutrients:
          type: integer
          minimum: 0
          description: Total dishes with no DishNutrient row.
          example: 3
        dishesWithoutNutrientsPercent:
          type: number
          minimum: 0
          maximum: 100
          description: dishesWithoutNutrients / totalDishes * 100, rounded to 2 decimal places. Returns 0 when totalDishes is 0.
          example: 0.33
        ghostRowCount:
          type: integer
          minimum: 0
          description: |
            DishNutrient rows where ALL FOUR core macros (calories, proteins,
            carbohydrates, fats) are exactly 0 simultaneously. Reliable indicator
            of a failed or placeholder ingestion.
          example: 2
        zeroCaloriesCount:
          type: integer
          minimum: 0
          description: DishNutrient rows where calories = 0 (individually). More granular — catches partial data.
          example: 3
        byChain:
          type: array
          items:
            $ref: '#/components/schemas/QualityNutrientCompletenessChain'

    QualityImplausibleValuesChain:
      type: object
      description: Per-chain implausible values breakdown.
      required:
        - chainSlug
        - caloriesAboveThreshold
        - ghostRows
        - suspiciouslyRoundCalories
      properties:
        chainSlug:
          type: string
          example: "mcdonalds-es"
        caloriesAboveThreshold:
          type: integer
          minimum: 0
          description: Dishes whose DishNutrient.calories > caloriesThreshold.
          example: 0
        ghostRows:
          type: integer
          minimum: 0
          description: |
            DishNutrient rows where ALL of calories, proteins, carbohydrates,
            and fats are simultaneously 0. These likely represent failed ingestion.
          example: 0
        suspiciouslyRoundCalories:
          type: integer
          minimum: 0
          description: |
            Dishes where calories >= 100 and calories % 100 == 0.
            Reported as informational — not necessarily an error.
          example: 3

    QualityImplausibleValues:
      type: object
      required:
        - caloriesAboveThreshold
        - caloriesThreshold
        - ghostRows
        - suspiciouslyRoundCalories
        - byChain
      properties:
        caloriesAboveThreshold:
          type: integer
          minimum: 0
          description: Global count of dishes with calories > caloriesThreshold.
          example: 0
        caloriesThreshold:
          type: integer
          description: The calories upper soft-limit used for this check (fixed at 5000).
          example: 5000
        ghostRows:
          type: integer
          minimum: 0
          description: Global count of DishNutrient ghost rows (all four core macros are 0).
          example: 0
        suspiciouslyRoundCalories:
          type: integer
          minimum: 0
          description: Global count of dishes with suspiciously round calorie values.
          example: 12
        byChain:
          type: array
          items:
            $ref: '#/components/schemas/QualityImplausibleValuesChain'

    QualityDataGaps:
      type: object
      description: |
        Counts of dishes with NULL optional fields and restaurants with no dishes.
        These are coverage metrics, not errors — NULL portionGrams and priceEur are
        valid states (data not available from the source).
      required:
        - dishesWithoutPortionGrams
        - dishesWithoutPriceEur
        - restaurantsWithoutDishes
      properties:
        dishesWithoutPortionGrams:
          type: integer
          minimum: 0
          description: Dishes where Dish.portionGrams IS NULL.
          example: 45
        dishesWithoutPriceEur:
          type: integer
          minimum: 0
          description: Dishes where Dish.priceEur IS NULL.
          example: 632
        restaurantsWithoutDishes:
          type: integer
          minimum: 0
          description: Restaurant rows with zero associated Dish rows.
          example: 0

    QualityDuplicateGroup:
      type: object
      description: A group of dishes sharing the same (name, restaurantId, sourceId).
      required:
        - name
        - chainSlug
        - count
        - dishIds
      properties:
        name:
          type: string
          description: The shared dish name.
          example: "Coca-Cola Zero"
        chainSlug:
          type: string
          example: "mcdonalds-es"
        count:
          type: integer
          minimum: 2
          description: Number of duplicate dishes in this group.
          example: 2
        dishIds:
          type: array
          description: UUIDs of all dishes in the duplicate group.
          items:
            type: string
            format: uuid
          example: ["uuid-a", "uuid-b"]

    QualityDuplicates:
      type: object
      required:
        - duplicateGroupCount
        - totalDuplicateDishes
        - groups
      properties:
        duplicateGroupCount:
          type: integer
          minimum: 0
          description: Number of distinct duplicate groups found.
          example: 2
        totalDuplicateDishes:
          type: integer
          minimum: 0
          description: |
            Total number of duplicate dish rows (sum of `count` across all groups).
            The "extra" duplicates would be totalDuplicateDishes - duplicateGroupCount.
          example: 5
        groups:
          type: array
          description: Detail of each duplicate group. Empty array when no duplicates exist.
          items:
            $ref: '#/components/schemas/QualityDuplicateGroup'

    QualityConfidenceByEstimationMethod:
      type: object
      description: Dish counts by estimation method.
      required:
        - official
        - scraped
        - ingredients
        - extrapolation
        - llm
      properties:
        official:
          type: integer
          minimum: 0
          example: 514
        scraped:
          type: integer
          minimum: 0
          example: 386
        ingredients:
          type: integer
          minimum: 0
          example: 0
        extrapolation:
          type: integer
          minimum: 0
          example: 0
        llm:
          type: integer
          minimum: 0
          description: |
            Dishes estimated via Level 4 LLM identification (F024). Includes both
            llm_food_match and llm_ingredient_decomposition match types.
          example: 0

    QualityConfidenceChain:
      type: object
      description: Per-chain confidence level and estimation method breakdown.
      required:
        - chainSlug
        - high
        - medium
        - low
        - byEstimationMethod
      properties:
        chainSlug:
          type: string
          example: "mcdonalds-es"
        high:
          type: integer
          minimum: 0
          example: 0
        medium:
          type: integer
          minimum: 0
          example: 178
        low:
          type: integer
          minimum: 0
          example: 0
        byEstimationMethod:
          $ref: '#/components/schemas/QualityConfidenceByEstimationMethod'

    QualityConfidenceDistribution:
      type: object
      required:
        - global
        - byEstimationMethod
        - byChain
      properties:
        global:
          type: object
          description: Global dish counts by confidence level.
          required:
            - high
            - medium
            - low
          properties:
            high:
              type: integer
              minimum: 0
              example: 514
            medium:
              type: integer
              minimum: 0
              example: 386
            low:
              type: integer
              minimum: 0
              example: 0
        byEstimationMethod:
          $ref: '#/components/schemas/QualityConfidenceByEstimationMethod'
        byChain:
          type: array
          items:
            $ref: '#/components/schemas/QualityConfidenceChain'

    QualityStaleSource:
      type: object
      description: A DataSource row that is considered stale.
      required:
        - sourceId
        - name
        - lastUpdated
        - daysSinceUpdate
      properties:
        sourceId:
          type: string
          format: uuid
          example: "uuid-source"
        name:
          type: string
          description: DataSource.name
          example: "McDonald's Spain Official PDF"
        lastUpdated:
          type: string
          format: date-time
          nullable: true
          description: |
            DataSource.lastUpdated as ISO-8601 string. null when the field has never
            been set (treated as stale — daysSinceUpdate will be null in this case).
          example: "2025-11-01T00:00:00.000Z"
        daysSinceUpdate:
          type: integer
          nullable: true
          minimum: 0
          description: |
            Number of full days elapsed since lastUpdated. null when lastUpdated IS NULL.
          example: 136

    QualityDataFreshness:
      type: object
      required:
        - totalSources
        - staleSources
        - staleSourcesDetail
      properties:
        totalSources:
          type: integer
          minimum: 0
          description: Total DataSource rows in scope (all or filtered by chainSlug).
          example: 8
        staleSources:
          type: integer
          minimum: 0
          description: |
            DataSource rows where lastUpdated IS NULL or lastUpdated is older than
            stalenessThresholdDays days ago.
          example: 1
        staleSourcesDetail:
          type: array
          description: One entry per stale DataSource. Empty array when none are stale.
          items:
            $ref: '#/components/schemas/QualityStaleSource'

    QualityReportData:
      type: object
      description: The quality report payload returned in the `data` envelope.
      required:
        - generatedAt
        - totalDishes
        - totalRestaurants
        - stalenessThresholdDays
        - scopedToChain
        - chainSummary
        - nutrientCompleteness
        - implausibleValues
        - dataGaps
        - duplicates
        - confidenceDistribution
        - dataFreshness
      properties:
        generatedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the report was generated (server time).
          example: "2026-03-17T10:00:00.000Z"
        totalDishes:
          type: integer
          minimum: 0
          description: Total Dish rows in scope at report time.
          example: 900
        totalRestaurants:
          type: integer
          minimum: 0
          description: Total Restaurant rows in scope at report time.
          example: 7
        stalenessThresholdDays:
          type: integer
          minimum: 1
          description: The staleness threshold used for the dataFreshness check.
          example: 90
        scopedToChain:
          type: string
          nullable: true
          description: The chainSlug filter applied, or null for a global report.
          example: null
        chainSummary:
          type: array
          description: Per-chain overview sorted by issueCount DESC. Computed from check results, no extra DB queries.
          items:
            $ref: '#/components/schemas/QualityChainSummary'
        nutrientCompleteness:
          $ref: '#/components/schemas/QualityNutrientCompleteness'
        implausibleValues:
          $ref: '#/components/schemas/QualityImplausibleValues'
        dataGaps:
          $ref: '#/components/schemas/QualityDataGaps'
        duplicates:
          $ref: '#/components/schemas/QualityDuplicates'
        confidenceDistribution:
          $ref: '#/components/schemas/QualityConfidenceDistribution'
        dataFreshness:
          $ref: '#/components/schemas/QualityDataFreshness'

    QualityReportResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/QualityReportData'

    # -------------------------------------------------------------------------
    # Embeddings (F019)
    # -------------------------------------------------------------------------

    EmbeddingGenerateRequest:
      type: object
      required:
        - target
      properties:
        target:
          type: string
          enum: [foods, dishes, all]
          description: |
            Which entity type(s) to embed.
            - `foods`: only the `foods` table
            - `dishes`: only the `dishes` table
            - `all`: both tables in sequence (foods first, then dishes)
          example: all
        chainSlug:
          type: string
          pattern: "^[a-z0-9-]+$"
          minLength: 1
          maxLength: 100
          nullable: true
          description: |
            When provided, restricts dish embedding to a single restaurant chain
            (matched against `Restaurant.chainSlug`). Ignored when `target` is
            `foods`. When omitted, all dishes are in scope.
          example: "mcdonalds-es"
        batchSize:
          type: integer
          minimum: 1
          maximum: 2048
          default: 100
          description: |
            Number of items to embed per OpenAI API call. OpenAI supports up to
            2048 inputs per request for text-embedding-3-small. Defaults to the
            value of the `OPENAI_EMBEDDING_BATCH_SIZE` env var (default: 100).
          example: 100
        force:
          type: boolean
          default: false
          description: |
            When false (default), items whose embedding column is already non-zero
            are skipped. When true, all items in scope are re-embedded unconditionally.
          example: false
        dryRun:
          type: boolean
          default: false
          description: |
            When true, the pipeline counts items and estimates token usage but
            makes no OpenAI API calls and performs no DB writes. Useful for
            cost estimation before running in production.
          example: false

    EmbeddingItemError:
      type: object
      required:
        - itemType
        - itemId
        - itemName
        - reason
      properties:
        itemType:
          type: string
          enum: [food, dish]
          description: Which entity failed.
          example: dish
        itemId:
          type: string
          format: uuid
          description: The UUID of the entity that failed.
          example: "00000000-0000-0000-0001-000000000042"
        itemName:
          type: string
          description: The display name of the entity (for human-readable error reports).
          example: "Producto sin nombre"
        reason:
          type: string
          description: Human-readable failure reason (API error message or timeout).
          example: "OpenAI API error: rate limit exceeded after 3 retries"

    EmbeddingGenerateData:
      type: object
      required:
        - target
        - dryRun
        - processedFoods
        - processedDishes
        - skippedFoods
        - skippedDishes
        - errorCount
        - errors
        - estimatedTokens
        - durationMs
        - completedAt
      properties:
        target:
          type: string
          enum: [foods, dishes, all]
          description: The target that was processed.
          example: all
        dryRun:
          type: boolean
          description: Whether this was a dry run (no writes performed).
          example: false
        processedFoods:
          type: integer
          minimum: 0
          description: |
            Number of food embeddings successfully written (0 when dryRun: true
            or when target is dishes).
          example: 120
        processedDishes:
          type: integer
          minimum: 0
          description: |
            Number of dish embeddings successfully written (0 when dryRun: true
            or when target is foods).
          example: 900
        skippedFoods:
          type: integer
          minimum: 0
          description: |
            Foods skipped because they already had a non-zero embedding and
            force: false.
          example: 0
        skippedDishes:
          type: integer
          minimum: 0
          description: |
            Dishes skipped because they already had a non-zero embedding and
            force: false.
          example: 0
        errorCount:
          type: integer
          minimum: 0
          description: Number of items that failed. Details are in the `errors` array.
          example: 0
        errors:
          type: array
          description: Per-item failure details. Empty array on full success.
          items:
            $ref: '#/components/schemas/EmbeddingItemError'
        estimatedTokens:
          type: integer
          minimum: 0
          description: |
            Estimated total token count consumed (or would be consumed in dryRun).
            Based on whitespace-separated word count × 1.3 (conservative heuristic).
          example: 185000
        durationMs:
          type: integer
          minimum: 0
          description: Wall-clock duration of the pipeline in milliseconds.
          example: 42300
        completedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the pipeline finished.
          example: "2026-03-17T10:05:00.000Z"

    EmbeddingGenerateResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/EmbeddingGenerateData'

    # -------------------------------------------------------------------------
    # System / Infrastructure
    # -------------------------------------------------------------------------

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - version
        - uptime
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        timestamp:
          type: string
          format: date-time
          example: "2026-03-11T10:00:00.000Z"
        version:
          type: string
          description: Package version from package.json
          example: "0.1.0"
        uptime:
          type: number
          description: Process uptime in seconds
          example: 42.3
        db:
          type: string
          enum: [connected, unavailable]
          description: |
            Present only when ?db=true is passed. Reflects whether a lightweight
            SELECT 1 succeeded against the PostgreSQL database.
          example: connected
        redis:
          type: string
          enum: [connected, unavailable]
          description: |
            Present only when ?redis=true is passed. Reflects whether a Redis PING
            succeeded against the configured Redis instance.
          example: connected

    # -------------------------------------------------------------------------
    # Shared response envelopes
    # -------------------------------------------------------------------------

    DishAvailability:
      type: string
      enum: [available, seasonal, discontinued, regional]
      example: available
      description: Availability status of a dish.

    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - message
            - code
          properties:
            message:
              type: string
              example: "Validation failed"
            code:
              type: string
              example: "VALIDATION_ERROR"
            details:
              type: array
              description: |
                Present on validation errors (400). Each item identifies the
                failing field and reason, matching Zod's ZodError.issues shape.
              items:
                type: object
                required:
                  - path
                  - message
                properties:
                  path:
                    type: array
                    items:
                      type: string
                    example: ["name"]
                  message:
                    type: string
                    example: "Required"
                  code:
                    type: string
                    example: "invalid_type"

    SuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

    PaginatedResponse:
      type: object
      required:
        - success
        - data
        - pagination
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
        pagination:
          type: object
          required:
            - page
            - pageSize
            - totalItems
            - totalPages
          properties:
            page:
              type: integer
              example: 1
            pageSize:
              type: integer
              example: 20
            totalItems:
              type: integer
              example: 150
            totalPages:
              type: integer
              example: 8

    # -------------------------------------------------------------------------
    # F034 / Analysis schemas
    # -------------------------------------------------------------------------

    MenuAnalysisDish:
      type: object
      description: |
        A single dish extracted from the menu (or identified from a food photo), together
        with the result of running the estimation cascade on its name. `estimate` is null
        when the cascade returns a total miss across all four levels; the dish is still
        included in the response for transparency.
      required:
        - dishName
        - estimate
      properties:
        dishName:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            The dish name as extracted by OCR or Vision API, after basic trimming.
            This is the raw string passed to `runEstimationCascade` as `query`.
          example: "Big Mac"
        estimate:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EstimateData'
          description: |
            Full estimation cascade result for this dish name. Null when all four
            cascade levels returned a miss (no matching dish or food found).

    MenuAnalysisData:
      type: object
      description: |
        Payload returned by POST /analyze/menu on success. Contains the resolved
        processing mode, total dish count, and per-dish estimation results.
      required:
        - mode
        - dishCount
        - dishes
        - partial
      properties:
        mode:
          type: string
          enum: [auto, ocr, vision, identify]
          description: |
            The processing mode actually used. For `auto`, this echoes `auto` (not the
            resolved pipeline name) so callers can correlate with their request.
          example: auto
        dishCount:
          type: integer
          minimum: 1
          description: |
            Number of dish names extracted (and included in dishes array). Always ≥ 1
            in a 200 response. For `identify` mode, dishCount is always 1.
          example: 3
        partial:
          type: boolean
          default: false
          description: |
            True when the 60-second timeout was reached while processing cascade calls
            for individual dishes. The response contains only the dishes processed before
            the timeout, not all extracted names. False in normal (complete) responses.
          example: false
        dishes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/MenuAnalysisDish'
          description: |
            Per-dish results in the order the names were extracted. Length equals
            dishCount. Dishes with no cascade match have `estimate: null`.
            For `identify` mode, this array contains exactly 1 entry.

    MenuAnalysisResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
          example: true
        data:
          $ref: '#/components/schemas/MenuAnalysisData'

    # -------------------------------------------------------------------------
    # Estimation Engine (E003 / F020)
    # -------------------------------------------------------------------------

    RecipeNutrients:
      type: object
      description: |
        Nutrient profile for a recipe ingredient or recipe total (F035).
        Same 14 fields as EstimateNutrients but all values are nullable:
        if a nutrient is null for ALL resolved ingredients, the field is null (not 0).
        referenceBasis is always "per_serving" for recipe results.
      properties:
        calories:
          type: number
          minimum: 0
          nullable: true
        proteins:
          type: number
          minimum: 0
          nullable: true
        carbohydrates:
          type: number
          minimum: 0
          nullable: true
        sugars:
          type: number
          minimum: 0
          nullable: true
        fats:
          type: number
          minimum: 0
          nullable: true
        saturatedFats:
          type: number
          minimum: 0
          nullable: true
        fiber:
          type: number
          minimum: 0
          nullable: true
        salt:
          type: number
          minimum: 0
          nullable: true
        sodium:
          type: number
          minimum: 0
          nullable: true
        transFats:
          type: number
          minimum: 0
          nullable: true
        cholesterol:
          type: number
          minimum: 0
          nullable: true
        potassium:
          type: number
          minimum: 0
          nullable: true
        monounsaturatedFats:
          type: number
          minimum: 0
          nullable: true
        polyunsaturatedFats:
          type: number
          minimum: 0
          nullable: true
        alcohol:
          type: number
          minimum: 0
          nullable: true
          description: Alcohol in grams (F077). 7 kcal/g. BEDCA tagname ALC.
        referenceBasis:
          type: string
          enum: [per_serving]
          description: Always "per_serving" for recipe results.

    EstimateNutrients:
      type: object
      description: |
        Full nutrient profile for a matched dish or food. All values are plain numbers
        (not Prisma Decimal). Prisma Decimal values are converted via .toNumber() before
        populating this schema (same pattern as QualityReport checks).
      required:
        - calories
        - proteins
        - carbohydrates
        - sugars
        - fats
        - saturatedFats
        - fiber
        - salt
        - sodium
        - transFats
        - cholesterol
        - potassium
        - monounsaturatedFats
        - polyunsaturatedFats
        - alcohol
        - referenceBasis
      properties:
        calories:
          type: number
          minimum: 0
          example: 550
        proteins:
          type: number
          minimum: 0
          example: 25
        carbohydrates:
          type: number
          minimum: 0
          example: 46
        sugars:
          type: number
          minimum: 0
          example: 9
        fats:
          type: number
          minimum: 0
          example: 28
        saturatedFats:
          type: number
          minimum: 0
          example: 10
        fiber:
          type: number
          minimum: 0
          example: 3
        salt:
          type: number
          minimum: 0
          description: Grams. Derived from sodium if not directly stated (salt_g = sodium_mg / 1000 * 2.5).
          example: 2.2
        sodium:
          type: number
          minimum: 0
          description: Milligrams. Derived from salt if not directly stated.
          example: 880
        transFats:
          type: number
          minimum: 0
          default: 0
          example: 0.5
        cholesterol:
          type: number
          minimum: 0
          default: 0
          example: 80
        potassium:
          type: number
          minimum: 0
          default: 0
          example: 0
        monounsaturatedFats:
          type: number
          minimum: 0
          default: 0
          example: 0
        polyunsaturatedFats:
          type: number
          minimum: 0
          default: 0
          example: 0
        alcohol:
          type: number
          minimum: 0
          default: 0
          description: Alcohol in grams (F077). 7 kcal/g. BEDCA tagname ALC.
          example: 0
        referenceBasis:
          type: string
          enum: [per_100g, per_serving, per_package]
          description: |
            Passed through from the database row. Typically "per_serving" for chain dishes
            (ADR-004), "per_100g" for USDA base foods.
          example: per_serving

    EstimateSource:
      type: object
      description: |
        Traceability block identifying the DataSource row from which the nutritional
        data was read. Satisfies the ADR-001 auditability requirement.
      required:
        - id
        - name
        - type
        - url
      properties:
        id:
          type: string
          format: uuid
          description: UUID of the data_sources row.
          example: "00000000-0000-0000-0000-000000000001"
        name:
          type: string
          description: Human-readable source name (e.g. "McDonald's Spain Official PDF").
          example: "McDonald's Spain Official PDF"
        type:
          type: string
          enum: [official, estimated, scraped, user]
          description: DataSource.type enum value.
          example: official
        url:
          type: string
          nullable: true
          description: Source URL if available; null for USDA seed data.
          example: "https://www.mcdonalds.es/.../nutritional.pdf"
        priorityTier:
          type: integer
          nullable: true
          minimum: 0
          maximum: 3
          description: |
            Data source priority tier (ADR-015, F068). Lower = higher priority.
            Tier 0: Brand/restaurant official (chain PDFs, supermarket packaging).
            Tier 1: National reference (BEDCA lab data).
            Tier 2: International reference (USDA).
            Tier 3: Estimated (engine L2-L4, LLM-bootstrapped, community).
          example: 0
        attributionNote:
          type: string
          nullable: true
          description: |
            ODbL-required attribution note (F080). Non-null only when the result
            originates from Open Food Facts data. Format:
            "Valores de referencia: {product_name_es} (plato preparado industrial)".
            Null for all non-OFF sources.
          example: "Valores de referencia: Tortilla de Patatas Hacendado (plato preparado industrial)"
        license:
          type: string
          nullable: true
          description: |
            Data license identifier (F080). "ODbL 1.0" for Open Food Facts results.
            Null for all other sources.
          example: "ODbL 1.0"
        sourceUrl:
          type: string
          format: uri
          nullable: true
          description: |
            Direct URL to the original product on the source database (F080).
            For OFF products with a barcode:
            "https://world.openfoodfacts.org/product/{barcode}".
            Null when the OFF product has no barcode, or when source is not OFF.
          example: "https://world.openfoodfacts.org/product/8480000123456"

    EstimateResult:
      type: object
      description: |
        The matched entity (dish or food) with its full nutrient profile. Present when any
        level hit flag is true; null when no match was found at any level.
      required:
        - entityType
        - entityId
        - name
        - nameEs
        - restaurantId
        - chainSlug
        - portionGrams
        - nutrients
        - confidenceLevel
        - estimationMethod
        - source
        - similarityDistance
      properties:
        entityType:
          type: string
          enum: [dish, food]
          description: |
            "dish" — matched a restaurants.dishes row (chain-specific).
            "food" — matched a foods row (USDA generic, chain-agnostic).
          example: dish
        entityId:
          type: string
          format: uuid
          description: UUID of the matched dishes or foods row.
          example: "uuid-of-dish"
        name:
          type: string
          description: Canonical name of the matched entity (English or chain original).
          example: "Big Mac"
        nameEs:
          type: string
          nullable: true
          description: Spanish name if available; null for many USDA foods.
          example: "Big Mac"
        restaurantId:
          type: string
          format: uuid
          nullable: true
          description: UUID of the restaurant owning this dish. Null when entityType is "food".
          example: "uuid-of-restaurant"
        chainSlug:
          type: string
          nullable: true
          description: Chain slug of the owning restaurant. Null when entityType is "food".
          example: "mcdonalds-es"
        portionGrams:
          type: number
          nullable: true
          description: |
            Dish portion weight in grams if available. Null for most chain dishes
            (portion is implicit in the per_serving nutrients) and for generic foods.
          example: 200
        nutrients:
          $ref: '#/components/schemas/EstimateNutrients'
        confidenceLevel:
          type: string
          enum: [high, medium, low]
          description: |
            Reflects the estimation method used:
            - "high"   — Level 1 official data (always high for L1 results).
            - "medium" — Level 2 ingredient-based, all ingredients resolved;
                         OR Level 4 Strategy A (LLM food match, full resolution);
                         OR Level 4 Strategy B (LLM decomposition, all ingredients resolved).
            - "low"    — Level 2 ingredient-based, some ingredients unresolvable (partial sum);
                         OR Level 3 similarity extrapolation (always low — nutrients come from
                         a different but semantically similar entity);
                         OR Level 4 Strategy B with some unresolvable ingredients.
          example: high
        estimationMethod:
          type: string
          enum: [official, ingredients, extrapolation, scraped, llm]
          description: |
            How the nutritional values were produced:
            - "official"     — Level 1: read directly from dish_nutrients or food_nutrients.
            - "ingredients"  — Level 2: aggregated from dish_ingredients via food_nutrients.
            - "llm"          — Level 4: LLM identified the food or decomposed the dish; nutrients
                               still come from food_nutrients (LLM never calculates values).
            - "extrapolation"— Level 3: nutrients copied from the nearest pgvector neighbour.
            - "scraped"      — data sourced by the scraper pipeline (not produced by the engine).
          example: official
        source:
          $ref: '#/components/schemas/EstimateSource'
          description: |
            Traceability block. For Level 1 results, points to the data_sources row of the
            matched dish_nutrients or food_nutrients record. For Level 2 results, this is a
            synthetic computed provenance marker: source.id is the dish's data_sources UUID,
            source.name is "Computed from ingredients", source.type is "estimated". For Level 3
            results, points to the data_sources row of the similar entity (dish or food) that
            was the nearest neighbour — the original entity's source, not a synthetic one.
            For Level 4 results, this is a synthetic provenance marker:
            source.id is a seed data_sources row UUID, source.name is
            "LLM-assisted identification", source.type is "estimated", source.url is null.
        similarityDistance:
          type: number
          nullable: true
          description: |
            Cosine distance between the query embedding and the matched entity's embedding.
            Range: [0.0, 2.0] — 0.0 is identical, 2.0 is opposite. Only present and non-null
            when `estimationMethod` is `"extrapolation"` (Level 3 hit). Null for Level 1,
            Level 2, and Level 4 results.
          example: 0.18

    EstimateData:
      type: object
      description: |
        The full payload for a GET /estimate response. Covers all four estimation levels
        (L1 + L2 + L3 + L4). F023 (Engine Router) uses this schema without modifications —
        the cascade output maps directly into this shape.
      required:
        - query
        - chainSlug
        - portionMultiplier
        - level1Hit
        - level2Hit
        - level3Hit
        - level4Hit
        - matchType
        - result
        - cachedAt
      properties:
        query:
          type: string
          description: The query string as received (trimmed).
          example: "Big Mac"
        chainSlug:
          type: string
          nullable: true
          description: The chainSlug parameter as provided, or null if omitted.
          example: "mcdonalds-es"
        portionMultiplier:
          type: number
          format: float
          minimum: 0.1
          maximum: 5.0
          description: |
            The effective portion multiplier applied uniformly to all nutrient values and
            portionGrams in this response (F042). Always present. Echoes the `portionMultiplier`
            query param when supplied; 1.0 when the param was absent (no scaling). Applied to
            all matchTypes including `llm_ingredient_decomposition` — the bot strips modifiers
            before calling, so the multiplier is always applied by the route handler.
          example: 1.5
        level1Hit:
          type: boolean
          description: |
            True if Level 1 (official data lookup) produced a match. When true, level2Hit
            and level3Hit are always false (lower levels not attempted after a Level 1 hit).
          example: true
        level2Hit:
          type: boolean
          description: |
            True if Level 2 (ingredient-based estimation) produced a match. Only possible
            when level1Hit is false. When true, level3Hit is always false.
          example: false
        level3Hit:
          type: boolean
          description: |
            True if Level 3 (pgvector similarity extrapolation) produced a match. Only
            possible when both level1Hit and level2Hit are false. False when any upper level
            hit, when OPENAI_API_KEY is not configured (graceful skip), when the OpenAI
            call fails, or when no similar entity is within the cosine distance threshold.
          example: false
        level4Hit:
          type: boolean
          description: |
            True if Level 4 (LLM identification) produced a match. Only possible when
            level1Hit, level2Hit, and level3Hit are all false. False when any upper level hit,
            when OPENAI_API_KEY or OPENAI_CHAT_MODEL is not configured (graceful skip),
            when the OpenAI chat completion call fails, or when the LLM response cannot be
            resolved to a known DB entity.
          example: false
        matchType:
          type: string
          nullable: true
          enum:
            - exact_dish
            - fts_dish
            - exact_food
            - fts_food
            - ingredient_dish_exact
            - ingredient_dish_fts
            - similarity_dish
            - similarity_food
            - llm_food_match
            - llm_ingredient_decomposition
          description: |
            Which strategy produced the match.
            Level 1 strategies:
            - exact_dish                  — case-insensitive exact match on dishes.name
            - fts_dish                    — FTS match on dishes (Spanish or English)
            - exact_food                  — case-insensitive exact match on foods.name_es or foods.name
            - fts_food                    — FTS match on foods (Spanish or English)
            Level 2 strategies:
            - ingredient_dish_exact       — case-insensitive exact match on dishes.name, aggregated
                                            from dish_ingredients
            - ingredient_dish_fts         — FTS match on dishes.name/name_es, aggregated from
                                            dish_ingredients
            Level 3 strategies:
            - similarity_dish             — nearest-neighbour pgvector cosine match on dishes.embedding
            - similarity_food             — nearest-neighbour pgvector cosine match on foods.embedding
                                            (dishes searched first; foods are the fallback)
            Level 4 strategies:
            - llm_food_match              — LLM identified the closest known food in the DB
                                            (Strategy A). Nutrients come from food_nutrients.
            - llm_ingredient_decomposition — LLM decomposed the query into known ingredients,
                                            aggregated via L2-style arithmetic (Strategy B).
                                            Nutrients are computed from resolved food_nutrients rows.
            Null when all four level hit flags are false (total miss).
          example: exact_dish
        result:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EstimateResult'
          description: |
            The matched entity with nutrients and source. Null when all four level hit flags
            are false. Non-null when any level produces a result.
        cachedAt:
          type: string
          nullable: true
          description: |
            ISO-8601 timestamp when this result was written to Redis cache. Non-null means
            the data was served from cache and may be up to 300 seconds old. Null means
            the data was retrieved live from the DB during this request.
          example: "2026-03-17T10:04:55.000Z"
        healthHackerTips:
          type: array
          items:
            $ref: '#/components/schemas/HealthHackerTip'
          description: |
            F081 — Health-Hacker calorie-saving modification tips for chain dishes.
            Only present when: (a) result is a chain dish, (b) chainSlug maps to a
            known category, (c) calories >= 200. Omitted when no tips apply.
          example:
            - tip: "Ensalada en lugar de patatas fritas"
              caloriesSaved: 200
            - tip: "Sin salsa especial"
              caloriesSaved: 80
        substitutions:
          type: array
          items:
            $ref: '#/components/schemas/NutritionalSubstitution'
          description: |
            F082 — Nutritional substitution suggestions with multi-nutrient diffs.
            Triggers on food-name keyword matching. Applies to ALL estimations.
            Only present when: (a) food name matches a substitution pattern,
            (b) calories >= 200. Omitted when no substitutions apply. Max 2.
          example:
            - original: "Patatas fritas"
              substitute: "Ensalada verde"
              nutrientDiff:
                calories: -275
                proteins: 1
                fats: -15
                carbohydrates: -38
                fiber: 2
        allergens:
          type: array
          items:
            $ref: '#/components/schemas/DetectedAllergen'
          description: |
            F083 — Detected allergens from food/dish name keyword matching.
            Based on 14 EU-regulated allergen categories. Multiple allergens
            can be detected per dish. Omitted when no allergens detected.
            Heuristic detection — for informational purposes only.
          example:
            - allergen: "Gluten"
              keyword: "pizza"
            - allergen: "Lácteos"
              keyword: "queso"
        portionSizing:
          $ref: '#/components/schemas/PortionSizing'
          description: |
            F085 — Detected Spanish portion term with standard gram range.
            Present when the query contains a recognized portion term
            (e.g., "media ración", "tapa", "pintxo"). Informational only.
        uncertaintyRange:
          $ref: '#/components/schemas/UncertaintyRange'
          description: |
            F084 — Calorie uncertainty range based on confidence level and
            estimation method. Percentage varies from ±5% (high confidence,
            official data) to ±30% (low confidence, LLM estimation).
            Present when result is non-null; omitted when result is null.

    HealthHackerTip:
      type: object
      required:
        - tip
        - caloriesSaved
      properties:
        tip:
          type: string
          description: Human-readable modification tip in Spanish.
          example: "Ensalada en lugar de patatas fritas"
        caloriesSaved:
          type: number
          minimum: 1
          description: Estimated calories saved by applying this modification.
          example: 200

    NutritionalSubstitution:
      type: object
      required:
        - original
        - substitute
        - nutrientDiff
      properties:
        original:
          type: string
          description: Display name of the original food component.
          example: "Patatas fritas"
        substitute:
          type: string
          description: Display name of the suggested substitute.
          example: "Ensalada verde"
        nutrientDiff:
          type: object
          required:
            - calories
            - proteins
            - fats
            - carbohydrates
            - fiber
          properties:
            calories:
              type: number
              description: Calorie difference (negative = fewer calories).
              example: -275
            proteins:
              type: number
              description: Protein difference in grams.
              example: 1
            fats:
              type: number
              description: Fat difference in grams.
              example: -15
            carbohydrates:
              type: number
              description: Carbohydrate difference in grams.
              example: -38
            fiber:
              type: number
              description: Fiber difference in grams.
              example: 2

    DetectedAllergen:
      type: object
      required:
        - allergen
        - keyword
      properties:
        allergen:
          type: string
          description: EU allergen category name in Spanish.
          example: "Gluten"
        keyword:
          type: string
          description: The keyword that triggered the allergen detection.
          example: "pizza"

    PortionSizing:
      type: object
      required:
        - term
        - gramsMin
        - gramsMax
        - description
      properties:
        term:
          type: string
          description: Detected Spanish portion term.
          example: "media ración"
        gramsMin:
          type: integer
          minimum: 1
          description: Lower bound of typical gram weight.
          example: 100
        gramsMax:
          type: integer
          minimum: 1
          description: Upper bound of typical gram weight.
          example: 125
        description:
          type: string
          description: Human-readable description in Spanish.
          example: "Media ración estándar española"

    UncertaintyRange:
      type: object
      required:
        - caloriesMin
        - caloriesMax
        - percentage
      properties:
        caloriesMin:
          type: integer
          minimum: 0
          description: Lower bound of the calorie range.
          example: 332
        caloriesMax:
          type: integer
          minimum: 0
          description: Upper bound of the calorie range.
          example: 368
        percentage:
          type: number
          minimum: 0
          maximum: 100
          description: Uncertainty percentage used (e.g., 5 for ±5%).
          example: 5

    ReverseSearchResult:
      type: object
      description: "F086: Single dish matching reverse search constraints."
      required:
        - name
        - nameEs
        - calories
        - proteins
        - fats
        - carbohydrates
        - portionGrams
        - proteinDensity
      properties:
        name:
          type: string
          description: Dish name (original locale).
        nameEs:
          type: string
          nullable: true
          description: Dish name in Spanish.
        calories:
          type: number
          minimum: 0
        proteins:
          type: number
          minimum: 0
        fats:
          type: number
          minimum: 0
        carbohydrates:
          type: number
          minimum: 0
        portionGrams:
          type: number
          nullable: true
          description: Serving size in grams.
        proteinDensity:
          type: number
          minimum: 0
          description: "proteins / calories * 100"

    ReverseSearchData:
      type: object
      description: "F086: Reverse search response payload."
      required:
        - chainSlug
        - chainName
        - maxCalories
        - minProtein
        - results
        - totalMatches
      properties:
        chainSlug:
          type: string
        chainName:
          type: string
        maxCalories:
          type: number
        minProtein:
          type: number
          nullable: true
        results:
          type: array
          items:
            $ref: "#/components/schemas/ReverseSearchResult"
        totalMatches:
          type: integer
          minimum: 0

    EstimateResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/EstimateData'

    # -------------------------------------------------------------------------
    # F025 / F032 Catalog schemas
    # -------------------------------------------------------------------------

    PaginationMeta:
      type: object
      required: [page, pageSize, totalItems, totalPages]
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 3
          description: Math.ceil(totalItems / pageSize). 0 when totalItems is 0.

    RestaurantListItem:
      type: object
      required: [id, name, chainSlug, countryCode, isActive, dishCount]
      description: |
        A restaurant as returned by GET /restaurants. `chainSlug` is always present in the
        response (never null) — independent restaurants have a server-generated slug with
        the `independent-` prefix.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "McDonald's Spain"
        nameEs:
          type: string
          nullable: true
          example: "McDonald's España"
        chainSlug:
          type: string
          description: |
            Chain slug for chain restaurants (e.g. "mcdonalds-es"). For independent
            restaurants this is auto-generated as "independent-<name-slug>-<uuid-short>"
            and is never null in the response.
          example: "mcdonalds-es"
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          example: "ES"
        isActive:
          type: boolean
          example: true
        logoUrl:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
          example: "https://www.mcdonalds.es"
        address:
          type: string
          nullable: true
          maxLength: 500
          description: Free-text street address. Null if not provided at creation time.
          example: "Paseo de Gracia, 40, 08007 Barcelona"
        latitude:
          type: number
          nullable: true
          minimum: -90
          maximum: 90
          description: GPS latitude (decimal degrees). Null if not provided.
          example: 41.3917
        longitude:
          type: number
          nullable: true
          minimum: -180
          maximum: 180
          description: GPS longitude (decimal degrees). Null if not provided.
          example: 2.1650
        googleMapsUrl:
          type: string
          nullable: true
          description: |
            URL to the Google Maps listing. Phase 1 — caller provides full URL manually.
            Phase 2 — bot auto-fills from short link.
          example: null
        dishCount:
          type: integer
          minimum: 0
          example: 127

    CreateRestaurantBody:
      type: object
      description: |
        Request body for POST /restaurants. `chainSlug` is optional — omit it to create
        an independent restaurant (server auto-generates the slug). `name` is required;
        all location fields are optional (Phase 1 — manual entry only).
      required:
        - name
        - countryCode
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Restaurant name (English or primary language).
          example: "La Tasca de Pepe"
        nameEs:
          type: string
          maxLength: 255
          nullable: true
          description: Spanish name if different from `name`. Null if not applicable.
          example: null
        chainSlug:
          type: string
          pattern: '^[a-z0-9-]+$'
          minLength: 1
          maxLength: 100
          description: |
            Chain slug for chain restaurants. Must match the pattern `^[a-z0-9-]+$`.
            Omit for independent restaurants — the server auto-generates a slug as
            `independent-<name-slugified>-<uuid-short>`.
          example: "mcdonalds-es"
        countryCode:
          type: string
          pattern: '^[A-Z]{2}$'
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code (uppercase).
          example: "ES"
        website:
          type: string
          nullable: true
          description: Full URL to the restaurant's website.
          example: "https://www.mcdonalds.es"
        logoUrl:
          type: string
          nullable: true
          description: Full URL to the restaurant's logo image.
          example: null
        address:
          type: string
          nullable: true
          maxLength: 500
          description: Free-text street address.
          example: "Calle Mayor, 12, 28013 Madrid"
        latitude:
          type: number
          nullable: true
          minimum: -90
          maximum: 90
          description: GPS latitude (decimal degrees). Range -90 to 90.
          example: 40.4153
        longitude:
          type: number
          nullable: true
          minimum: -180
          maximum: 180
          description: GPS longitude (decimal degrees). Range -180 to 180.
          example: -3.7074
        googleMapsUrl:
          type: string
          nullable: true
          description: |
            Full URL to the Google Maps listing (e.g. https://maps.google.com/?cid=...).
            Phase 1: manual entry by caller. Phase 2: bot resolves short links automatically.
          example: null

    CreatedRestaurant:
      type: object
      description: The newly created restaurant record as returned by POST /restaurants.
      required:
        - id
        - name
        - chainSlug
        - countryCode
        - isActive
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Server-generated UUID for the new restaurant.
          example: "00000000-0000-0000-0006-000000000021"
        name:
          type: string
          example: "La Tasca de Pepe"
        nameEs:
          type: string
          nullable: true
          example: null
        chainSlug:
          type: string
          description: |
            For chain restaurants: the value provided in the request body.
            For independent restaurants: the auto-generated slug
            (`independent-<name-slug>-<uuid-short>`).
          example: "independent-la-tasca-de-pepe-a3f2"
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          example: "ES"
        isActive:
          type: boolean
          example: true
          description: Always true at creation time.
        website:
          type: string
          nullable: true
          example: null
        logoUrl:
          type: string
          nullable: true
          example: null
        address:
          type: string
          nullable: true
          maxLength: 500
          example: "Calle Mayor, 12, 28013 Madrid"
        latitude:
          type: number
          nullable: true
          minimum: -90
          maximum: 90
          example: null
        longitude:
          type: number
          nullable: true
          minimum: -180
          maximum: 180
          example: null
        googleMapsUrl:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 creation timestamp.
          example: "2026-03-24T12:00:00.000Z"

    CreateRestaurantResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/CreatedRestaurant'

    DishListItem:
      type: object
      required: [id, name, restaurantId, chainSlug, restaurantName, availability]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Big Mac"
        nameEs:
          type: string
          nullable: true
          example: "Big Mac"
        restaurantId:
          type: string
          format: uuid
        chainSlug:
          type: string
          example: "mcdonalds-es"
        restaurantName:
          type: string
          example: "McDonald's Spain"
        availability:
          $ref: '#/components/schemas/DishAvailability'
        portionGrams:
          type: number
          nullable: true
          example: 215
        priceEur:
          type: number
          nullable: true
          example: 5.5

    ChainListItem:
      type: object
      required: [chainSlug, name, countryCode, dishCount, isActive]
      properties:
        chainSlug:
          type: string
          example: "mcdonalds-es"
        name:
          type: string
          example: "McDonald's Spain"
        nameEs:
          type: string
          nullable: true
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          example: "ES"
        dishCount:
          type: integer
          minimum: 0
          example: 127
          description: Aggregated across all restaurants with the same chainSlug.
        isActive:
          type: boolean
          example: true
          description: True if ANY restaurant in the chain group is active.

    # -------------------------------------------------------------------------
    # Auth (F026)
    # -------------------------------------------------------------------------

    ApiKeyTier:
      type: string
      enum: [free, pro]
      description: |
        Rate limit tier for an API key.
        - free: 100 requests per 15 minutes per key
        - pro:  1000 requests per 15 minutes per key
      example: free

    ApiKey:
      type: object
      description: |
        API key record as stored in the database. The raw key is never stored —
        only key_hash (SHA-256) and key_prefix (first 8 chars) are persisted.
        The raw key is shown only once at creation time.
      required:
        - id
        - keyHash
        - keyPrefix
        - name
        - tier
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: UUID primary key.
          example: "11111111-1111-1111-1111-111111111111"
        keyHash:
          type: string
          minLength: 64
          maxLength: 64
          description: |
            SHA-256 hex digest of the raw API key. Used for lookup on every request.
          example: "a3f5c...64 hex chars"
        keyPrefix:
          type: string
          minLength: 8
          maxLength: 8
          description: |
            First 8 characters of the raw API key (e.g. "fxp_a1b2"). Used for
            operator identification — never for authentication.
          example: "fxp_a1b2"
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable label for this key (e.g. "Telegram Bot", "Web App").
          example: "Telegram Bot"
        tier:
          $ref: '#/components/schemas/ApiKeyTier'
        isActive:
          type: boolean
          default: true
          description: |
            Whether the key is active. Set to false to soft-revoke without deleting.
            Revoked keys receive HTTP 403.
          example: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Optional expiry timestamp. Expired keys receive HTTP 401.
            Null means the key never expires.
          example: null
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp of the most recent authenticated request using this key.
            Updated asynchronously (fire-and-forget) — may lag by one request.
          example: "2026-03-19T12:00:00.000Z"
        createdAt:
          type: string
          format: date-time
          example: "2026-03-19T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-19T10:00:00.000Z"

    LevelDistribution:
      type: object
      description: Count of queries by cache/estimation level hit.
      required: [l1, l2, l3, l4, miss]
      properties:
        l1:
          type: integer
          minimum: 0
          description: Queries resolved at Level 1 (official data).
        l2:
          type: integer
          minimum: 0
          description: Queries resolved at Level 2 (ingredient-based).
        l3:
          type: integer
          minimum: 0
          description: Queries resolved at Level 3 (pgvector similarity).
        l4:
          type: integer
          minimum: 0
          description: Queries resolved at Level 4 (LLM identification).
        miss:
          type: integer
          minimum: 0
          description: Queries with no match at any level.

    ChainQueryCount:
      type: object
      required: [chainSlug, count]
      properties:
        chainSlug:
          type: string
          example: mcdonalds-es
        count:
          type: integer
          minimum: 0

    TopQueryTerm:
      type: object
      required: [queryText, count]
      properties:
        queryText:
          type: string
          example: big mac
        count:
          type: integer
          minimum: 0

    SourceDistribution:
      type: object
      description: Count of queries by request source.
      required: [api, bot]
      properties:
        api:
          type: integer
          minimum: 0
          description: "Queries from direct API callers (no X-FXP-Source: bot header)."
        bot:
          type: integer
          minimum: 0
          description: "Queries from the Telegram bot (X-FXP-Source: bot header)."

    AnalyticsData:
      type: object
      required: [totalQueries, cacheHitRate, avgResponseTimeMs, byLevel, byChain, bySource, topQueries, timeRange]
      properties:
        totalQueries:
          type: integer
          minimum: 0
          description: Total number of queries in the selected time range.
        cacheHitRate:
          type: number
          minimum: 0
          maximum: 1
          description: Fraction of queries served from cache (0–1, 4 decimal places). 0 when totalQueries=0.
          example: 0.7500
        avgResponseTimeMs:
          type: number
          nullable: true
          description: Average response time in milliseconds. null when totalQueries=0.
          example: 42.5
        byLevel:
          $ref: '#/components/schemas/LevelDistribution'
        byChain:
          type: array
          items:
            $ref: '#/components/schemas/ChainQueryCount'
          description: Chains ordered by query count descending.
        bySource:
          $ref: '#/components/schemas/SourceDistribution'
        topQueries:
          type: array
          items:
            $ref: '#/components/schemas/TopQueryTerm'
          description: Top N query terms ordered by count descending.
        scopedToChain:
          type: string
          description: Present when chainSlug filter was applied. Echoes the filter value.
          example: mcdonalds-es
        timeRange:
          type: string
          enum: [24h, 7d, 30d, all]
          description: The time range used for this aggregation.

    AnalyticsQueryResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/AnalyticsData'

    # -------------------------------------------------------------------------
    # F113 — Web Metrics
    # -------------------------------------------------------------------------

    WebMetricsSnapshot:
      type: object
      description: |
        Session-level usage metrics snapshot sent by the /hablar web assistant
        via navigator.sendBeacon on page unload (F112). No PII — no query text,
        no actorId. All values are session aggregates (not per-query).

        Cross-field constraints (enforced by WebMetricsSnapshotSchema Zod refine):
        - successCount <= queryCount
        - errorCount <= queryCount
        - sessionStartedAt must be within the past 24 hours and no more than
          1 minute in the future (clock skew tolerance)
      required:
        - queryCount
        - successCount
        - errorCount
        - retryCount
        - intents
        - errors
        - avgResponseTimeMs
        - sessionStartedAt
      properties:
        queryCount:
          type: integer
          minimum: 1
          description: Total queries sent during the session. Minimum 1 (zero-query beacons rejected).
          example: 5
        successCount:
          type: integer
          minimum: 0
          description: Queries that received a successful response.
          example: 4
        errorCount:
          type: integer
          minimum: 0
          description: Queries that resulted in an error.
          example: 1
        retryCount:
          type: integer
          minimum: 0
          description: Retry attempts across all queries.
          example: 0
        intents:
          type: object
          description: |
            Distribution of query intents. Keys are intent strings (max 100 chars each,
            max 50 keys). Values are non-negative counts. Empty object is valid.
          additionalProperties:
            type: integer
            minimum: 0
          maxProperties: 50
          example:
            nutritional_query: 3
            comparison: 1
        errors:
          type: object
          description: |
            Distribution of error codes. Keys are error code strings (max 100 chars each,
            max 50 keys). Values are non-negative counts. Empty object is valid.
          additionalProperties:
            type: integer
            minimum: 0
          maxProperties: 50
          example:
            NETWORK_ERROR: 1
        avgResponseTimeMs:
          type: integer
          minimum: 0
          maximum: 120000
          description: |
            Average perceived response time in milliseconds across successful queries.
            Computed client-side as sum(responseTimeMs) / successCount.
            0 when successCount is 0. Maximum 120000ms (2 minutes ceiling).
          example: 1200
        sessionStartedAt:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp of when the session metrics state was initialized.
            Client-reported — used for session duration analytics, not trusted for
            security. Must be within the past 24 hours and at most 1 minute in the
            future (clock skew tolerance).
          example: "2026-04-08T10:00:00.000Z"

    WebMetricsIntentCount:
      type: object
      required: [intent, count]
      properties:
        intent:
          type: string
          example: nutritional_query
        count:
          type: integer
          minimum: 0
          example: 180

    WebMetricsErrorCount:
      type: object
      required: [errorCode, count]
      properties:
        errorCode:
          type: string
          example: NETWORK_ERROR
        count:
          type: integer
          minimum: 0
          example: 15

    WebMetricsAggregateData:
      type: object
      description: Aggregated web metrics across all events in the selected time window.
      required:
        - eventCount
        - totalQueries
        - totalSuccesses
        - totalErrors
        - totalRetries
        - avgResponseTimeMs
        - topIntents
        - topErrors
        - timeRange
      properties:
        eventCount:
          type: integer
          minimum: 0
          description: Number of beacon events received in the time window.
          example: 42
        totalQueries:
          type: integer
          minimum: 0
          description: Sum of queryCount across all events.
          example: 310
        totalSuccesses:
          type: integer
          minimum: 0
          description: Sum of successCount across all events.
          example: 285
        totalErrors:
          type: integer
          minimum: 0
          description: Sum of errorCount across all events.
          example: 25
        totalRetries:
          type: integer
          minimum: 0
          description: Sum of retryCount across all events.
          example: 8
        avgResponseTimeMs:
          type: number
          format: float
          nullable: true
          description: |
            Weighted mean response time: sum(avgResponseTimeMs * successCount) /
            sum(successCount) across all events. Null when sum(successCount) = 0.
          example: 980.5
        topIntents:
          type: array
          description: |
            Top intent keys by total count, aggregated across all JSONB intents
            columns. Sorted descending by count.
          items:
            $ref: '#/components/schemas/WebMetricsIntentCount'
        topErrors:
          type: array
          description: |
            Top error codes by total count, aggregated across all JSONB errors
            columns. Sorted descending by count.
          items:
            $ref: '#/components/schemas/WebMetricsErrorCount'
        timeRange:
          type: string
          enum: [24h, 7d, 30d, all]
          description: The time range used for this aggregation.
          example: 7d

    WebMetricsAggregateResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/WebMetricsAggregateData'

    # -------------------------------------------------------------------------
    # F079 — Missed Query Tracking
    # -------------------------------------------------------------------------

    MissedQueryTracking:
      type: object
      required: [id, queryText, hitCount, status, resolvedDishId, notes, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        queryText:
          type: string
          example: gazpacho andaluz
        hitCount:
          type: integer
          example: 15
        status:
          type: string
          enum: [pending, resolved, ignored]
        resolvedDishId:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    # F072 — Cooking Profiles + Yield Factors
    # -------------------------------------------------------------------------

    CookingState:
      type: string
      enum: [raw, cooked, as_served]
      description: |
        Declares whether a reported gram weight refers to the food before cooking
        (raw), after cooking (cooked), or as a final serving where no yield conversion
        is meaningful (as_served).

        - `raw`: weight is pre-cooking. DB nutrients (per-100g USDA/BEDCA raw-weight)
          apply directly.
        - `cooked`: weight is post-cooking. Engine corrects to raw equivalent:
          `rawGrams = reportedGrams / yieldFactor` before applying nutrients.
        - `as_served`: no yield correction — treat as final serving weight.

        Default assumptions when omitted (by food group):
        - grains, legumes, pasta → cooked
        - meat, fish → raw
        - vegetables → raw
        - composite / unknown → as_served
      example: cooked

    YieldAdjustment:
      type: object
      description: |
        Documents whether and how yield-factor correction was applied for a resolved
        food entity (F072). Present in GET /estimate response and per-ingredient in
        POST /calculate/recipe response. Null when the entity was not resolved.
      required:
        - applied
        - cookingState
        - cookingStateSource
        - fatAbsorptionApplied
        - reason
      properties:
        applied:
          type: boolean
          description: |
            True when a yield factor was found AND applied (cookingState was cooked
            and a matching profile was found). False in all other cases.
          example: true
        cookingState:
          $ref: '#/components/schemas/CookingState'
          description: |
            The effective cooking state used (explicit from caller or resolved from
            default assumption based on food group).
          example: cooked
        cookingStateSource:
          type: string
          enum: [explicit, default_assumption, none]
          description: |
            How the cooking state was determined:
            - `explicit`: caller provided cookingState in the request.
            - `default_assumption`: cookingState was omitted; default fired based on food group.
            - `none`: entity is a dish (always as_served) or no food group info.
          example: default_assumption
        cookingMethod:
          type: string
          nullable: true
          description: |
            The cooking method used for profile lookup. Null when correction was not applied
            or no profile was found.
          example: boiled
        yieldFactor:
          type: number
          format: float
          nullable: true
          description: |
            The yield factor applied (cooked_weight / raw_weight). Non-null when
            `applied = true`. Null otherwise.
          example: 2.8
        fatAbsorptionApplied:
          type: boolean
          description: |
            True when fat absorption was added to fats and calories. Only applies when
            cookingMethod is "fried" AND the profile has a fatAbsorption value.
          example: false
        reason:
          type: string
          enum:
            - cooked_state_applied
            - raw_state_no_correction
            - as_served_passthrough
            - no_profile_found
            - dish_always_as_served
            - nutrients_not_per_100g
            - db_food_already_cooked
            - cannot_reverse_cooked_to_raw
            - invalid_yield_factor
          description: |
            Machine-readable explanation of the yield decision:
            - `cooked_state_applied`: cookingState=cooked, profile found, correction applied.
            - `raw_state_no_correction`: cookingState=raw, nutrients already in raw basis.
            - `as_served_passthrough`: cookingState=as_served, no conversion needed.
            - `no_profile_found`: no cooking_profiles row matched food group + method.
            - `dish_always_as_served`: matched entity is a restaurant dish; always as_served.
            - `nutrients_not_per_100g`: nutrients stored per_serving, cannot apply yield.
            - `db_food_already_cooked`: food name contains cooking keywords (e.g. "hervido").
            - `cannot_reverse_cooked_to_raw`: user requested raw but DB food is cooked.
            - `invalid_yield_factor`: yieldFactor <= 0 in DB (data error).
          example: cooked_state_applied

    CookingProfile:
      type: object
      description: |
        A row from the cooking_profiles table. Stores the yield factor (cooked_weight /
        raw_weight) and optional fat absorption value for a food group + food name +
        cooking method combination. ~50 entries seeded from USDA retention factors.
      required:
        - id
        - foodGroup
        - cookingMethod
        - yieldFactor
        - source
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          example: "aaaaaaaa-0000-0000-0000-000000000001"
        foodGroup:
          type: string
          description: |
            Matches Food.foodGroup values (e.g. "grains", "legumes", "meat", "fish",
            "vegetables", "pasta"). Used as the primary lookup key.
          example: "grains"
        foodName:
          type: string
          nullable: true
          description: |
            Optional specific food override (e.g. "rice", "chicken breast"). When present,
            this profile takes precedence over the group-level default profile for the same
            foodGroup + cookingMethod.
          example: "rice"
        cookingMethod:
          type: string
          description: |
            Cooking method slug (e.g. "boiled", "fried", "grilled", "baked", "steamed",
            "raw"). Plain VARCHAR — not a FK to the cooking_methods table (F002 model).
          example: "boiled"
        yieldFactor:
          type: number
          format: float
          description: |
            cooked_weight / raw_weight.
            - > 1.0: food absorbs water (grains, legumes, pasta).
            - < 1.0: food loses moisture (meat, fish, some vegetables).
          minimum: 0.01
          maximum: 10.0
          example: 2.8
        fatAbsorption:
          type: number
          format: float
          nullable: true
          description: |
            Grams of fat absorbed per 100g raw food during frying. Only non-null for
            fried entries (e.g. potatoes: 14.0, beef: 4.5). Applied in addition to
            yield correction.
          example: 14.0
        source:
          type: string
          description: |
            Attribution string for the yield factor value.
          example: "USDA retention factors"
        createdAt:
          type: string
          format: date-time
          example: "2026-04-03T00:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-03T00:00:00.000Z"

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Optional API key for public-facing endpoints (F026). Callers without a key are
        allowed but subject to the anonymous rate limit (30 req/15min/IP). Callers with
        a valid key receive a higher limit (free: 100/15min, pro: 1000/15min).
        Accepted via X-API-Key header only (no query param fallback — keys in URLs leak
        into logs and browser history).
        Key format: fxp_<32 hex chars> (36 chars total).
    AdminKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Required API key for admin/internal endpoints (F026). Must equal the
        ADMIN_API_KEY environment variable (compared via SHA-256 hash to prevent timing
        attacks). No database lookup — env var comparison only.
