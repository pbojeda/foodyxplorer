                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
        '401':
          description: API key provided but invalid or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Invalid or expired API key"
                  code: "UNAUTHORIZED"
        '403':
          description: API key provided but revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "API key has been revoked"
                  code: "FORBIDDEN"
        '500':
          description: Database unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Database query failed"
                  code: "DB_UNAVAILABLE"

  /health:
    get:
      summary: Health check
      description: |
        Returns server liveness. Optionally checks DB connectivity (`?db=true`)
        and/or Redis connectivity (`?redis=true`). Both parameters can be combined.
        The `db` and `redis` fields are present in the response only when the
        respective check is requested.
      operationId: healthCheck
      tags:
        - System
      parameters:
        - name: db
          in: query
          required: false
          description: Include a database connectivity check (SELECT 1 via Prisma) when set to "true".
          schema:
            type: string
            enum: ["true"]
        - name: redis
          in: query
          required: false
          description: Include a Redis connectivity check (PING) when set to "true".
          schema:
            type: string
            enum: ["true"]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                basic:
                  summary: Basic health check
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                withDb:
                  summary: Health check with DB connectivity
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                    db: connected
                withRedis:
                  summary: Health check with Redis connectivity
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                    redis: connected
                withDbAndRedis:
                  summary: Health check with both DB and Redis connectivity
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                    db: connected
                    redis: connected
        '500':
          description: Service is unhealthy (e.g. DB or Redis unreachable when respective check is requested)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbUnavailable:
                  summary: Database unreachable
                  value:
                    success: false
                    error:
                      message: "Database connectivity check failed"
                      code: "DB_UNAVAILABLE"
                redisUnavailable:
                  summary: Redis unreachable
                  value:
                    success: false
                    error:
                      message: "Redis connectivity check failed"
                      code: "REDIS_UNAVAILABLE"

  /calculate/recipe:
    post:
      tags: [Calculation]
      operationId: calculateRecipe
      summary: Calculate aggregate nutritional information for a recipe
      description: |
        Accepts a recipe in structured (typed ingredient array) or free-form (plain text) mode.
        Resolves each ingredient via a food-only cascade:
          direct_id → exact_food → fts_food → similarity_food (L3) → llm_food_match (L4).
        Returns per-ingredient breakdown plus aggregated totals.
        Partial resolution returns 200 with unresolvedIngredients and confidenceLevel: "low".
        Zero resolution returns 422 RECIPE_UNRESOLVABLE.
        Free-form mode requires OPENAI_API_KEY; returns 422 FREE_FORM_PARSE_FAILED if parsing fails.
        Route timeout: 30s → 408 PROCESSING_TIMEOUT.
        Responses cached in Redis for 300 seconds (fxp:recipe:<mode>:<sha256>).
        Stateless — no writes to Recipe or RecipeIngredient tables.
        See ADR-001 (Motor calculates, LLM interprets), ADR-009 §5 (portion_multiplier).
      security:
        - PublicKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: StructuredBody
                  type: object
                  required: [mode, ingredients]
                  properties:
                    mode:
                      type: string
                      enum: [structured]
                    ingredients:
                      type: array
                      minItems: 1
                      maxItems: 50
                      items:
                        type: object
                        required: [grams]
                        properties:
                          foodId:
                            type: string
                            format: uuid
                            description: Direct UUID lookup in food_nutrients (mutually exclusive with name)
                          name:
                            type: string
                            minLength: 1
                            maxLength: 255
                            description: Ingredient name for L1/L3/L4 resolution (mutually exclusive with foodId)
                          grams:
                            type: number
                            exclusiveMinimum: 0
                            maximum: 5000
                          portionMultiplier:
                            type: number
                            minimum: 0.1
                            maximum: 5.0
                            default: 1.0
                            description: LLM-provided hint per ADR-009 §5; applied as nutrient * grams/100 * portionMultiplier
                - title: FreeFormBody
                  type: object
                  required: [mode, text]
                  properties:
                    mode:
                      type: string
                      enum: [free-form]
                    text:
                      type: string
                      minLength: 1
                      maxLength: 2000
                      description: Plain-text recipe description (Spanish or English). Parsed by LLM into structured ingredients.
            examples:
              structured:
                summary: Structured mode — direct_id + name-based
                value:
                  mode: structured
                  ingredients:
                    - foodId: "fd000000-0001-4000-a000-000000000001"
                      grams: 200
                    - name: "arroz blanco"
                      grams: 100
                    - name: "aceite de oliva virgen extra"
                      grams: 15
                      portionMultiplier: 1.0
              freeForm:
                summary: Free-form mode — LLM parses text
                value:
                  mode: free-form
                  text: "200g de pechuga de pollo a la plancha, 100g de arroz blanco, 50ml de aceite de oliva"
      responses:
        '200':
          description: |
            Recipe nutrients aggregated successfully. resolvedCount ≥ 1.
            If some ingredients are unresolved, unresolvedCount > 0 and confidenceLevel: "low".
            cachedAt is null on first request; ISO string on cache hit.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum: [structured, free-form]
                      resolvedCount:
                        type: integer
                        minimum: 0
                      unresolvedCount:
                        type: integer
                        minimum: 0
                      confidenceLevel:
                        type: string
                        enum: [medium, low]
                        description: |
                          medium — all resolved via direct_id, L1, or L3.
                          low — any ingredient used L4 or is unresolved.
                      totalNutrients:
                        $ref: '#/components/schemas/RecipeNutrients'
                      ingredients:
                        type: array
                        items:
                          type: object
                          properties:
                            input:
                              type: object
                              properties:
                                foodId:
                                  type: string
                                  format: uuid
                                  nullable: true
                                name:
                                  type: string
                                  nullable: true
                                grams:
                                  type: number
                                portionMultiplier:
                                  type: number
                            resolved:
                              type: boolean
                            resolvedAs:
                              nullable: true
                              type: object
                              properties:
                                entityId:
                                  type: string
                                  format: uuid
                                name:
                                  type: string
                                nameEs:
                                  type: string
                                  nullable: true
                                matchType:
                                  type: string
                                  enum: [direct_id, exact_food, fts_food, similarity_food, llm_food_match]
                            nutrients:
                              nullable: true
                              $ref: '#/components/schemas/RecipeNutrients'
                      unresolvedIngredients:
                        type: array
                        items:
                          type: string
                      parsedIngredients:
                        description: Present only in free-form mode. LLM-extracted ingredient list before resolution.
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            grams:
                              type: number
                            portionMultiplier:
                              type: number
                      cachedAt:
                        type: string
                        format: date-time
                        nullable: true
              examples:
                structuredPartial:
                  summary: Structured mode — partial resolution
                  value:
                    success: true
                    data:
                      mode: structured
                      resolvedCount: 1
                      unresolvedCount: 1
                      confidenceLevel: low
                      totalNutrients:
                        calories: 330
                        proteins: 62
                        carbohydrates: 0
                        sugars: 0
                        fats: 7.2
                        saturatedFats: 2
                        fiber: 0
                        salt: 0.2
                        sodium: 148
                        transFats: 0
                        cholesterol: 170
                        potassium: 440
                        monounsaturatedFats: 2.4
                        polyunsaturatedFats: 1.6
                        referenceBasis: per_serving
                      ingredients:
                        - input:
                            foodId: null
                            name: pechuga de pollo
                            grams: 200
                            portionMultiplier: 1.0
                          resolved: true
                          resolvedAs:
                            entityId: "fd000000-0001-4000-a000-000000000001"
                            name: "Chicken, broilers or fryers, breast"
                            nameEs: "Pechuga de pollo"
                            matchType: fts_food
                          nutrients:
                            calories: 330
                            proteins: 62
                            carbohydrates: 0
                            sugars: 0
                            fats: 7.2
                            saturatedFats: 2
                            fiber: 0
                            salt: 0.2
                            sodium: 148
                            transFats: 0
                            cholesterol: 170
                            potassium: 440
                            monounsaturatedFats: 2.4
                            polyunsaturatedFats: 1.6
                            referenceBasis: per_serving
                        - input:
                            foodId: null
                            name: ingrediente raro
                            grams: 50
                            portionMultiplier: 1.0
                          resolved: false
                          resolvedAs: null
                          nutrients: null
                      unresolvedIngredients: ["ingrediente raro"]
                      cachedAt: null
        '400':
          description: Validation error — invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bothFoodIdAndName:
                  summary: Both foodId and name provided
                  value:
                    success: false
                    error:
                      message: "Exactly one of foodId or name must be provided (not both, not neither)"
                      code: VALIDATION_ERROR
                gramsZero:
                  summary: grams = 0 (not positive)
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: VALIDATION_ERROR
        '408':
          description: Route processing exceeded 30s timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Recipe calculation timed out"
                  code: PROCESSING_TIMEOUT
        '422':
          description: |
            RECIPE_UNRESOLVABLE — zero ingredients could be resolved (nothing to aggregate).
            FREE_FORM_PARSE_FAILED — LLM could not extract any ingredients from free-form text.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unresolvable:
                  summary: Zero ingredients resolved
                  value:
                    success: false
                    error:
                      message: "No ingredients could be resolved for this recipe"
                      code: RECIPE_UNRESOLVABLE
                freeFormFailed:
                  summary: LLM parse failed (free-form mode)
                  value:
                    success: false
                    error:
                      message: "LLM failed to parse free-form recipe text"
                      code: FREE_FORM_PARSE_FAILED
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    # -------------------------------------------------------------------------
    # Ingestion
    # -------------------------------------------------------------------------

    IngestPdfSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the PDF row.
          example: "Bebida Grande"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    NormalizedDish:
      type: object
      description: |
        A dish that has been extracted from the PDF, normalized via
        `normalizeNutrients` / `normalizeDish`, and is ready for (or has been
        written to) the database. Mirrors `NormalizedDishDataSchema` from
        `packages/scraper/src/base/types.ts`.
      required:
        - name
        - nutrients
        - confidenceLevel
        - estimationMethod
        - availability
        - restaurantId
        - sourceId
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: "Big Mac"
        nameEs:
          type: string
          maxLength: 255
          nullable: true
          example: "Big Mac"
        description:
          type: string
          nullable: true
          example: "Hamburguesa con dos filetes de carne"
        externalId:
          type: string
          maxLength: 100
          nullable: true
          description: Chain-specific dish ID. Not present for PDF ingestion (PDFs do not carry machine IDs).
        availability:
          type: string
          enum: [available, unavailable, seasonal, discontinued]
          default: available
          example: available
        portionGrams:
          type: number
          nullable: true
          example: 200
        priceEur:
          type: number
          nullable: true
          example: 4.99
        aliases:
          type: array
          items:
            type: string
          default: []
        nutrients:
          type: object
          required:
            - calories
            - proteins
            - carbohydrates
            - fats
            - saturatedFats
            - sugars
            - fiber
            - salt
            - sodium
            - transFats
            - cholesterol
            - potassium
            - monounsaturatedFats
            - polyunsaturatedFats
            - referenceBasis
          properties:
            calories:
              type: number
              minimum: 0
              maximum: 9000
              example: 550
            proteins:
              type: number
              minimum: 0
              example: 25
            carbohydrates:
              type: number
              minimum: 0
              example: 46
            fats:
              type: number
              minimum: 0
              example: 28
            saturatedFats:
              type: number
              minimum: 0
              example: 10
            sugars:
              type: number
              minimum: 0
              example: 9
            fiber:
              type: number
              minimum: 0
              example: 3
            salt:
              type: number
              minimum: 0
              description: Grams. Derived from sodium if not directly stated (salt_g = sodium_mg / 1000 * 2.5).
              example: 2.2
            sodium:
              type: number
              minimum: 0
              description: Milligrams. Derived from salt if not directly stated.
              example: 880
            transFats:
              type: number
              minimum: 0
              default: 0
              example: 0.5
            cholesterol:
              type: number
              minimum: 0
              default: 0
              example: 80
            potassium:
              type: number
              minimum: 0
              default: 0
              example: 0
            monounsaturatedFats:
              type: number
              minimum: 0
              default: 0
              example: 0
            polyunsaturatedFats:
              type: number
              minimum: 0
              default: 0
              example: 0
            referenceBasis:
              type: string
              enum: [per_100g, per_serving, per_package]
              default: per_serving
              description: Always "per_serving" for restaurant / PDF-sourced data (ADR-004).
              example: per_serving
            extra:
              type: object
              additionalProperties:
                type: number
              description: Any additional nutrients present in the PDF but not in the standard columns.
              nullable: true
        confidenceLevel:
          type: string
          enum: [low, medium, high]
          description: Always "medium" for PDF-ingested data.
          example: medium
        estimationMethod:
          type: string
          enum: [official, scraped, calculated, extrapolated, manual]
          description: Always "scraped" for PDF-ingested data.
          example: scraped
        restaurantId:
          type: string
          format: uuid
          example: "00000000-0000-0000-0000-000000000001"
        sourceId:
          type: string
          format: uuid
          example: "00000000-0000-0000-0000-000000000002"

    IngestPdfResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the PDF before normalization.
          example: 48
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 45
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 3
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestPdfSkippedReason'

    IngestPdfResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestPdfResult'

    # -------------------------------------------------------------------------
    # Ingestion — PDF-URL (F009)
    # -------------------------------------------------------------------------

    IngestPdfUrlBody:
      type: object
      required:
        - url
        - restaurantId
        - sourceId
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: |
            A direct URL to a PDF file. Must use http or https scheme.
            Private/loopback addresses (localhost, 127.x.x.x, 10.x.x.x,
            192.168.x.x, 169.254.x.x, ::1, ::ffff:*) are rejected with
            422 INVALID_URL.
          example: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
        restaurantId:
          type: string
          format: uuid
          description: UUID of the Restaurant row this data belongs to.
          example: "00000000-0000-0000-0000-000000000001"
        sourceId:
          type: string
          format: uuid
          description: UUID of the DataSource row representing this PDF's origin.
          example: "00000000-0000-0000-0000-000000000002"
        dryRun:
          type: boolean
          default: false
          description: |
            When true, downloads, extracts, and normalizes but skips all DB writes.
            The response still contains the full `dishes` array for inspection.
        chainSlug:
          type: string
          pattern: "^[a-z0-9-]+$"
          minLength: 1
          maxLength: 100
          description: |
            Optional chain identifier from CHAIN_PDF_REGISTRY (e.g. "burger-king-es",
            "kfc-es", "telepizza-es"). When provided, applies chain-specific text
            preprocessing to the extracted PDF text before parsing. This handles
            multi-line headers, paired 100g/portion columns, and kJ/kcal dual energy
            columns that the generic parser cannot handle. See ADR-007.
            When omitted, no preprocessing is applied (backward-compatible).
          example: "kfc-es"

    IngestPdfUrlSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the PDF row.
          example: "Bebida Grande"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    IngestPdfUrlResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - sourceUrl
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the PDF before normalization.
          example: 52
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 50
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 2
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        sourceUrl:
          type: string
          format: uri
          description: |
            The PDF URL that was downloaded. Echoed back from the request for
            traceability when callers ingest multiple PDF URLs in sequence
            (e.g. F010 batch runner).
          example: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestPdfUrlSkippedReason'

    IngestPdfUrlResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestPdfUrlResult'

    # -------------------------------------------------------------------------
    # Ingestion — Image URL (F012)
    # -------------------------------------------------------------------------

    IngestImageUrlBody:
      type: object
      required:
        - url
        - restaurantId
        - sourceId
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: |
            A direct URL to a JPEG or PNG image file. Must use http or https scheme.
            Private/loopback addresses (localhost, 127.x.x.x, 10.x.x.x,
            192.168.x.x, 169.254.x.x, ::1, ::ffff:*) are rejected with
            422 INVALID_URL.
            Content-Type `application/octet-stream` is accepted as a CDN passthrough;
            magic bytes (FFD8FF for JPEG, 89504E47 for PNG) are the authoritative
            format check applied after download.
          example: "https://alergenos.dominospizza.es/img/tabla_nutricional.jpg"
        restaurantId:
          type: string
          format: uuid
          description: UUID of the Restaurant row this data belongs to.
          example: "00000000-0000-0000-0006-000000000014"
        sourceId:
          type: string
          format: uuid
          description: UUID of the DataSource row representing this image's origin.
          example: "00000000-0000-0000-0000-000000000014"
        dryRun:
          type: boolean
          default: false
          description: |
            When true, downloads, OCRs, extracts, and normalizes but skips all DB
            writes. The response still contains the full `dishes` array for inspection.
            Use dryRun=true to verify OCR output quality before a live ingest.
        chainSlug:
          type: string
          pattern: "^[a-z0-9-]+$"
          minLength: 1
          maxLength: 100
          description: |
            Optional chain identifier (e.g. "dominos-es"). When provided, applies
            chain-specific text preprocessing to the OCR-extracted lines before
            parsing. This handles OCR artifacts and layout-specific formatting
            (e.g. whitespace normalization, numeric token cleanup). See ADR-007.
            When omitted, no preprocessing is applied (backward-compatible).
          example: "dominos-es"

    IngestImageUrlSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the OCR-parsed row.
          example: "Pizza Pepperoni"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    IngestImageUrlResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - sourceUrl
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the image (after OCR) before normalization.
          example: 42
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 40
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 2
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        sourceUrl:
          type: string
          format: uri
          description: |
            The image URL that was downloaded. Echoed back from the request for
            traceability when callers ingest multiple image URLs in sequence
            (e.g. F012 batch runner iterating imageUrls for a chain).
          example: "https://alergenos.dominospizza.es/img/tabla_nutricional.jpg"
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestImageUrlSkippedReason'

    IngestImageUrlResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestImageUrlResult'

    # -------------------------------------------------------------------------
    # Ingestion — Image Upload / multipart (F031)
    # -------------------------------------------------------------------------

    IngestImageSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the OCR-parsed row.
          example: "Bebida"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    IngestImageResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the image (after OCR) before normalization.
          example: 9
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 8
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 1
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestImageSkippedReason'

    IngestImageResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestImageResult'

    # -------------------------------------------------------------------------
    # Ingestion — URL (F007c)
    # -------------------------------------------------------------------------

    IngestUrlBody:
      type: object
      required:
        - url
        - restaurantId
        - sourceId
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: |
            The URL to fetch and parse. Must use http or https scheme.
            Private/loopback addresses (localhost, 127.x.x.x, 192.168.x.x,
            10.x.x.x, 169.254.x.x) are rejected with 422 INVALID_URL.
          example: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
        restaurantId:
          type: string
          format: uuid
          description: UUID of the Restaurant row this data belongs to.
          example: "00000000-0000-0000-0000-000000000001"
        sourceId:
          type: string
          format: uuid
          description: UUID of the DataSource row representing this URL's origin.
          example: "00000000-0000-0000-0000-000000000002"
        dryRun:
          type: boolean
          default: false
          description: |
            When true, runs fetch, extraction, and normalization but skips all DB
            writes. The response still contains the full `dishes` array for inspection.

    IngestUrlSkippedReason:
      type: object
      required:
        - dishName
        - reason
      properties:
        dishName:
          type: string
          description: The dish name as extracted from the HTML row.
          example: "Bebida"
        reason:
          type: string
          description: Human-readable explanation of why this dish was skipped.
          example: "Missing required field: proteins"

    IngestUrlResult:
      type: object
      required:
        - dishesFound
        - dishesUpserted
        - dishesSkipped
        - dryRun
        - sourceUrl
        - dishes
        - skippedReasons
      properties:
        dishesFound:
          type: integer
          minimum: 0
          description: Total number of dish rows extracted from the page before normalization.
          example: 32
        dishesUpserted:
          type: integer
          minimum: 0
          description: |
            Number of dishes successfully normalized and written to (or that would be
            written to, in dryRun mode) the database.
          example: 30
        dishesSkipped:
          type: integer
          minimum: 0
          description: Number of dishes that failed normalization and were not persisted.
          example: 2
        dryRun:
          type: boolean
          description: Whether this was a dry run (no DB writes).
          example: false
        sourceUrl:
          type: string
          format: uri
          description: |
            The URL that was fetched. Echoed back from the request for traceability
            when callers ingest multiple URLs in sequence.
          example: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
        dishes:
          type: array
          description: |
            All successfully normalized dishes. Present in both live and dryRun responses.
          items:
            $ref: '#/components/schemas/NormalizedDish'
        skippedReasons:
          type: array
          description: One entry per skipped dish explaining the normalization failure.
          items:
            $ref: '#/components/schemas/IngestUrlSkippedReason'

    IngestUrlResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/IngestUrlResult'

    # -------------------------------------------------------------------------
    # Quality Monitor (F018)
    # -------------------------------------------------------------------------

    QualityChainSummary:
      type: object
      description: Per-chain overview computed from check results. Sorted by issueCount DESC.
      required:
        - chainSlug
        - totalDishes
        - nutrientCoveragePercent
        - issueCount
      properties:
        chainSlug:
          type: string
          example: "mcdonalds-es"
        totalDishes:
          type: integer
          minimum: 0
          example: 178
        nutrientCoveragePercent:
          type: number
          minimum: 0
          maximum: 100
          description: "(totalDishes - dishesWithoutNutrients) / totalDishes * 100. Returns 0 when no dishes."
          example: 100.0
        issueCount:
          type: integer
          minimum: 0
          description: "Sum of: dishesWithoutNutrients + ghostRowCount + caloriesAboveThreshold + totalDuplicateDishes for this chain."
          example: 0

    QualityNutrientCompletenessChain:
      type: object
      description: Per-chain nutrient completeness breakdown.
      required:
        - chainSlug
        - totalDishes
        - dishesWithoutNutrients
        - ghostRowCount
        - zeroCaloriesCount
      properties:
        chainSlug:
          type: string
          example: "mcdonalds-es"
        totalDishes:
          type: integer
          minimum: 0
          example: 178
        dishesWithoutNutrients:
          type: integer
          minimum: 0
          description: Dishes with no DishNutrient row at all.
          example: 0
        ghostRowCount:
          type: integer
          minimum: 0
          description: |
            DishNutrient rows where ALL FOUR core macros (calories, proteins,
            carbohydrates, fats) are exactly 0 simultaneously. Reliable indicator
            of a failed or placeholder ingestion.
          example: 0
        zeroCaloriesCount:
          type: integer
          minimum: 0
          description: DishNutrient rows where calories = 0 (individually). More granular than ghostRowCount.
          example: 0

    QualityNutrientCompleteness:
      type: object
      required:
        - dishesWithNutrients
        - dishesWithoutNutrients
        - dishesWithoutNutrientsPercent
        - ghostRowCount
        - zeroCaloriesCount
        - byChain
      properties:
        dishesWithNutrients:
          type: integer
          minimum: 0
          description: Total dishes that have at least one DishNutrient row (totalDishes - dishesWithoutNutrients).
          example: 897
        dishesWithoutNutrients:
          type: integer
          minimum: 0
          description: Total dishes with no DishNutrient row.
          example: 3
        dishesWithoutNutrientsPercent:
          type: number
          minimum: 0
          maximum: 100
          description: dishesWithoutNutrients / totalDishes * 100, rounded to 2 decimal places. Returns 0 when totalDishes is 0.
          example: 0.33
        ghostRowCount:
          type: integer
          minimum: 0
          description: |
            DishNutrient rows where ALL FOUR core macros (calories, proteins,
            carbohydrates, fats) are exactly 0 simultaneously. Reliable indicator
            of a failed or placeholder ingestion.
          example: 2
        zeroCaloriesCount:
          type: integer
          minimum: 0
          description: DishNutrient rows where calories = 0 (individually). More granular — catches partial data.
          example: 3
        byChain:
          type: array
          items:
            $ref: '#/components/schemas/QualityNutrientCompletenessChain'

    QualityImplausibleValuesChain:
      type: object
      description: Per-chain implausible values breakdown.
      required:
        - chainSlug
        - caloriesAboveThreshold
        - ghostRows
        - suspiciouslyRoundCalories
      properties:
        chainSlug:
          type: string
          example: "mcdonalds-es"
        caloriesAboveThreshold:
          type: integer
          minimum: 0
          description: Dishes whose DishNutrient.calories > caloriesThreshold.
          example: 0
        ghostRows:
          type: integer
          minimum: 0
          description: |
            DishNutrient rows where ALL of calories, proteins, carbohydrates,
            and fats are simultaneously 0. These likely represent failed ingestion.
          example: 0
        suspiciouslyRoundCalories:
          type: integer
          minimum: 0
          description: |
            Dishes where calories >= 100 and calories % 100 == 0.
            Reported as informational — not necessarily an error.
          example: 3

    QualityImplausibleValues:
      type: object
      required:
        - caloriesAboveThreshold
        - caloriesThreshold
        - ghostRows
        - suspiciouslyRoundCalories
        - byChain
      properties:
        caloriesAboveThreshold:
          type: integer
          minimum: 0
          description: Global count of dishes with calories > caloriesThreshold.
          example: 0
        caloriesThreshold:
          type: integer
          description: The calories upper soft-limit used for this check (fixed at 5000).
          example: 5000
        ghostRows:
          type: integer
          minimum: 0
          description: Global count of DishNutrient ghost rows (all four core macros are 0).
          example: 0
        suspiciouslyRoundCalories:
          type: integer
          minimum: 0
          description: Global count of dishes with suspiciously round calorie values.
          example: 12
        byChain:
          type: array
          items:
            $ref: '#/components/schemas/QualityImplausibleValuesChain'

    QualityDataGaps:
      type: object
      description: |
        Counts of dishes with NULL optional fields and restaurants with no dishes.
        These are coverage metrics, not errors — NULL portionGrams and priceEur are
        valid states (data not available from the source).
      required:
        - dishesWithoutPortionGrams
        - dishesWithoutPriceEur
        - restaurantsWithoutDishes
      properties:
        dishesWithoutPortionGrams:
          type: integer
          minimum: 0
          description: Dishes where Dish.portionGrams IS NULL.
          example: 45
        dishesWithoutPriceEur:
          type: integer
          minimum: 0
          description: Dishes where Dish.priceEur IS NULL.
          example: 632
        restaurantsWithoutDishes:
          type: integer
          minimum: 0
          description: Restaurant rows with zero associated Dish rows.
          example: 0

    QualityDuplicateGroup:
      type: object
      description: A group of dishes sharing the same (name, restaurantId, sourceId).
      required:
        - name
        - chainSlug
        - count
        - dishIds
      properties:
        name:
          type: string
          description: The shared dish name.
          example: "Coca-Cola Zero"
        chainSlug:
          type: string
          example: "mcdonalds-es"
        count:
          type: integer
          minimum: 2
          description: Number of duplicate dishes in this group.
          example: 2
        dishIds:
          type: array
          description: UUIDs of all dishes in the duplicate group.
          items:
            type: string
            format: uuid
          example: ["uuid-a", "uuid-b"]

    QualityDuplicates:
      type: object
      required:
        - duplicateGroupCount
        - totalDuplicateDishes
        - groups
      properties:
        duplicateGroupCount:
          type: integer
          minimum: 0
          description: Number of distinct duplicate groups found.
          example: 2
        totalDuplicateDishes:
          type: integer
          minimum: 0
          description: |
            Total number of duplicate dish rows (sum of `count` across all groups).
            The "extra" duplicates would be totalDuplicateDishes - duplicateGroupCount.
          example: 5
        groups:
          type: array
          description: Detail of each duplicate group. Empty array when no duplicates exist.
          items:
            $ref: '#/components/schemas/QualityDuplicateGroup'

    QualityConfidenceByEstimationMethod:
      type: object
      description: Dish counts by estimation method.
      required:
        - official
        - scraped
        - ingredients
        - extrapolation
        - llm
      properties:
        official:
          type: integer
          minimum: 0
          example: 514
        scraped:
          type: integer
          minimum: 0
          example: 386
        ingredients:
          type: integer
          minimum: 0
          example: 0
        extrapolation:
          type: integer
          minimum: 0
          example: 0
        llm:
          type: integer
          minimum: 0
          description: |
            Dishes estimated via Level 4 LLM identification (F024). Includes both
            llm_food_match and llm_ingredient_decomposition match types.
          example: 0

    QualityConfidenceChain:
      type: object
      description: Per-chain confidence level and estimation method breakdown.
      required:
        - chainSlug
        - high
        - medium
        - low
        - byEstimationMethod
      properties:
        chainSlug:
          type: string
          example: "mcdonalds-es"
        high:
          type: integer
          minimum: 0
          example: 0
        medium:
          type: integer
          minimum: 0
          example: 178
        low:
          type: integer
          minimum: 0
          example: 0
        byEstimationMethod:
          $ref: '#/components/schemas/QualityConfidenceByEstimationMethod'

    QualityConfidenceDistribution:
      type: object
      required:
        - global
        - byEstimationMethod
        - byChain
      properties:
        global:
          type: object
          description: Global dish counts by confidence level.
          required:
            - high
            - medium
            - low
          properties:
            high:
              type: integer
              minimum: 0
              example: 514
            medium:
              type: integer
              minimum: 0
              example: 386
            low:
              type: integer
              minimum: 0
              example: 0
        byEstimationMethod:
          $ref: '#/components/schemas/QualityConfidenceByEstimationMethod'
        byChain:
          type: array
          items:
            $ref: '#/components/schemas/QualityConfidenceChain'

    QualityStaleSource:
      type: object
      description: A DataSource row that is considered stale.
      required:
        - sourceId
        - name
        - lastUpdated
        - daysSinceUpdate
      properties:
        sourceId:
          type: string
          format: uuid
          example: "uuid-source"
        name:
          type: string
          description: DataSource.name
          example: "McDonald's Spain Official PDF"
        lastUpdated:
          type: string
          format: date-time
          nullable: true
          description: |
            DataSource.lastUpdated as ISO-8601 string. null when the field has never
            been set (treated as stale — daysSinceUpdate will be null in this case).
          example: "2025-11-01T00:00:00.000Z"
        daysSinceUpdate:
          type: integer
          nullable: true
          minimum: 0
          description: |
            Number of full days elapsed since lastUpdated. null when lastUpdated IS NULL.
          example: 136

    QualityDataFreshness:
      type: object
      required:
        - totalSources
        - staleSources
        - staleSourcesDetail
      properties:
        totalSources:
          type: integer
          minimum: 0
          description: Total DataSource rows in scope (all or filtered by chainSlug).
          example: 8
        staleSources:
          type: integer
          minimum: 0
          description: |
            DataSource rows where lastUpdated IS NULL or lastUpdated is older than
            stalenessThresholdDays days ago.
          example: 1
        staleSourcesDetail:
          type: array
          description: One entry per stale DataSource. Empty array when none are stale.
          items:
            $ref: '#/components/schemas/QualityStaleSource'

    QualityReportData:
      type: object
      description: The quality report payload returned in the `data` envelope.
      required:
        - generatedAt
        - totalDishes
        - totalRestaurants
        - stalenessThresholdDays
        - scopedToChain
        - chainSummary
        - nutrientCompleteness
        - implausibleValues
        - dataGaps
        - duplicates
        - confidenceDistribution
        - dataFreshness
      properties:
        generatedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the report was generated (server time).
          example: "2026-03-17T10:00:00.000Z"
        totalDishes:
          type: integer
          minimum: 0
          description: Total Dish rows in scope at report time.
          example: 900
        totalRestaurants:
          type: integer
          minimum: 0
          description: Total Restaurant rows in scope at report time.
          example: 7
        stalenessThresholdDays:
          type: integer
          minimum: 1
          description: The staleness threshold used for the dataFreshness check.
          example: 90
        scopedToChain:
          type: string
          nullable: true
          description: The chainSlug filter applied, or null for a global report.
          example: null
        chainSummary:
          type: array
          description: Per-chain overview sorted by issueCount DESC. Computed from check results, no extra DB queries.
          items:
            $ref: '#/components/schemas/QualityChainSummary'
        nutrientCompleteness:
          $ref: '#/components/schemas/QualityNutrientCompleteness'
        implausibleValues:
          $ref: '#/components/schemas/QualityImplausibleValues'
        dataGaps:
          $ref: '#/components/schemas/QualityDataGaps'
        duplicates:
          $ref: '#/components/schemas/QualityDuplicates'
        confidenceDistribution:
          $ref: '#/components/schemas/QualityConfidenceDistribution'
        dataFreshness:
          $ref: '#/components/schemas/QualityDataFreshness'

    QualityReportResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/QualityReportData'

    # -------------------------------------------------------------------------
    # Embeddings (F019)
    # -------------------------------------------------------------------------

    EmbeddingGenerateRequest:
      type: object
      required:
        - target
      properties:
        target:
          type: string
          enum: [foods, dishes, all]
          description: |
            Which entity type(s) to embed.
            - `foods`: only the `foods` table
            - `dishes`: only the `dishes` table
            - `all`: both tables in sequence (foods first, then dishes)
          example: all
        chainSlug:
          type: string
          pattern: "^[a-z0-9-]+$"
          minLength: 1
          maxLength: 100
          nullable: true
          description: |
            When provided, restricts dish embedding to a single restaurant chain
            (matched against `Restaurant.chainSlug`). Ignored when `target` is
            `foods`. When omitted, all dishes are in scope.
          example: "mcdonalds-es"
        batchSize:
          type: integer
          minimum: 1
          maximum: 2048
          default: 100
          description: |
            Number of items to embed per OpenAI API call. OpenAI supports up to
            2048 inputs per request for text-embedding-3-small. Defaults to the
            value of the `OPENAI_EMBEDDING_BATCH_SIZE` env var (default: 100).
          example: 100
        force:
          type: boolean
          default: false
          description: |
            When false (default), items whose embedding column is already non-zero
            are skipped. When true, all items in scope are re-embedded unconditionally.
          example: false
        dryRun:
          type: boolean
          default: false
          description: |
            When true, the pipeline counts items and estimates token usage but
            makes no OpenAI API calls and performs no DB writes. Useful for
            cost estimation before running in production.
          example: false

    EmbeddingItemError:
      type: object
      required:
        - itemType
        - itemId
        - itemName
        - reason
      properties:
        itemType:
          type: string
          enum: [food, dish]
          description: Which entity failed.
          example: dish
        itemId:
          type: string
          format: uuid
          description: The UUID of the entity that failed.
          example: "00000000-0000-0000-0001-000000000042"
        itemName:
          type: string
          description: The display name of the entity (for human-readable error reports).
          example: "Producto sin nombre"
        reason:
          type: string
          description: Human-readable failure reason (API error message or timeout).
          example: "OpenAI API error: rate limit exceeded after 3 retries"

    EmbeddingGenerateData:
      type: object
      required:
        - target
        - dryRun
        - processedFoods
        - processedDishes
        - skippedFoods
        - skippedDishes
        - errorCount
        - errors
        - estimatedTokens
        - durationMs
        - completedAt
      properties:
        target:
          type: string
          enum: [foods, dishes, all]
          description: The target that was processed.
          example: all
        dryRun:
          type: boolean
          description: Whether this was a dry run (no writes performed).
          example: false
        processedFoods:
          type: integer
          minimum: 0
          description: |
            Number of food embeddings successfully written (0 when dryRun: true
            or when target is dishes).
          example: 120
        processedDishes:
          type: integer
          minimum: 0
          description: |
            Number of dish embeddings successfully written (0 when dryRun: true
            or when target is foods).
          example: 900
        skippedFoods:
          type: integer
          minimum: 0
          description: |
            Foods skipped because they already had a non-zero embedding and
            force: false.
          example: 0
        skippedDishes:
          type: integer
          minimum: 0
          description: |
            Dishes skipped because they already had a non-zero embedding and
            force: false.
          example: 0
        errorCount:
          type: integer
          minimum: 0
          description: Number of items that failed. Details are in the `errors` array.
          example: 0
        errors:
          type: array
          description: Per-item failure details. Empty array on full success.
          items:
            $ref: '#/components/schemas/EmbeddingItemError'
        estimatedTokens:
          type: integer
          minimum: 0
          description: |
            Estimated total token count consumed (or would be consumed in dryRun).
            Based on whitespace-separated word count × 1.3 (conservative heuristic).
          example: 185000
        durationMs:
          type: integer
          minimum: 0
          description: Wall-clock duration of the pipeline in milliseconds.
          example: 42300
        completedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the pipeline finished.
          example: "2026-03-17T10:05:00.000Z"

    EmbeddingGenerateResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/EmbeddingGenerateData'

    # -------------------------------------------------------------------------
    # System / Infrastructure
    # -------------------------------------------------------------------------

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - version
        - uptime
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        timestamp:
          type: string
          format: date-time
          example: "2026-03-11T10:00:00.000Z"
        version:
          type: string
          description: Package version from package.json
          example: "0.1.0"
        uptime:
          type: number
          description: Process uptime in seconds
          example: 42.3
        db:
          type: string
          enum: [connected, unavailable]
          description: |
            Present only when ?db=true is passed. Reflects whether a lightweight
            SELECT 1 succeeded against the PostgreSQL database.
          example: connected
        redis:
          type: string
          enum: [connected, unavailable]
          description: |
            Present only when ?redis=true is passed. Reflects whether a Redis PING
            succeeded against the configured Redis instance.
          example: connected

    # -------------------------------------------------------------------------
    # Shared response envelopes
    # -------------------------------------------------------------------------

    DishAvailability:
      type: string
      enum: [available, seasonal, discontinued, regional]
      example: available
      description: Availability status of a dish.

    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - message
            - code
          properties:
            message:
              type: string
              example: "Validation failed"
            code:
              type: string
              example: "VALIDATION_ERROR"
            details:
              type: array
              description: |
                Present on validation errors (400). Each item identifies the
                failing field and reason, matching Zod's ZodError.issues shape.
              items:
                type: object
                required:
                  - path
                  - message
                properties:
                  path:
                    type: array
                    items:
                      type: string
                    example: ["name"]
                  message:
                    type: string
                    example: "Required"
                  code:
                    type: string
                    example: "invalid_type"

    SuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

    PaginatedResponse:
      type: object
      required:
        - success
        - data
        - pagination
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
        pagination:
          type: object
          required:
            - page
            - pageSize
            - totalItems
            - totalPages
          properties:
            page:
              type: integer
              example: 1
            pageSize:
              type: integer
              example: 20
            totalItems:
              type: integer
              example: 150
            totalPages:
              type: integer
              example: 8

    # -------------------------------------------------------------------------
    # Estimation Engine (E003 / F020)
    # -------------------------------------------------------------------------

    EstimateNutrients:
      type: object
      description: |
        Full nutrient profile for a matched dish or food. All values are plain numbers
        (not Prisma Decimal). Prisma Decimal values are converted via .toNumber() before
        populating this schema (same pattern as QualityReport checks).
      required:
        - calories
        - proteins
        - carbohydrates
        - sugars
        - fats
        - saturatedFats
        - fiber
        - salt
        - sodium
        - transFats
        - cholesterol
        - potassium
        - monounsaturatedFats
        - polyunsaturatedFats
        - referenceBasis
      properties:
        calories:
          type: number
          minimum: 0
          example: 550
        proteins:
          type: number
          minimum: 0
          example: 25
        carbohydrates:
          type: number
          minimum: 0
          example: 46
        sugars:
          type: number
          minimum: 0
          example: 9
        fats:
          type: number
          minimum: 0
          example: 28
        saturatedFats:
          type: number
          minimum: 0
          example: 10
        fiber:
          type: number
          minimum: 0
          example: 3
        salt:
          type: number
          minimum: 0
          description: Grams. Derived from sodium if not directly stated (salt_g = sodium_mg / 1000 * 2.5).
          example: 2.2
        sodium:
          type: number
          minimum: 0
          description: Milligrams. Derived from salt if not directly stated.
          example: 880
        transFats:
          type: number
          minimum: 0
          default: 0
          example: 0.5
        cholesterol:
          type: number
          minimum: 0
          default: 0
          example: 80
        potassium:
          type: number
          minimum: 0
          default: 0
          example: 0
        monounsaturatedFats:
          type: number
          minimum: 0
          default: 0
          example: 0
        polyunsaturatedFats:
          type: number
          minimum: 0
          default: 0
          example: 0
        referenceBasis:
          type: string
          enum: [per_100g, per_serving, per_package]
          description: |
            Passed through from the database row. Typically "per_serving" for chain dishes
            (ADR-004), "per_100g" for USDA base foods.
          example: per_serving

    EstimateSource:
      type: object
      description: |
        Traceability block identifying the DataSource row from which the nutritional
        data was read. Satisfies the ADR-001 auditability requirement.
      required:
        - id
        - name
        - type
        - url
      properties:
        id:
          type: string
          format: uuid
          description: UUID of the data_sources row.
          example: "00000000-0000-0000-0000-000000000001"
        name:
          type: string
          description: Human-readable source name (e.g. "McDonald's Spain Official PDF").
          example: "McDonald's Spain Official PDF"
        type:
          type: string
          enum: [official, estimated, scraped, user]
          description: DataSource.type enum value.
          example: official
        url:
          type: string
          nullable: true
          description: Source URL if available; null for USDA seed data.
          example: "https://www.mcdonalds.es/.../nutritional.pdf"

    EstimateResult:
      type: object
      description: |
        The matched entity (dish or food) with its full nutrient profile. Present when any
        level hit flag is true; null when no match was found at any level.
      required:
        - entityType
        - entityId
        - name
        - nameEs
        - restaurantId
        - chainSlug
        - portionGrams
        - nutrients
        - confidenceLevel
        - estimationMethod
        - source
        - similarityDistance
      properties:
        entityType:
          type: string
          enum: [dish, food]
          description: |
            "dish" — matched a restaurants.dishes row (chain-specific).
            "food" — matched a foods row (USDA generic, chain-agnostic).
          example: dish
        entityId:
          type: string
          format: uuid
          description: UUID of the matched dishes or foods row.
          example: "uuid-of-dish"
        name:
          type: string
          description: Canonical name of the matched entity (English or chain original).
          example: "Big Mac"
        nameEs:
          type: string
          nullable: true
          description: Spanish name if available; null for many USDA foods.
          example: "Big Mac"
        restaurantId:
          type: string
          format: uuid
          nullable: true
          description: UUID of the restaurant owning this dish. Null when entityType is "food".
          example: "uuid-of-restaurant"
        chainSlug:
          type: string
          nullable: true
          description: Chain slug of the owning restaurant. Null when entityType is "food".
          example: "mcdonalds-es"
        portionGrams:
          type: number
          nullable: true
          description: |
            Dish portion weight in grams if available. Null for most chain dishes
            (portion is implicit in the per_serving nutrients) and for generic foods.
          example: 200
        nutrients:
          $ref: '#/components/schemas/EstimateNutrients'
        confidenceLevel:
          type: string
          enum: [high, medium, low]
          description: |
            Reflects the estimation method used:
            - "high"   — Level 1 official data (always high for L1 results).
            - "medium" — Level 2 ingredient-based, all ingredients resolved;
                         OR Level 4 Strategy A (LLM food match, full resolution);
                         OR Level 4 Strategy B (LLM decomposition, all ingredients resolved).
            - "low"    — Level 2 ingredient-based, some ingredients unresolvable (partial sum);
                         OR Level 3 similarity extrapolation (always low — nutrients come from
                         a different but semantically similar entity);
                         OR Level 4 Strategy B with some unresolvable ingredients.
          example: high
        estimationMethod:
          type: string
          enum: [official, ingredients, extrapolation, scraped, llm]
          description: |
            How the nutritional values were produced:
            - "official"     — Level 1: read directly from dish_nutrients or food_nutrients.
            - "ingredients"  — Level 2: aggregated from dish_ingredients via food_nutrients.
            - "llm"          — Level 4: LLM identified the food or decomposed the dish; nutrients
                               still come from food_nutrients (LLM never calculates values).
            - "extrapolation"— Level 3: nutrients copied from the nearest pgvector neighbour.
            - "scraped"      — data sourced by the scraper pipeline (not produced by the engine).
          example: official
        source:
          $ref: '#/components/schemas/EstimateSource'
          description: |
            Traceability block. For Level 1 results, points to the data_sources row of the
            matched dish_nutrients or food_nutrients record. For Level 2 results, this is a
            synthetic computed provenance marker: source.id is the dish's data_sources UUID,
            source.name is "Computed from ingredients", source.type is "estimated". For Level 3
            results, points to the data_sources row of the similar entity (dish or food) that
            was the nearest neighbour — the original entity's source, not a synthetic one.
            For Level 4 results, this is a synthetic provenance marker:
            source.id is a seed data_sources row UUID, source.name is
            "LLM-assisted identification", source.type is "estimated", source.url is null.
        similarityDistance:
          type: number
          nullable: true
          description: |
            Cosine distance between the query embedding and the matched entity's embedding.
            Range: [0.0, 2.0] — 0.0 is identical, 2.0 is opposite. Only present and non-null
            when `estimationMethod` is `"extrapolation"` (Level 3 hit). Null for Level 1,
            Level 2, and Level 4 results.
          example: 0.18

    EstimateData:
      type: object
      description: |
        The full payload for a GET /estimate response. Covers all four estimation levels
        (L1 + L2 + L3 + L4). F023 (Engine Router) uses this schema without modifications —
        the cascade output maps directly into this shape.
      required:
        - query
        - chainSlug
        - level1Hit
        - level2Hit
        - level3Hit
        - level4Hit
        - matchType
        - result
        - cachedAt
      properties:
        query:
          type: string
          description: The query string as received (trimmed).
          example: "Big Mac"
        chainSlug:
          type: string
          nullable: true
          description: The chainSlug parameter as provided, or null if omitted.
          example: "mcdonalds-es"
        level1Hit:
          type: boolean
          description: |
            True if Level 1 (official data lookup) produced a match. When true, level2Hit
            and level3Hit are always false (lower levels not attempted after a Level 1 hit).
          example: true
        level2Hit:
          type: boolean
          description: |
            True if Level 2 (ingredient-based estimation) produced a match. Only possible
            when level1Hit is false. When true, level3Hit is always false.
          example: false
        level3Hit:
          type: boolean
          description: |
            True if Level 3 (pgvector similarity extrapolation) produced a match. Only
            possible when both level1Hit and level2Hit are false. False when any upper level
            hit, when OPENAI_API_KEY is not configured (graceful skip), when the OpenAI
            call fails, or when no similar entity is within the cosine distance threshold.
          example: false
        level4Hit:
          type: boolean
          description: |
            True if Level 4 (LLM identification) produced a match. Only possible when
            level1Hit, level2Hit, and level3Hit are all false. False when any upper level hit,
            when OPENAI_API_KEY or OPENAI_CHAT_MODEL is not configured (graceful skip),
            when the OpenAI chat completion call fails, or when the LLM response cannot be
            resolved to a known DB entity.
          example: false
        matchType:
          type: string
          nullable: true
          enum:
            - exact_dish
            - fts_dish
            - exact_food
            - fts_food
            - ingredient_dish_exact
            - ingredient_dish_fts
            - similarity_dish
            - similarity_food
            - llm_food_match
            - llm_ingredient_decomposition
          description: |
            Which strategy produced the match.
            Level 1 strategies:
            - exact_dish                  — case-insensitive exact match on dishes.name
            - fts_dish                    — FTS match on dishes (Spanish or English)
            - exact_food                  — case-insensitive exact match on foods.name_es or foods.name
            - fts_food                    — FTS match on foods (Spanish or English)
            Level 2 strategies:
            - ingredient_dish_exact       — case-insensitive exact match on dishes.name, aggregated
                                            from dish_ingredients
            - ingredient_dish_fts         — FTS match on dishes.name/name_es, aggregated from
                                            dish_ingredients
            Level 3 strategies:
            - similarity_dish             — nearest-neighbour pgvector cosine match on dishes.embedding
            - similarity_food             — nearest-neighbour pgvector cosine match on foods.embedding
                                            (dishes searched first; foods are the fallback)
            Level 4 strategies:
            - llm_food_match              — LLM identified the closest known food in the DB
                                            (Strategy A). Nutrients come from food_nutrients.
            - llm_ingredient_decomposition — LLM decomposed the query into known ingredients,
                                            aggregated via L2-style arithmetic (Strategy B).
                                            Nutrients are computed from resolved food_nutrients rows.
            Null when all four level hit flags are false (total miss).
          example: exact_dish
        result:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EstimateResult'
          description: |
            The matched entity with nutrients and source. Null when all four level hit flags
            are false. Non-null when any level produces a result.
        cachedAt:
          type: string
          nullable: true
          description: |
            ISO-8601 timestamp when this result was written to Redis cache. Non-null means
            the data was served from cache and may be up to 300 seconds old. Null means
            the data was retrieved live from the DB during this request.
          example: "2026-03-17T10:04:55.000Z"

    EstimateResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/EstimateData'

    # -------------------------------------------------------------------------
    # F025 / F032 Catalog schemas
    # -------------------------------------------------------------------------

    PaginationMeta:
      type: object
      required: [page, pageSize, totalItems, totalPages]
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 3
          description: Math.ceil(totalItems / pageSize). 0 when totalItems is 0.

    RestaurantListItem:
      type: object
      required: [id, name, chainSlug, countryCode, isActive, dishCount]
      description: |
        A restaurant as returned by GET /restaurants. `chainSlug` is always present in the
        response (never null) — independent restaurants have a server-generated slug with
        the `independent-` prefix.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "McDonald's Spain"
        nameEs:
          type: string
          nullable: true
          example: "McDonald's España"
        chainSlug:
          type: string
          description: |
            Chain slug for chain restaurants (e.g. "mcdonalds-es"). For independent
            restaurants this is auto-generated as "independent-<name-slug>-<uuid-short>"
            and is never null in the response.
          example: "mcdonalds-es"
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          example: "ES"
        isActive:
          type: boolean
          example: true
        logoUrl:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
          example: "https://www.mcdonalds.es"
        address:
          type: string
          nullable: true
          maxLength: 500
          description: Free-text street address. Null if not provided at creation time.
          example: "Paseo de Gracia, 40, 08007 Barcelona"
        latitude:
          type: number
          nullable: true
          minimum: -90
          maximum: 90
          description: GPS latitude (decimal degrees). Null if not provided.
          example: 41.3917
        longitude:
          type: number
          nullable: true
          minimum: -180
          maximum: 180
          description: GPS longitude (decimal degrees). Null if not provided.
          example: 2.1650
        googleMapsUrl:
          type: string
          nullable: true
          description: |
            URL to the Google Maps listing. Phase 1 — caller provides full URL manually.
            Phase 2 — bot auto-fills from short link.
          example: null
        dishCount:
          type: integer
          minimum: 0
          example: 127

    CreateRestaurantBody:
      type: object
      description: |
        Request body for POST /restaurants. `chainSlug` is optional — omit it to create
        an independent restaurant (server auto-generates the slug). `name` is required;
        all location fields are optional (Phase 1 — manual entry only).
      required:
        - name
        - countryCode
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Restaurant name (English or primary language).
          example: "La Tasca de Pepe"
        nameEs:
          type: string
          maxLength: 255
          nullable: true
          description: Spanish name if different from `name`. Null if not applicable.
          example: null
        chainSlug:
          type: string
          pattern: '^[a-z0-9-]+$'
          minLength: 1
          maxLength: 100
          description: |
            Chain slug for chain restaurants. Must match the pattern `^[a-z0-9-]+$`.
            Omit for independent restaurants — the server auto-generates a slug as
            `independent-<name-slugified>-<uuid-short>`.
          example: "mcdonalds-es"
        countryCode:
          type: string
          pattern: '^[A-Z]{2}$'
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code (uppercase).
          example: "ES"
        website:
          type: string
          nullable: true
          description: Full URL to the restaurant's website.
          example: "https://www.mcdonalds.es"
        logoUrl:
          type: string
          nullable: true
          description: Full URL to the restaurant's logo image.
          example: null
        address:
          type: string
          nullable: true
          maxLength: 500
          description: Free-text street address.
          example: "Calle Mayor, 12, 28013 Madrid"
        latitude:
          type: number
          nullable: true
          minimum: -90
          maximum: 90
          description: GPS latitude (decimal degrees). Range -90 to 90.
          example: 40.4153
        longitude:
          type: number
          nullable: true
          minimum: -180
          maximum: 180
          description: GPS longitude (decimal degrees). Range -180 to 180.
          example: -3.7074
        googleMapsUrl:
          type: string
          nullable: true
          description: |
            Full URL to the Google Maps listing (e.g. https://maps.google.com/?cid=...).
            Phase 1: manual entry by caller. Phase 2: bot resolves short links automatically.
          example: null

    CreatedRestaurant:
      type: object
      description: The newly created restaurant record as returned by POST /restaurants.
      required:
        - id
        - name
        - chainSlug
        - countryCode
        - isActive
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Server-generated UUID for the new restaurant.
          example: "00000000-0000-0000-0006-000000000021"
        name:
          type: string
          example: "La Tasca de Pepe"
        nameEs:
          type: string
          nullable: true
          example: null
        chainSlug:
          type: string
          description: |
            For chain restaurants: the value provided in the request body.
            For independent restaurants: the auto-generated slug
            (`independent-<name-slug>-<uuid-short>`).
          example: "independent-la-tasca-de-pepe-a3f2"
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          example: "ES"
        isActive:
          type: boolean
          example: true
          description: Always true at creation time.
        website:
          type: string
          nullable: true
          example: null
        logoUrl:
          type: string
          nullable: true
          example: null
        address:
          type: string
          nullable: true
          maxLength: 500
          example: "Calle Mayor, 12, 28013 Madrid"
        latitude:
          type: number
          nullable: true
          minimum: -90
          maximum: 90
          example: null
        longitude:
          type: number
          nullable: true
          minimum: -180
          maximum: 180
          example: null
        googleMapsUrl:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 creation timestamp.
          example: "2026-03-24T12:00:00.000Z"

    CreateRestaurantResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/CreatedRestaurant'

    DishListItem:
      type: object
      required: [id, name, restaurantId, chainSlug, restaurantName, availability]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Big Mac"
        nameEs:
          type: string
          nullable: true
          example: "Big Mac"
        restaurantId:
          type: string
          format: uuid
        chainSlug:
          type: string
          example: "mcdonalds-es"
        restaurantName:
          type: string
          example: "McDonald's Spain"
        availability:
          $ref: '#/components/schemas/DishAvailability'
        portionGrams:
          type: number
          nullable: true
          example: 215
        priceEur:
          type: number
          nullable: true
          example: 5.5

    ChainListItem:
      type: object
      required: [chainSlug, name, countryCode, dishCount, isActive]
      properties:
        chainSlug:
          type: string
          example: "mcdonalds-es"
        name:
          type: string
          example: "McDonald's Spain"
        nameEs:
          type: string
          nullable: true
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          example: "ES"
        dishCount:
          type: integer
          minimum: 0
          example: 127
          description: Aggregated across all restaurants with the same chainSlug.
        isActive:
          type: boolean
          example: true
          description: True if ANY restaurant in the chain group is active.

    # -------------------------------------------------------------------------
    # Auth (F026)
    # -------------------------------------------------------------------------

    ApiKeyTier:
      type: string
      enum: [free, pro]
      description: |
        Rate limit tier for an API key.
        - free: 100 requests per 15 minutes per key
        - pro:  1000 requests per 15 minutes per key
      example: free

    ApiKey:
      type: object
      description: |
        API key record as stored in the database. The raw key is never stored —
        only key_hash (SHA-256) and key_prefix (first 8 chars) are persisted.
        The raw key is shown only once at creation time.
      required:
        - id
        - keyHash
        - keyPrefix
        - name
        - tier
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: UUID primary key.
          example: "11111111-1111-1111-1111-111111111111"
        keyHash:
          type: string
          minLength: 64
          maxLength: 64
          description: |
            SHA-256 hex digest of the raw API key. Used for lookup on every request.
          example: "a3f5c...64 hex chars"
        keyPrefix:
          type: string
          minLength: 8
          maxLength: 8
          description: |
            First 8 characters of the raw API key (e.g. "fxp_a1b2"). Used for
            operator identification — never for authentication.
          example: "fxp_a1b2"
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable label for this key (e.g. "Telegram Bot", "Web App").
          example: "Telegram Bot"
        tier:
          $ref: '#/components/schemas/ApiKeyTier'
        isActive:
          type: boolean
          default: true
          description: |
            Whether the key is active. Set to false to soft-revoke without deleting.
            Revoked keys receive HTTP 403.
          example: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Optional expiry timestamp. Expired keys receive HTTP 401.
            Null means the key never expires.
          example: null
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp of the most recent authenticated request using this key.
            Updated asynchronously (fire-and-forget) — may lag by one request.
          example: "2026-03-19T12:00:00.000Z"
        createdAt:
          type: string
          format: date-time
          example: "2026-03-19T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-19T10:00:00.000Z"

    LevelDistribution:
      type: object
      description: Count of queries by cache/estimation level hit.
      required: [l1, l2, l3, l4, miss]
      properties:
        l1:
          type: integer
          minimum: 0
          description: Queries resolved at Level 1 (official data).
        l2:
          type: integer
          minimum: 0
          description: Queries resolved at Level 2 (ingredient-based).
        l3:
          type: integer
          minimum: 0
          description: Queries resolved at Level 3 (pgvector similarity).
        l4:
          type: integer
          minimum: 0
          description: Queries resolved at Level 4 (LLM identification).
        miss:
          type: integer
          minimum: 0
          description: Queries with no match at any level.

    ChainQueryCount:
      type: object
      required: [chainSlug, count]
      properties:
        chainSlug:
          type: string
          example: mcdonalds-es
        count:
          type: integer
          minimum: 0

    TopQueryTerm:
      type: object
      required: [queryText, count]
      properties:
        queryText:
          type: string
          example: big mac
        count:
          type: integer
          minimum: 0

    SourceDistribution:
      type: object
      description: Count of queries by request source.
      required: [api, bot]
      properties:
        api:
          type: integer
          minimum: 0
          description: "Queries from direct API callers (no X-FXP-Source: bot header)."
        bot:
          type: integer
          minimum: 0
          description: "Queries from the Telegram bot (X-FXP-Source: bot header)."

    AnalyticsData:
      type: object
      required: [totalQueries, cacheHitRate, avgResponseTimeMs, byLevel, byChain, bySource, topQueries, timeRange]
      properties:
        totalQueries:
          type: integer
          minimum: 0
          description: Total number of queries in the selected time range.
        cacheHitRate:
          type: number
          minimum: 0
          maximum: 1
          description: Fraction of queries served from cache (0–1, 4 decimal places). 0 when totalQueries=0.
          example: 0.7500
        avgResponseTimeMs:
          type: number
          nullable: true
          description: Average response time in milliseconds. null when totalQueries=0.
          example: 42.5
        byLevel:
          $ref: '#/components/schemas/LevelDistribution'
        byChain:
          type: array
          items:
            $ref: '#/components/schemas/ChainQueryCount'
          description: Chains ordered by query count descending.
        bySource:
          $ref: '#/components/schemas/SourceDistribution'
        topQueries:
          type: array
          items:
            $ref: '#/components/schemas/TopQueryTerm'
          description: Top N query terms ordered by count descending.
        scopedToChain:
          type: string
          description: Present when chainSlug filter was applied. Echoes the filter value.
          example: mcdonalds-es
        timeRange:
          type: string
          enum: [24h, 7d, 30d, all]
          description: The time range used for this aggregation.

    AnalyticsQueryResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/AnalyticsData'

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Optional API key for public-facing endpoints (F026). Callers without a key are
        allowed but subject to the anonymous rate limit (30 req/15min/IP). Callers with
        a valid key receive a higher limit (free: 100/15min, pro: 1000/15min).
        Accepted via X-API-Key header only (no query param fallback — keys in URLs leak
        into logs and browser history).
        Key format: fxp_<32 hex chars> (36 chars total).
    AdminKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Required API key for admin/internal endpoints (F026). Must equal the
        ADMIN_API_KEY environment variable (compared via SHA-256 hash to prevent timing
        attacks). No database lookup — env var comparison only.
