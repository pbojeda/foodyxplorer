    get:
      summary: Health check
      description: |
        Returns server liveness. Optionally checks DB connectivity (`?db=true`)
        and/or Redis connectivity (`?redis=true`). Both parameters can be combined.
        The `db` and `redis` fields are present in the response only when the
        respective check is requested.
      operationId: healthCheck
      tags:
        - System
      parameters:
        - name: db
          in: query
          required: false
          description: Include a database connectivity check (SELECT 1 via Prisma) when set to "true".
          schema:
            type: string
            enum: ["true"]
        - name: redis
          in: query
          required: false
          description: Include a Redis connectivity check (PING) when set to "true".
          schema:
            type: string
            enum: ["true"]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                basic:
                  summary: Basic health check
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                withDb:
                  summary: Health check with DB connectivity
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                    db: connected
                withRedis:
                  summary: Health check with Redis connectivity
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                    redis: connected
                withDbAndRedis:
                  summary: Health check with both DB and Redis connectivity
                  value:
                    status: ok
                    timestamp: "2026-03-11T10:00:00.000Z"
                    version: "0.1.0"
                    uptime: 42.3
                    db: connected
                    redis: connected
        '500':
          description: Service is unhealthy (e.g. DB or Redis unreachable when respective check is requested)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbUnavailable:
                  summary: Database unreachable
                  value:
                    success: false
                    error:
                      message: "Database connectivity check failed"
                      code: "DB_UNAVAILABLE"
                redisUnavailable:
                  summary: Redis unreachable
                  value:
                    success: false
                    error:
                      message: "Redis connectivity check failed"
                      code: "REDIS_UNAVAILABLE"

  /calculate/recipe:
    post:
      tags: [Calculation]
      operationId: calculateRecipe
      summary: Calculate aggregate nutritional information for a recipe
      description: |
        Accepts a recipe in structured (typed ingredient array) or free-form (plain text) mode.
        Resolves each ingredient via a food-only cascade:
          direct_id → exact_food → fts_food → similarity_food (L3) → llm_food_match (L4).
        Returns per-ingredient breakdown plus aggregated totals.
        Partial resolution returns 200 with unresolvedIngredients and confidenceLevel: "low".
        Zero resolution returns 422 RECIPE_UNRESOLVABLE.
        Free-form mode requires OPENAI_API_KEY; returns 422 FREE_FORM_PARSE_FAILED if parsing fails.
        Route timeout: 30s → 408 PROCESSING_TIMEOUT.
        Responses cached in Redis for 300 seconds (fxp:recipe:<mode>:<sha256>).
        Stateless — no writes to Recipe or RecipeIngredient tables.
        See ADR-001 (Motor calculates, LLM interprets), ADR-009 §5 (portion_multiplier).
      security:
        - PublicKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: StructuredBody
                  type: object
                  required: [mode, ingredients]
                  properties:
                    mode:
                      type: string
                      enum: [structured]
                    ingredients:
                      type: array
                      minItems: 1
                      maxItems: 50
                      items:
                        type: object
                        required: [grams]
                        properties:
                          foodId:
                            type: string
                            format: uuid
                            description: Direct UUID lookup in food_nutrients (mutually exclusive with name)
                          name:
                            type: string
                            minLength: 1
                            maxLength: 255
                            description: Ingredient name for L1/L3/L4 resolution (mutually exclusive with foodId)
                          grams:
                            type: number
                            exclusiveMinimum: 0
                            maximum: 5000
                          portionMultiplier:
                            type: number
                            minimum: 0.1
                            maximum: 5.0
                            default: 1.0
                            description: LLM-provided hint per ADR-009 §5; applied as nutrient * grams/100 * portionMultiplier
                - title: FreeFormBody
                  type: object
                  required: [mode, text]
                  properties:
                    mode:
                      type: string
                      enum: [free-form]
                    text:
                      type: string
                      minLength: 1
                      maxLength: 2000
                      description: Plain-text recipe description (Spanish or English). Parsed by LLM into structured ingredients.
            examples:
              structured:
                summary: Structured mode — direct_id + name-based
                value:
                  mode: structured
                  ingredients:
                    - foodId: "fd000000-0001-4000-a000-000000000001"
                      grams: 200
                    - name: "arroz blanco"
                      grams: 100
                    - name: "aceite de oliva virgen extra"
                      grams: 15
                      portionMultiplier: 1.0
              freeForm:
                summary: Free-form mode — LLM parses text
                value:
                  mode: free-form
                  text: "200g de pechuga de pollo a la plancha, 100g de arroz blanco, 50ml de aceite de oliva"
      responses:
        '200':
          description: |
            Recipe nutrients aggregated successfully. resolvedCount ≥ 1.
            If some ingredients are unresolved, unresolvedCount > 0 and confidenceLevel: "low".
            cachedAt is null on first request; ISO string on cache hit.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum: [structured, free-form]
                      resolvedCount:
                        type: integer
                        minimum: 0
                      unresolvedCount:
                        type: integer
                        minimum: 0
                      confidenceLevel:
                        type: string
                        enum: [medium, low]
                        description: |
                          medium — all resolved via direct_id, L1, or L3.
                          low — any ingredient used L4 or is unresolved.
                      totalNutrients:
                        $ref: '#/components/schemas/RecipeNutrients'
                      ingredients:
                        type: array
                        items:
                          type: object
                          properties:
                            input:
                              type: object
                              properties:
                                foodId:
                                  type: string
                                  format: uuid
                                  nullable: true
                                name:
                                  type: string
                                  nullable: true
                                grams:
                                  type: number
                                portionMultiplier:
                                  type: number
                            resolved:
                              type: boolean
                            resolvedAs:
                              nullable: true
                              type: object
                              properties:
                                entityId:
                                  type: string
                                  format: uuid
                                name:
                                  type: string
                                nameEs:
                                  type: string
                                  nullable: true
                                matchType:
                                  type: string
                                  enum: [direct_id, exact_food, fts_food, similarity_food, llm_food_match]
                            nutrients:
                              nullable: true
                              $ref: '#/components/schemas/RecipeNutrients'
                      unresolvedIngredients:
                        type: array
                        items:
                          type: string
                      parsedIngredients:
                        description: Present only in free-form mode. LLM-extracted ingredient list before resolution.
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            grams:
                              type: number
                            portionMultiplier:
                              type: number
                      cachedAt:
                        type: string
                        format: date-time
                        nullable: true
              examples:
                structuredPartial:
                  summary: Structured mode — partial resolution
                  value:
                    success: true
                    data:
                      mode: structured
                      resolvedCount: 1
                      unresolvedCount: 1
                      confidenceLevel: low
                      totalNutrients:
                        calories: 330
                        proteins: 62
                        carbohydrates: 0
                        sugars: 0
                        fats: 7.2
                        saturatedFats: 2
                        fiber: 0
                        salt: 0.2
                        sodium: 148
                        transFats: 0
                        cholesterol: 170
                        potassium: 440
                        monounsaturatedFats: 2.4
                        polyunsaturatedFats: 1.6
                        alcohol: 0
                        referenceBasis: per_serving
                      ingredients:
                        - input:
                            foodId: null
                            name: pechuga de pollo
                            grams: 200
                            portionMultiplier: 1.0
                          resolved: true
                          resolvedAs:
                            entityId: "fd000000-0001-4000-a000-000000000001"
                            name: "Chicken, broilers or fryers, breast"
                            nameEs: "Pechuga de pollo"
                            matchType: fts_food
                          nutrients:
                            calories: 330
                            proteins: 62
                            carbohydrates: 0
                            sugars: 0
                            fats: 7.2
                            saturatedFats: 2
                            fiber: 0
                            salt: 0.2
                            sodium: 148
                            transFats: 0
                            cholesterol: 170
                            potassium: 440
                            monounsaturatedFats: 2.4
                            polyunsaturatedFats: 1.6
                            alcohol: 0
                            referenceBasis: per_serving
                        - input:
                            foodId: null
                            name: ingrediente raro
                            grams: 50
                            portionMultiplier: 1.0
                          resolved: false
                          resolvedAs: null
                          nutrients: null
                      unresolvedIngredients: ["ingrediente raro"]
                      cachedAt: null
        '400':
          description: Validation error — invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bothFoodIdAndName:
                  summary: Both foodId and name provided
                  value:
                    success: false
                    error:
                      message: "Exactly one of foodId or name must be provided (not both, not neither)"
                      code: VALIDATION_ERROR
                gramsZero:
                  summary: grams = 0 (not positive)
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: VALIDATION_ERROR
        '408':
          description: Route processing exceeded 30s timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Recipe calculation timed out"
                  code: PROCESSING_TIMEOUT
        '422':
          description: |
            RECIPE_UNRESOLVABLE — zero ingredients could be resolved (nothing to aggregate).
            FREE_FORM_PARSE_FAILED — LLM could not extract any ingredients from free-form text.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unresolvable:
                  summary: Zero ingredients resolved
                  value:
                    success: false
                    error:
                      message: "No ingredients could be resolved for this recipe"
                      code: RECIPE_UNRESOLVABLE
                freeFormFailed:
                  summary: LLM parse failed (free-form mode)
                  value:
                    success: false
                    error:
                      message: "LLM failed to parse free-form recipe text"
                      code: FREE_FORM_PARSE_FAILED
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /analyze/menu:
    post:
      tags: [Analysis]
      operationId: analyzeMenu
      summary: Extract dish names from a menu photo or PDF and return nutritional estimates
      description: |
        Accepts a photo (JPEG/PNG/WebP) or PDF of a restaurant menu, or a photo of a
        single dish. Extracts dish names via one of four processing modes, then runs
        `runEstimationCascade` on each name to return per-dish nutritional estimates.

        **Processing modes:**
        - `auto` (default): PDF files → OCR pipeline; image files → Vision API pipeline.
        - `ocr`: PDF → `pdf-parse` text extraction → `parseDishNames`. Image →
          `extractTextFromImage` (Tesseract) → `parseDishNames`. No PDF-to-image
          rendering — PDFs use direct text extraction.
        - `vision`: Image only (PDFs rejected with `INVALID_IMAGE`). Vision API
          (gpt-4o-mini, maxTokens 2048) with menu-extraction prompt → JSON array of
          dish name strings. OCR fallback on Vision API failure.
        - `identify`: Image only (PDFs rejected with `INVALID_IMAGE`). Vision API with
          single-dish-identification prompt → exactly 1 dish. No OCR fallback — if
          Vision fails, `MENU_ANALYSIS_FAILED` is returned.

        **OCR pipeline (PDF):** `pdf-parse` → text lines → `parseDishNames(lines)` →
        string array of dish names.

        **OCR pipeline (image):** `extractTextFromImage` (Tesseract) → text lines →
        `parseDishNames(lines)` → string array of dish names.

        **Vision API pipeline:** image buffer → OpenAI `gpt-4o-mini` chat completion
        (maxTokens 2048) with a menu-extraction prompt → JSON array of dish name strings.

        **Dish identification pipeline (`identify` mode):** image buffer → OpenAI
        `gpt-4o-mini` chat completion with a single-dish identification prompt → exactly
        1 dish name string.

        **Fallback (vision mode only):** When `vision` mode is requested and the OpenAI
        call fails, the handler attempts Tesseract OCR as a fallback. If OCR produces
        fewer than 1 dish name, `MENU_ANALYSIS_FAILED` is returned. No fallback for
        `identify` mode (OCR on a food photo is not useful).

        **Per-dish estimation:** Each extracted dish name is passed individually to
        `runEstimationCascade({ db, query: dishName, openAiApiKey, level4Lookup, logger })`.
        A dish whose cascade returns a total miss is included with `estimate: null` (not
        omitted from the response). The endpoint always returns HTTP 200 as long as at
        least one dish name was extracted, even if all estimates are null.

        **Stateless:** No writes to any database table.

        **Rate limit:** 10 analyses per hour per API key (in addition to the standard
        tier rate limit). Exceeding this limit returns HTTP 429 `RATE_LIMIT_EXCEEDED`.
        The bot API key is exempt from this limit (per-user bot rate limiting is
        enforced at the bot handler layer, not at the API level).

        **Auth:** Public API key required (`X-API-Key` header). Anonymous requests are
        rejected (HTTP 401). Admin key also accepted.

        **Partial results:** If the 60-second timeout is reached while processing
        cascade calls for individual dishes, the endpoint returns HTTP 200 with the
        dishes processed so far and `partial: true`. This avoids discarding work
        already completed.

        **ADR compliance:** The Vision API identifies dish names only — it NEVER
        calculates nutritional values. All nutrient computation goes through
        `runEstimationCascade` (ADR-001).

        **File constraints:** JPEG, PNG, WebP, or PDF. Maximum size: 10 MB.
        Content-Type must be `image/jpeg`, `image/png`, `image/webp`, or
        `application/pdf`. Mismatched Content-Type triggers `INVALID_IMAGE`.

        **Timeout:** 60 seconds (Vision API calls + N cascade calls may take longer
        than standard routes). On timeout, returns 200 with `partial: true` and
        the dishes processed so far (per ADR-011 decision #5).
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    Menu photo (JPEG/PNG/WebP) or PDF file. Maximum size: 10 MB.
                    Accepted MIME types: image/jpeg, image/png, image/webp,
                    application/pdf. The Content-Type detected from the buffer
                    (magic bytes) must match a supported type.
                mode:
                  type: string
                  enum: [auto, ocr, vision, identify]
                  default: auto
                  description: |
                    Processing mode:
                    - `auto` (default): selects pipeline based on file type
                      (PDF → OCR, image → Vision API).
                    - `ocr`: force Tesseract OCR on any file type.
                    - `vision`: force Vision API with menu-extraction prompt (image or PDF).
                    - `identify`: Vision API with single-dish-identification prompt.
                      Use this for photos of one food item/plate, not a full menu.
            examples:
              menuPhotoAuto:
                summary: Menu photo — auto mode (selects Vision API)
                value:
                  file: <binary>
                  mode: auto
              menuPdfOcr:
                summary: PDF menu — auto mode (selects OCR)
                value:
                  file: <binary>
                  mode: auto
              forcedVision:
                summary: Force Vision API on a PDF menu photo
                value:
                  file: <binary>
                  mode: vision
              singleDish:
                summary: Photo of one dish — identify mode
                value:
                  file: <binary>
                  mode: identify
      responses:
        '200':
          description: |
            Analysis completed. At least one dish name was extracted. Individual
            dishes may have `estimate: null` if the cascade returned a total miss —
            this is NOT an error. `dishCount` reflects extracted names, not resolved
            estimates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuAnalysisResponse'
              examples:
                menuSuccess:
                  summary: 3 dishes extracted, 2 estimated
                  value:
                    success: true
                    data:
                      mode: auto
                      dishCount: 3
                      dishes:
                        - dishName: "Big Mac"
                          estimate:
                            query: "Big Mac"
                            chainSlug: null
                            level1Hit: true
                            level2Hit: false
                            level3Hit: false
                            level4Hit: false
                            matchType: exact_dish
                            result:
                              entityId: "uuid-of-big-mac"
                              entityType: dish
                              name: "Big Mac"
                              nameEs: "Big Mac"
                              restaurantId: "uuid-of-restaurant"
                              chainSlug: "mcdonalds-es"
                              portionGrams: null
                              nutrients:
                                calories: 550
                                proteins: 25
                                carbohydrates: 46
                                fats: 28
                                saturatedFats: 10
                                sugars: 9
                                fiber: 3
                                salt: 2.2
                                sodium: 880
                                transFats: 0.5
                                cholesterol: 80
                                potassium: 0
                                monounsaturatedFats: 0
                                polyunsaturatedFats: 0
                                alcohol: 0
                                referenceBasis: per_serving
                              confidenceLevel: high
                              estimationMethod: official
                              source:
                                id: "uuid-of-source"
