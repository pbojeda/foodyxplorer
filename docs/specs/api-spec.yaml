openapi: 3.0.3
info:
  title: foodXPlorer API
  description: |
    API specification for the foodXPlorer nutritional information platform.
    Update this file BEFORE implementing new endpoints.

    **Response envelope:**
    - All successful responses use `{ success: true, data: <payload> }`.
    - All error responses use `{ success: false, error: { message, code, details? } }`.

    **Validation:**
    - Request bodies and query params are validated via `fastify-type-provider-zod`.
    - Zod schemas in `packages/shared/src/schemas/` are the single source of truth.
  version: 0.4.0
  contact:
    name: foodXPlorer
  license:
    name: TBD

servers:
  - url: http://localhost:3001
    description: Local development

tags:
  - name: System
    description: Infrastructure and health endpoints
  - name: Ingestion
    description: |
      Data ingestion endpoints (F007b, F007c, F009, F011, F012, F031). Accept external nutritional
      data (PDF upload, PDF-URL download, URL scrape, image-URL OCR, or direct image upload),
      normalize to the shared dish/nutrient schema, and persist to the database. These endpoints
      are NOT part of F007 — they are specified and implemented in F007b, F007c, F009, F011,
      F012, and F031 respectively.
  - name: Quality
    description: |
      Data quality monitoring endpoints (F018). Audit ingested dish and nutrient data
      across all chains and return structured metrics on completeness, plausibility,
      coverage, duplicates, confidence distribution, and data freshness.
  - name: Embeddings
    description: |
      Embedding generation endpoints (F019). Trigger OpenAI text-embedding-3-small
      vector generation for foods and/or dishes. Writes 1536-dimension embeddings
      via raw SQL ($executeRaw) into the pgvector columns. These embeddings power
      E003 Level 3 similarity extrapolation.
  - name: Estimation
    description: |
      Estimation Engine endpoints (E003, F020–F024). The engine is deterministic and
      auditable per ADR-001: it NEVER uses an LLM to calculate nutritional values.
      Four levels cascade: Level 1 (official data lookup, F020) → Level 2
      (ingredient-based calculation, F021) → Level 3 (pgvector similarity, F022) →
      Level 4 (LLM identification, F024). F023 (Engine Router) orchestrates all levels.
      Every response includes source traceability and a deterministic confidence level.
      The LLM in Level 4 is strictly an identification layer: it maps the query to known
      DB entities (Strategy A) or decomposes a dish into known ingredients (Strategy B),
      then delegates all arithmetic to the existing L1/L2 nutrient lookup logic.
  - name: Catalog
    description: |
      Catalog browsing and management endpoints (F025, F032). Allow consumers to browse
      restaurants, chains, and dishes before querying for nutritional data via GET /estimate.
      Read endpoints cache responses for 60 seconds (fail-open on Redis errors).
      Anonymous access allowed on read endpoints (lower rate limit). API key auth introduced
      in F026. Write endpoints (POST /restaurants) are admin-only (F032).
  - name: Analytics
    description: |
      Query log analytics endpoints (F029). Every call to GET /estimate is recorded
      asynchronously to the query_logs table. This endpoint aggregates those rows into
      operational metrics: total query counts, level-hit distribution, top queried terms,
      cache hit rate, average response time, and queries by chain and source.
      Admin-only (requires X-API-Key matching ADMIN_API_KEY env var).
  - name: Calculation
    description: |
      Recipe calculation endpoints (F035). Compute aggregate nutritional information
      for user-provided recipes. Stateless — does NOT persist to Recipe/RecipeIngredient
      tables. Supports two modes: structured (typed ingredient array) and free-form
      (plain-text parsed by LLM). The LLM is ONLY used to parse text into structured
      tuples (ADR-001: engine calculates, LLM interprets). Partial resolution returns 200;
      zero resolution returns 422 RECIPE_UNRESOLVABLE.

paths:
  /ingest/pdf:
    post:
      summary: Ingest nutritional data from a PDF upload
      description: |
        Accepts a PDF file upload containing nutritional data (restaurant menu PDFs,
        nutrition guide PDFs), extracts text, parses nutritional tables using
        heuristic/regex detection, normalizes the data through the shared
        `normalizeNutrients` / `normalizeDish` pipeline (packages/scraper), and
        persists the resulting dishes to the database.

        - Targets Spanish restaurant chain nutritional PDFs and nutrition guides.
        - Image-based (scanned) PDFs are not supported — only PDFs with embedded text.
        - Use `dryRun=true` to inspect parsed dishes without writing to the database.
        - Partial success (some dishes skipped) returns HTTP 200. Only total failure
          (zero parseable dishes) returns HTTP 422.
      operationId: ingestPdf
      tags:
        - Ingestion
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - restaurantId
                - sourceId
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    PDF file containing nutritional data. Must be a text-based PDF
                    (not a scanned image). Maximum size: 10 MB.
                restaurantId:
                  type: string
                  format: uuid
                  description: UUID of the Restaurant row this data belongs to.
                  example: "00000000-0000-0000-0000-000000000001"
                sourceId:
                  type: string
                  format: uuid
                  description: UUID of the DataSource row representing this PDF's origin.
                  example: "00000000-0000-0000-0000-000000000002"
                dryRun:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: |
                    When "true", runs extraction and normalization but skips all DB writes.
                    The response still contains the full `dishes` array for inspection.
      responses:
        '200':
          description: |
            Ingestion successful (or dryRun completed). At least one dish was parsed
            and upserted (or would be upserted in dryRun mode). Partial success
            (some dishes skipped) also returns 200 — see `dishesSkipped` and
            `skippedReasons` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestPdfResponse'
              examples:
                success:
                  summary: 45 dishes upserted, 3 skipped
                  value:
                    success: true
                    data:
                      dishesFound: 48
                      dishesUpserted: 45
                      dishesSkipped: 3
                      dryRun: false
                      dishes:
                        - name: "Big Mac"
                          nameEs: "Big Mac"
                          nutrients:
                            calories: 550
                            proteins: 25
                            carbohydrates: 46
                            fats: 28
                            saturatedFats: 10
                            sugars: 9
                            fiber: 3
                            salt: 2.2
                            sodium: 880
                            transFats: 0.5
                            cholesterol: 80
                            potassium: 0
                            monounsaturatedFats: 0
                            polyunsaturatedFats: 0
                            referenceBasis: "per_serving"
                          confidenceLevel: "medium"
                          estimationMethod: "scraped"
                          availability: "available"
                          restaurantId: "00000000-0000-0000-0000-000000000001"
                          sourceId: "00000000-0000-0000-0000-000000000002"
                      skippedReasons:
                        - dishName: "Bebida Grande"
                          reason: "Missing required field: proteins"
                dryRun:
                  summary: dryRun=true — no DB writes
                  value:
                    success: true
                    data:
                      dishesFound: 10
                      dishesUpserted: 0
                      dishesSkipped: 0
                      dryRun: true
                      dishes: []
                      skippedReasons: []
        '400':
          description: Validation error (missing fields, invalid UUID format, file missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingRestaurantId:
                  summary: restaurantId missing
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["restaurantId"]
                          message: "Required"
                          code: "invalid_type"
                fileMissing:
                  summary: No file part in multipart body
                  value:
                    success: false
                    error:
                      message: "No file uploaded"
                      code: "VALIDATION_ERROR"
        '404':
          description: restaurantId or sourceId not found in the database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                restaurantNotFound:
                  summary: Restaurant row does not exist
                  value:
                    success: false
                    error:
                      message: "Restaurant not found"
                      code: "NOT_FOUND"
        '408':
          description: PDF processing exceeded the 30-second timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                timeout:
                  value:
                    success: false
                    error:
                      message: "PDF processing timed out"
                      code: "PROCESSING_TIMEOUT"
        '413':
          description: Uploaded file exceeds the 10 MB size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                fileTooLarge:
                  value:
                    success: false
                    error:
                      message: "File size exceeds the 10 MB limit"
                      code: "VALIDATION_ERROR"
        '422':
          description: |
            Unprocessable PDF. One of three sub-cases:
            - `INVALID_PDF`: file is not a valid PDF (bad magic bytes or MIME type).
            - `UNSUPPORTED_PDF`: PDF is image-based (no extractable text).
            - `NO_NUTRITIONAL_DATA_FOUND`: PDF contains text but no parseable
              nutritional table, or all parsed rows failed normalization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPdf:
                  summary: Not a PDF
                  value:
                    success: false
                    error:
                      message: "File is not a valid PDF"
                      code: "INVALID_PDF"
                unsupportedPdf:
                  summary: Image-based PDF (no text)
                  value:
                    success: false
                    error:
                      message: "PDF contains no extractable text. Scanned PDFs are not supported."
                      code: "UNSUPPORTED_PDF"
                noData:
                  summary: No nutritional data found
                  value:
                    success: false
                    error:
                      message: "No nutritional data could be parsed from this PDF"
                      code: "NO_NUTRITIONAL_DATA_FOUND"
        '401':
          description: Missing or invalid admin API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Admin API key required"
                  code: "UNAUTHORIZED"
        '500':
          description: Database error during upsert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbError:
                  value:
                    success: false
                    error:
                      message: "Database write failed"
                      code: "DB_UNAVAILABLE"

  /ingest/pdf-url:
    post:
      summary: Ingest nutritional data from a PDF at a given URL
      description: |
        Accepts a JSON body with a URL pointing directly to a PDF file, downloads
        it (plain `fetch`, no browser), and pipes the buffer through the existing
        F007b pipeline: magic-bytes check → `extractText` → `parseNutritionTable`
        → `normalizeNutrients` / `normalizeDish` → Prisma `$transaction` upsert.

        - Input is a JSON body (not multipart — there is no file to upload).
        - Targets direct PDF download URLs (S3, CDN, static server). No JavaScript
          rendering is required; if a URL redirects to a login page the
          Content-Type check catches it.
        - Image-based (scanned) PDFs are not supported — returns `UNSUPPORTED_PDF`.
        - `sourceUrl` in the response echoes back the submitted URL for traceability
          (useful for F010 batch runner).
        - Partial success (some dishes skipped) returns HTTP 200. Only total failure
          returns HTTP 422.
        - SSRF guard: private/loopback URLs (localhost, 127.x, 10.x, 172.16–31.x,
          192.168.x, 169.254.x, ::1, ::ffff:*) are rejected with 422 INVALID_URL.
        - Size limit: 20 MB. Responses larger than this are rejected with 413.
        - Download + pipeline timeout: 30 seconds.
      operationId: ingestPdfUrl
      tags:
        - Ingestion
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestPdfUrlBody'
            examples:
              live:
                summary: Live run — download and persist (KFC Spain)
                value:
                  url: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
                  restaurantId: "00000000-0000-0000-0000-000000000001"
                  sourceId: "00000000-0000-0000-0000-000000000002"
                  dryRun: false
                  chainSlug: "kfc-es"
              dryRun:
                summary: Dry run — download and parse without DB writes
                value:
                  url: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
                  restaurantId: "00000000-0000-0000-0000-000000000001"
                  sourceId: "00000000-0000-0000-0000-000000000002"
                  dryRun: true
                  chainSlug: "kfc-es"
      responses:
        '200':
          description: |
            Ingestion successful (or dryRun completed). At least one dish was parsed
            and upserted (or would be upserted in dryRun mode). Partial success
            (some dishes skipped) also returns 200 — see `dishesSkipped` and
            `skippedReasons` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestPdfUrlResponse'
              examples:
                success:
                  summary: 50 dishes upserted, 2 skipped
                  value:
                    success: true
                    data:
                      dishesFound: 52
                      dishesUpserted: 50
                      dishesSkipped: 2
                      dryRun: false
                      sourceUrl: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
                      dishes:
                        - name: "Zinger Burger"
                          nameEs: "Zinger Burger"
                          nutrients:
                            calories: 490
                            proteins: 29
                            carbohydrates: 44
                            fats: 21
                            saturatedFats: 4
                            sugars: 5
                            fiber: 2
                            salt: 1.8
                            sodium: 720
                            transFats: 0
                            cholesterol: 65
                            potassium: 0
                            monounsaturatedFats: 0
                            polyunsaturatedFats: 0
                            referenceBasis: "per_serving"
                          confidenceLevel: "medium"
                          estimationMethod: "scraped"
                          availability: "available"
                          restaurantId: "00000000-0000-0000-0000-000000000001"
                          sourceId: "00000000-0000-0000-0000-000000000002"
                      skippedReasons:
                        - dishName: "Bebida Grande"
                          reason: "Missing required field: proteins"
                dryRun:
                  summary: dryRun=true — no DB writes
                  value:
                    success: true
                    data:
                      dishesFound: 10
                      dishesUpserted: 0
                      dishesSkipped: 0
                      dryRun: true
                      sourceUrl: "https://static.kfc.es/pdf/contenido-nutricional.pdf"
                      dishes: []
                      skippedReasons: []
        '400':
          description: Validation error (missing fields, invalid UUID format, invalid URL format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingUrl:
                  summary: url field missing
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["url"]
                          message: "Required"
                          code: "invalid_type"
                invalidUrl:
                  summary: url is not a valid URL string
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["url"]
                          message: "Invalid url"
                          code: "invalid_string"
        '404':
          description: restaurantId or sourceId not found in the database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                restaurantNotFound:
                  summary: Restaurant row does not exist
                  value:
                    success: false
                    error:
                      message: "Restaurant not found"
                      code: "NOT_FOUND"
        '408':
          description: Download + processing exceeded the 30-second timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                timeout:
                  value:
                    success: false
                    error:
                      message: "PDF processing timed out"
                      code: "PROCESSING_TIMEOUT"
        '413':
          description: Downloaded PDF exceeds the 20 MB size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                tooLarge:
                  value:
                    success: false
                    error:
                      message: "PDF exceeds the 20 MB size limit"
                      code: "PAYLOAD_TOO_LARGE"
        '422':
          description: |
            Unprocessable request. Sub-cases:
            - `INVALID_URL`: URL scheme is not http/https, or the URL resolves to a
              private/loopback address (SSRF guard).
            - `FETCH_FAILED`: network error, DNS failure, non-2xx HTTP response when
              downloading the PDF.
            - `INVALID_PDF`: response Content-Type is not application/pdf or
              application/octet-stream, OR buffer does not start with `%PDF-`.
            - `UNSUPPORTED_PDF`: PDF contains no extractable text (image-based/scanned).
            - `NO_NUTRITIONAL_DATA_FOUND`: PDF text contains no parseable nutritional
              table, or all parsed rows failed normalization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidUrl:
                  summary: Non-http/https scheme or private IP
                  value:
                    success: false
                    error:
                      message: "URL must use http or https scheme and must not target a private address"
                      code: "INVALID_URL"
                fetchFailed:
                  summary: Network or HTTP error during PDF download
                  value:
                    success: false
                    error:
                      message: "Failed to download PDF"
                      code: "FETCH_FAILED"
                invalidPdf:
                  summary: URL did not return a PDF
                  value:
                    success: false
                    error:
                      message: "URL did not return a PDF (Content-Type: text/html)"
                      code: "INVALID_PDF"
                unsupportedPdf:
                  summary: Image-based PDF (no text)
                  value:
                    success: false
                    error:
                      message: "PDF contains no extractable text. Scanned PDFs are not supported."
                      code: "UNSUPPORTED_PDF"
                noData:
                  summary: No nutritional data found
                  value:
                    success: false
                    error:
                      message: "No nutritional data could be parsed from this PDF"
                      code: "NO_NUTRITIONAL_DATA_FOUND"
        '401':
          description: Missing or invalid admin API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Admin API key required"
                  code: "UNAUTHORIZED"
        '500':
          description: Database error during upsert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbError:
                  value:
                    success: false
                    error:
                      message: "Database write failed"
                      code: "DB_UNAVAILABLE"

  /ingest/url:
    post:
      summary: Ingest nutritional data from a web page URL
      description: |
        Accepts a URL, fetches the page using Crawlee/Playwright (handles JS-rendered
        pages and basic anti-bot mitigations), extracts visible text from the HTML
        (table-aware, using node-html-parser), parses nutritional tables using the
        same heuristic/regex detection as POST /ingest/pdf, normalizes the data
        through the shared `normalizeNutrients` / `normalizeDish` pipeline
        (packages/scraper), and persists the resulting dishes to the database.

        - Input is a JSON body (not multipart — there is no file to upload).
        - Uses Crawlee/Playwright for fetching: handles JavaScript rendering and
          basic anti-bot challenges.
        - Phase 1: text-based HTML pages only. Pages that render nutritional data
          exclusively in canvas/SVG/images will return NO_NUTRITIONAL_DATA_FOUND.
        - `sourceUrl` in the response echoes back the submitted URL for traceability.
        - Partial success (some dishes skipped) returns HTTP 200. Only total failure
          (zero parseable dishes) returns HTTP 422.
        - SSRF guard: private/loopback URLs (localhost, 127.x.x.x, 192.168.x.x,
          10.x.x.x, 169.254.x.x) are rejected with 422 INVALID_URL.
      operationId: ingestUrl
      tags:
        - Ingestion
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestUrlBody'
            examples:
              live:
                summary: Live run — fetch and persist
                value:
                  url: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
                  restaurantId: "00000000-0000-0000-0000-000000000001"
                  sourceId: "00000000-0000-0000-0000-000000000002"
                  dryRun: false
              dryRun:
                summary: Dry run — fetch and parse without DB writes
                value:
                  url: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
                  restaurantId: "00000000-0000-0000-0000-000000000001"
                  sourceId: "00000000-0000-0000-0000-000000000002"
                  dryRun: true
      responses:
        '200':
          description: |
            Ingestion successful (or dryRun completed). At least one dish was parsed
            and upserted (or would be upserted in dryRun mode). Partial success
            (some dishes skipped) also returns 200 — see `dishesSkipped` and
            `skippedReasons` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestUrlResponse'
              examples:
                success:
                  summary: 30 dishes upserted, 2 skipped
                  value:
                    success: true
                    data:
                      dishesFound: 32
                      dishesUpserted: 30
                      dishesSkipped: 2
                      dryRun: false
                      sourceUrl: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
                      dishes:
                        - name: "Big Mac"
                          nameEs: null
                          nutrients:
                            calories: 550
                            proteins: 25
                            carbohydrates: 46
                            fats: 28
                            saturatedFats: 10
                            sugars: 9
                            fiber: 3
                            salt: 2.2
                            sodium: 880
                            transFats: 0.5
                            cholesterol: 80
                            potassium: 0
                            monounsaturatedFats: 0
                            polyunsaturatedFats: 0
                            referenceBasis: "per_serving"
                          confidenceLevel: "medium"
                          estimationMethod: "scraped"
                          availability: "available"
                          restaurantId: "00000000-0000-0000-0000-000000000001"
                          sourceId: "00000000-0000-0000-0000-000000000002"
                      skippedReasons:
                        - dishName: "Bebida"
                          reason: "Missing required field: proteins"
                dryRun:
                  summary: dryRun=true — no DB writes
                  value:
                    success: true
                    data:
                      dishesFound: 10
                      dishesUpserted: 0
                      dishesSkipped: 0
                      dryRun: true
                      sourceUrl: "https://www.mcdonalds.es/es/conoce/nuestra-comida/informacion-nutricional.html"
                      dishes: []
                      skippedReasons: []
        '400':
          description: Validation error (missing fields, invalid UUID format, invalid URL format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingUrl:
                  summary: url field missing
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["url"]
                          message: "Required"
                          code: "invalid_type"
                invalidUrl:
                  summary: url is not a valid URL string
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["url"]
                          message: "Invalid url"
                          code: "invalid_string"
        '404':
          description: restaurantId or sourceId not found in the database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                restaurantNotFound:
                  summary: Restaurant row does not exist
                  value:
                    success: false
                    error:
                      message: "Restaurant not found"
                      code: "NOT_FOUND"
        '408':
          description: URL processing exceeded the 30-second timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                timeout:
                  value:
                    success: false
                    error:
                      message: "URL processing timed out"
                      code: "PROCESSING_TIMEOUT"
        '422':
          description: |
            Unprocessable request. One of five sub-cases:
            - `INVALID_URL`: URL scheme is not http/https, or the URL resolves to a
              private/loopback address (SSRF guard).
            - `FETCH_FAILED`: network error, DNS failure, or non-2xx HTTP response.
            - `SCRAPER_BLOCKED`: server returned HTTP 403 or 429 (anti-bot protection).
            - `NO_NUTRITIONAL_DATA_FOUND`: page fetched but no parseable nutritional
              table found, or all parsed rows failed normalization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidUrl:
                  summary: Non-http/https scheme or private IP
                  value:
                    success: false
                    error:
                      message: "URL must use http or https scheme and must not target a private address"
                      code: "INVALID_URL"
                fetchFailed:
                  summary: Network or HTTP error
                  value:
                    success: false
                    error:
                      message: "Failed to fetch URL"
                      code: "FETCH_FAILED"
                scraperBlocked:
                  summary: Anti-bot block (403/429)
                  value:
                    success: false
                    error:
                      message: "Access to this URL is blocked (HTTP 403/429)"
                      code: "SCRAPER_BLOCKED"
                noData:
                  summary: No nutritional data found
                  value:
                    success: false
                    error:
                      message: "No nutritional data could be parsed from this URL"
                      code: "NO_NUTRITIONAL_DATA_FOUND"
        '401':
          description: Missing or invalid admin API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Admin API key required"
                  code: "UNAUTHORIZED"
        '500':
          description: Database error during upsert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbError:
                  value:
                    success: false
                    error:
                      message: "Database write failed"
                      code: "DB_UNAVAILABLE"

  /ingest/image-url:
    post:
      summary: Ingest nutritional data from an image at a given URL (OCR)
      description: |
        Accepts a JSON body with a URL pointing to a JPEG or PNG image containing
        a nutritional table, downloads the image, runs OCR via Tesseract.js
        (languages: spa+eng), and pipes the extracted text lines through the
        existing pipeline: optional `chainTextPreprocessor` → `parseNutritionTable`
        → `normalizeNutrients` / `normalizeDish` → Prisma `$transaction` upsert.

        Primary use case: Domino's Spain publishes nutritional data as JPEG images
        at `alergenos.dominospizza.es/img/` (not as PDFs). This endpoint is the
        OCR-based counterpart to `POST /ingest/pdf-url`.

        - Input is a JSON body (not multipart — there is no file to upload).
        - Supported image formats: JPEG (magic bytes FFD8FF), PNG (magic bytes 89504E47).
        - Content-Type `application/octet-stream` is accepted as a CDN passthrough;
          magic bytes are the authoritative format check.
        - `sourceUrl` in the response echoes back the submitted URL for traceability
          (consistent with POST /ingest/pdf-url and POST /ingest/url).
        - Partial success (some dishes skipped) returns HTTP 200. Only total failure
          (zero parseable dishes after OCR) returns HTTP 422.
        - SSRF guard: private/loopback URLs (localhost, 127.x, 10.x, 172.16–31.x,
          192.168.x, 169.254.x, ::1, ::ffff:*) are rejected with 422 INVALID_URL.
        - Size limit: 10 MB. Images larger than this are rejected with 413.
        - Total pipeline timeout: 60 seconds (OCR initialization + recognition adds
          latency compared to PDF text extraction; 30s would be insufficient).
        - OCR accuracy: Tesseract.js performs best on high-contrast printed text.
          Low-resolution or stylized images may produce degraded output.
          Use `dryRun: true` to inspect raw OCR output before a live ingest.
      operationId: ingestImageUrl
      tags:
        - Ingestion
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestImageUrlBody'
            examples:
              live:
                summary: Live run — download, OCR, and persist (Domino's Spain)
                value:
                  url: "https://alergenos.dominospizza.es/img/tabla_nutricional.jpg"
                  restaurantId: "00000000-0000-0000-0006-000000000014"
                  sourceId: "00000000-0000-0000-0000-000000000014"
                  dryRun: false
                  chainSlug: "dominos-es"
              dryRun:
                summary: Dry run — download, OCR, and parse without DB writes
                value:
                  url: "https://alergenos.dominospizza.es/img/tabla_nutricional.jpg"
                  restaurantId: "00000000-0000-0000-0006-000000000014"
                  sourceId: "00000000-0000-0000-0000-000000000014"
                  dryRun: true
                  chainSlug: "dominos-es"
              noChainSlug:
                summary: Generic image ingestion without chain-specific preprocessing
                value:
                  url: "https://example.com/nutrition-label.jpg"
                  restaurantId: "00000000-0000-0000-0006-000000000001"
                  sourceId: "00000000-0000-0000-0000-000000000001"
                  dryRun: false
      responses:
        '200':
          description: |
            Ingestion successful (or dryRun completed). At least one dish was parsed
            and upserted (or would be upserted in dryRun mode). Partial success
            (some dishes skipped) also returns 200 — see `dishesSkipped` and
            `skippedReasons` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestImageUrlResponse'
              examples:
                success:
                  summary: 40 dishes upserted, 2 skipped
                  value:
                    success: true
                    data:
                      dishesFound: 42
                      dishesUpserted: 40
                      dishesSkipped: 2
                      dryRun: false
                      sourceUrl: "https://alergenos.dominospizza.es/img/tabla_nutricional.jpg"
                      dishes:
                        - name: "Pizza Pepperoni"
                          nameEs: "Pizza Pepperoni"
                          nutrients:
                            calories: 265
                            proteins: 12
                            carbohydrates: 29
                            fats: 11
                            saturatedFats: 5
                            sugars: 3
                            fiber: 1.5
                            salt: 1.2
                            sodium: 480
                            transFats: 0
                            cholesterol: 30
                            potassium: 0
                            monounsaturatedFats: 0
                            polyunsaturatedFats: 0
                            referenceBasis: "per_serving"
                          confidenceLevel: "medium"
                          estimationMethod: "scraped"
                          availability: "available"
                          restaurantId: "00000000-0000-0000-0006-000000000014"
                          sourceId: "00000000-0000-0000-0000-000000000014"
                      skippedReasons:
                        - dishName: "Bebida"
                          reason: "Missing required field: proteins"
                dryRun:
                  summary: dryRun=true — no DB writes
                  value:
                    success: true
                    data:
                      dishesFound: 10
                      dishesUpserted: 0
                      dishesSkipped: 0
                      dryRun: true
                      sourceUrl: "https://alergenos.dominospizza.es/img/tabla_nutricional.jpg"
                      dishes: []
                      skippedReasons: []
        '400':
          description: Validation error (missing fields, invalid UUID format, invalid URL string)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingUrl:
                  summary: url field missing
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["url"]
                          message: "Required"
                          code: "invalid_type"
                invalidUuid:
                  summary: restaurantId is not a valid UUID
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["restaurantId"]
                          message: "Invalid uuid"
                          code: "invalid_string"
        '404':
          description: restaurantId or sourceId not found in the database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                restaurantNotFound:
                  summary: Restaurant row does not exist
                  value:
                    success: false
                    error:
                      message: "Restaurant not found"
                      code: "NOT_FOUND"
                sourceNotFound:
                  summary: DataSource row does not exist
                  value:
                    success: false
                    error:
                      message: "Data source not found"
                      code: "NOT_FOUND"
        '408':
          description: Image download + OCR + processing exceeded the 60-second timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                timeout:
                  value:
                    success: false
                    error:
                      message: "Processing timeout"
                      code: "PROCESSING_TIMEOUT"
        '413':
          description: Downloaded image exceeds the 10 MB size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                tooLarge:
                  value:
                    success: false
                    error:
                      message: "Image exceeds the 10 MB size limit"
                      code: "PAYLOAD_TOO_LARGE"
        '422':
          description: |
            Unprocessable request. Sub-cases:
            - `INVALID_URL`: URL scheme is not http/https, or the URL resolves to a
              private/loopback address (SSRF guard).
            - `FETCH_FAILED`: network error, DNS failure, or non-2xx HTTP response when
              downloading the image.
            - `INVALID_IMAGE`: response Content-Type is not image/* or application/octet-stream,
              OR the buffer's magic bytes are neither JPEG (FFD8FF) nor PNG (89504E47).
            - `OCR_FAILED`: Tesseract.js threw an unrecoverable error during OCR processing.
            - `NO_NUTRITIONAL_DATA_FOUND`: OCR returned text but `parseNutritionTable` found
              zero parseable dishes, or all parsed rows failed normalization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidUrl:
                  summary: Non-http/https scheme or private IP
                  value:
                    success: false
                    error:
                      message: "URL must use http or https scheme and must not target a private address"
                      code: "INVALID_URL"
                fetchFailed:
                  summary: Network or HTTP error during image download
                  value:
                    success: false
                    error:
                      message: "Failed to download image: HTTP 404"
                      code: "FETCH_FAILED"
                invalidImage:
                  summary: URL did not return a supported image format
                  value:
                    success: false
                    error:
                      message: "Downloaded file is not a valid image (expected JPEG or PNG)"
                      code: "INVALID_IMAGE"
                ocrFailed:
                  summary: Tesseract.js threw an unrecoverable error
                  value:
                    success: false
                    error:
                      message: "OCR extraction failed: Worker terminated unexpectedly"
                      code: "OCR_FAILED"
                noData:
                  summary: No nutritional data found after OCR
                  value:
                    success: false
                    error:
                      message: "No nutritional data could be parsed from this image"
                      code: "NO_NUTRITIONAL_DATA_FOUND"
        '401':
          description: Missing or invalid admin API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Admin API key required"
                  code: "UNAUTHORIZED"
        '500':
          description: Database error during upsert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbError:
                  value:
                    success: false
                    error:
                      message: "Database write failed"
                      code: "DB_UNAVAILABLE"

  /ingest/image:
    post:
      summary: Ingest nutritional data from a direct image upload (OCR)
      description: |
        Accepts a multipart/form-data upload of a JPEG or PNG image containing a
        nutritional table, runs OCR via Tesseract.js (languages: spa+eng), and
        pipes the extracted text lines through the existing pipeline:
        optional `chainTextPreprocessor` → `parseNutritionTable` →
        `normalizeNutrients` / `normalizeDish` → Prisma `$transaction` upsert.

        This is the multipart counterpart to `POST /ingest/image-url`. It is
        intended for Telegram bot uploads, where the bot downloads the file
        from Telegram servers into an in-process Buffer and then forwards it
        to the API as multipart (keeping the Telegram bot token strictly inside
        the bot process).

        - Supported image formats: JPEG (magic bytes FFD8FF), PNG (magic bytes 89504E47).
        - File field name in the multipart body must be `file`.
        - `restaurantId`, `sourceId`, `dryRun`, and `chainSlug` are sent as
          additional multipart text fields (same pattern as `POST /ingest/pdf`).
        - `dryRun` is a string field (`"true"` / `"false"`) because multipart
          form-data does not have a native boolean type.
        - The `sourceId` for Telegram-originated uploads should be
          `00000000-0000-0000-0000-000000000099` (seeded "Telegram Upload" DataSource).
        - Partial success (some dishes skipped) returns HTTP 200. Only total failure
          (zero parseable dishes after OCR) returns HTTP 422.
        - Size limit: 10 MB (enforced by `@fastify/multipart` plugin limit in app.ts).
        - Total pipeline timeout: 60 seconds (same as `POST /ingest/image-url`).
        - Magic bytes are validated AFTER reading the buffer from the multipart
          stream — unsupported formats return 422 INVALID_IMAGE.
      operationId: ingestImage
      tags:
        - Ingestion
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - restaurantId
                - sourceId
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    JPEG or PNG image file containing a nutritional table.
                    Maximum size: 10 MB. Magic bytes are validated after upload.
                restaurantId:
                  type: string
                  format: uuid
                  description: UUID of the Restaurant row this data belongs to.
                  example: "00000000-0000-0000-0006-000000000001"
                sourceId:
                  type: string
                  format: uuid
                  description: |
                    UUID of the DataSource row representing this image's origin.
                    For Telegram bot uploads, use `00000000-0000-0000-0000-000000000099`
                    (the seeded "Telegram Upload" DataSource).
                  example: "00000000-0000-0000-0000-000000000099"
                dryRun:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: |
                    When "true", runs OCR, extraction, and normalization but skips
                    all DB writes. The response still contains the full `dishes`
                    array for inspection.
                chainSlug:
                  type: string
                  pattern: "^[a-z0-9-]+$"
                  minLength: 1
                  maxLength: 100
                  description: |
                    Optional chain identifier (e.g. "dominos-es"). When provided,
                    applies chain-specific text preprocessing to the OCR-extracted
                    lines before parsing. When omitted, no preprocessing is applied.
                  example: "dominos-es"
      responses:
        '200':
          description: |
            Ingestion successful (or dryRun completed). At least one dish was parsed
            and upserted (or would be upserted in dryRun mode). Partial success
            (some dishes skipped) also returns 200 — see `dishesSkipped` and
            `skippedReasons` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestImageResponse'
              examples:
                success:
                  summary: 8 dishes upserted, 1 skipped
                  value:
                    success: true
                    data:
                      dishesFound: 9
                      dishesUpserted: 8
                      dishesSkipped: 1
                      dryRun: false
                      dishes:
                        - name: "Pizza Pepperoni"
                          nameEs: "Pizza Pepperoni"
                          nutrients:
                            calories: 265
                            proteins: 12
                            carbohydrates: 29
                            fats: 11
                            saturatedFats: 5
                            sugars: 3
                            fiber: 1.5
                            salt: 1.2
                            sodium: 480
                            transFats: 0
                            cholesterol: 30
                            potassium: 0
                            monounsaturatedFats: 0
                            polyunsaturatedFats: 0
                            referenceBasis: "per_serving"
                          confidenceLevel: "medium"
                          estimationMethod: "scraped"
                          availability: "available"
                          restaurantId: "00000000-0000-0000-0006-000000000001"
                          sourceId: "00000000-0000-0000-0000-000000000099"
                      skippedReasons:
                        - dishName: "Bebida"
                          reason: "Missing required field: proteins"
                dryRun:
                  summary: dryRun=true — no DB writes
                  value:
                    success: true
                    data:
                      dishesFound: 5
                      dishesUpserted: 0
                      dishesSkipped: 0
                      dryRun: true
                      dishes: []
                      skippedReasons: []
        '400':
          description: Validation error (missing fields, invalid UUID format, file missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                fileMissing:
                  summary: No file part in multipart body
                  value:
                    success: false
                    error:
                      message: "No file uploaded"
                      code: "VALIDATION_ERROR"
                missingRestaurantId:
                  summary: restaurantId missing
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["restaurantId"]
                          message: "Required"
                          code: "invalid_type"
                invalidUuid:
                  summary: sourceId is not a valid UUID
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["sourceId"]
                          message: "Invalid uuid"
                          code: "invalid_string"
        '401':
          description: Missing or invalid admin API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Admin API key required"
                  code: "UNAUTHORIZED"
        '404':
          description: restaurantId or sourceId not found in the database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                restaurantNotFound:
                  summary: Restaurant row does not exist
                  value:
                    success: false
                    error:
                      message: "Restaurant not found"
                      code: "NOT_FOUND"
                sourceNotFound:
                  summary: DataSource row does not exist
                  value:
                    success: false
                    error:
                      message: "Data source not found"
                      code: "NOT_FOUND"
        '408':
          description: Image OCR + processing exceeded the 60-second timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                timeout:
                  value:
                    success: false
                    error:
                      message: "Processing timeout"
                      code: "PROCESSING_TIMEOUT"
        '413':
          description: Uploaded image exceeds the 10 MB size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                tooLarge:
                  value:
                    success: false
                    error:
                      message: "File size exceeds the 10 MB limit"
                      code: "PAYLOAD_TOO_LARGE"
        '422':
          description: |
            Unprocessable image. One of three sub-cases:
            - `INVALID_IMAGE`: uploaded file is not a valid JPEG or PNG (magic bytes mismatch).
            - `OCR_FAILED`: Tesseract.js could not extract text from the image.
            - `NO_NUTRITIONAL_DATA_FOUND`: OCR succeeded but no parseable nutritional
              table was found, or all parsed rows failed normalization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidImage:
                  summary: Not a JPEG or PNG
                  value:
                    success: false
                    error:
                      message: "Uploaded file is not a valid image (not JPEG or PNG)"
                      code: "INVALID_IMAGE"
                ocrFailed:
                  summary: Tesseract OCR failure
                  value:
                    success: false
                    error:
                      message: "OCR failed to extract text from image"
                      code: "OCR_FAILED"
                noData:
                  summary: No nutritional data found
                  value:
                    success: false
                    error:
                      message: "No nutritional data found in image"
                      code: "NO_NUTRITIONAL_DATA_FOUND"
        '500':
          description: Database error during upsert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dbError:
                  value:
                    success: false
                    error:
                      message: "Database write failed"
                      code: "DB_UNAVAILABLE"

  /quality/report:
    get:
      summary: Data quality report
      description: |
        Runs all data quality checks against the current database state and returns
        a structured report. Checks are grouped into six dimensions:

        1. **Nutrient completeness** — dishes missing core macros (calories, proteins,
           carbohydrates, fats) in their DishNutrient row. Reported globally and per chain.
        2. **Implausible values** — DishNutrient rows where calories > 5000 kcal (soft
           threshold for a single dish, above the DB CHECK constraint of 9000), any
           nutrient column (proteins, carbs, fats, saturatedFats, fiber, salt, sodium)
           has a value of exactly 0 across ALL macros simultaneously (ghost rows), or
           where the caloric value is a suspiciously round number (divisible by 100,
           ≥ 100 kcal) — reported as a warning, not an error.
        3. **Data gaps** — dishes with no DishNutrient row at all, restaurants with zero
           dishes, and dishes where portionGrams IS NULL or priceEur IS NULL (reported
           as coverage metrics, not errors).
        4. **Duplicates** — dishes sharing identical (name, restaurantId, sourceId)
           triples. Reports duplicate group count and total duplicate dish count.
        5. **Confidence distribution** — breakdown of dish count by confidence level
           (high / medium / low) and estimation method (official / ingredients /
           extrapolation / scraped), both globally and per chain.
        6. **Data freshness** — DataSource rows where lastUpdated IS NULL or is older
           than the staleness threshold (default 90 days). The threshold is configurable
           via the optional `stalenessThresholdDays` query parameter.

        All checks run against live DB state via Prisma. No writes are performed.
        The report always returns HTTP 200 — a 500 is only returned for DB failure.

        This endpoint is intended to be called by the CLI script
        `packages/api/src/scripts/quality-monitor.ts`, which also produces a Markdown
        report. Both CLI and API share the same check functions from
        `packages/api/src/quality/`.
      operationId: getQualityReport
      tags:
        - Quality
      security:
        - AdminKeyAuth: []
      parameters:
        - name: stalenessThresholdDays
          in: query
          required: false
          description: |
            Number of days after which a DataSource.lastUpdated is considered stale.
            Must be a positive integer. Defaults to 90 if omitted.
          schema:
            type: integer
            minimum: 1
            default: 90
            example: 90
        - name: chainSlug
          in: query
          required: false
          description: |
            When provided, scopes the report to a single chain (matched against
            Restaurant.chainSlug). When omitted, the report covers all chains.
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
            minLength: 1
            maxLength: 100
            example: "mcdonalds-es"
      responses:
        '200':
          description: |
            Quality report generated successfully. Always returns HTTP 200 if the DB
            is reachable, even when quality issues are found — issues are surfaced in
            the report body, not as HTTP error codes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityReportResponse'
              examples:
                full:
                  summary: Global report across all 7 chains
                  value:
                    success: true
