                        type: array
                        items:
                          $ref: '#/components/schemas/MissedQueryTracking'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /analytics/missed-queries/{id}/status:
    post:
      summary: Update missed query tracking status
      description: |
        Updates the status of a tracked missed query (pending -> resolved/ignored).
        Optionally links to the dish that was added. Admin-only (F079).
      operationId: updateMissedQueryStatus
      tags:
        - Analytics
      security:
