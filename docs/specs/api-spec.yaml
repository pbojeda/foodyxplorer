  /reverse-search:
    get:
      summary: "F086: Reverse search — find dishes within calorie/protein constraints"
      description: |
        Given a chain, calorie budget, and optional protein minimum, returns
        dishes that fit the constraints sorted by protein density (proteins/calories) descending.
        Only `available` dishes with `per_serving` reference basis are included.
      operationId: reverseSearch
      tags:
        - Estimation
      parameters:
        - name: chainSlug
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
          description: Chain slug to search within
        - name: maxCalories
          in: query
          required: true
          schema:
            type: number
            minimum: 100
            maximum: 3000
          description: Maximum calorie budget
        - name: minProtein
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            maximum: 200
          description: Minimum protein requirement in grams
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          description: Maximum number of results to return
      responses:
        "200":
          description: Matching dishes (may be empty)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "#/components/schemas/ReverseSearchData"
        "400":
          description: Invalid query parameters
        "404":
          description: Chain not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [false]
                  code:
                    type: string
                    enum: [CHAIN_NOT_FOUND]
                  message:
                    type: string

  /estimate:
    get:
      summary: Estimation Engine — L1 (official) + L2 (ingredients) + L3 (similarity) + L4 (LLM identification)
      description: |
        Queries the database for nutritional data matching the given dish or food name.
        Implements the full four-level cascade (F020 + F021 + F022 + F024) defined in ADR-001,
        routed through the `engineRouter` module (F023). The route handler is a thin shell:
        cache check → `runEstimationCascade()` → cache write → response.
        Every call is logged asynchronously to query_logs (fire-and-forget — never affects response timing or status).

        **Level 1 — Official Data Lookup (F020)**
        Highest-confidence tier. Tries four strategies in priority order against the
        official nutritional database:
        1. Exact name match on `dishes.name` (case-insensitive), scoped to chain/restaurant
        2. FTS match on `dishes.name_es` (Spanish, primary) / `dishes.name` (English, fallback)
        3. Exact name match on `foods.name_es` or `foods.name` (chain-agnostic USDA foods)
        4. FTS match on `foods.name_es` / `foods.name`

        Level 1 result: `level1Hit: true`, `confidenceLevel: "high"`,
        `estimationMethod: "official"`. Level 2 and 3 are not attempted.

        **Level 2 — Ingredient-Based Estimation (F021)**
        Attempted only when Level 1 returns no match. Decomposes the queried dish into its
        `dish_ingredients`, looks up each linked food's nutritional data from `food_nutrients`
        (only rows with `referenceBasis = "per_100g"`), and aggregates:

        ```
        nutrient_total = SUM( food_nutrient_per_100g[i] * gramWeight[i] / 100 )
        ```

        Two strategies in priority order:
        1. `ingredient_dish_exact` — case-insensitive exact match on `dishes.name`, dish must
           have ≥1 resolvable ingredient
        2. `ingredient_dish_fts` — FTS match on `dishes.name_es` (Spanish) / `dishes.name`
           (English), dish must have ≥1 resolvable ingredient

        Level 2 result: `level2Hit: true`, `confidenceLevel: "medium"` (all ingredients
        resolved) or `"low"` (some unresolved), `estimationMethod: "ingredients"`,
        `source.type: "estimated"`, `source.name: "Computed from ingredients"`,
        `nutrients.referenceBasis: "per_serving"`.

        **Level 3 — Similarity Extrapolation (F022)**
        Attempted only when both Level 1 and Level 2 return no match. Generates an embedding
        vector for the query text by calling OpenAI (`text-embedding-3-small`, 1536 dims) at
        request time, then uses pgvector cosine distance (`<->` operator) to find the nearest
        neighbour in `dishes.embedding` (scoped by `chainSlug`/`restaurantId` when provided)
        and in `foods.embedding` (always global). Dishes are searched first; foods are the
        fallback.

        A match is only returned when the cosine distance is below the configured threshold
        (default: 0.5). If no match is below the threshold in either table, the response is a
        total miss.

        Level 3 result: `level3Hit: true`, `confidenceLevel: "low"`,
        `estimationMethod: "extrapolation"`, `matchType: "similarity_dish"` or
        `"similarity_food"`, `source` taken from the matched entity's data source row.

        **Level 3 skip conditions (fail-gracefully):**
        - `OPENAI_API_KEY` is not configured → Level 3 is silently skipped; response is a
          total miss (`level1Hit: false, level2Hit: false, level3Hit: false`).
        - OpenAI API call fails after retries → Level 3 is silently skipped; same total-miss
          response. The error is logged at `warn` level.
        - Neither dishes nor foods have any embeddings → no rows within threshold; total miss.

        **Level 4 — LLM Identification (F024)**
        Attempted only when Levels 1, 2, and 3 all miss. Calls the OpenAI Chat Completions
        API (not embeddings) to identify the food entity described by the query. The LLM
        NEVER calculates nutritional values (ADR-001). Two strategies, attempted in order:

        **Strategy A — LLM food match (`llm_food_match`):**
        The LLM receives a structured prompt listing candidate foods from the DB (top-10
        candidates by `pg_trgm` trigram similarity — NOT FTS, which already failed in L1)
        and is asked to identify the single best matching food by name. The identified food's
        UUID is then looked up in `food_nutrients` to retrieve official DB nutrients.
        The LLM acts as a semantic search layer; the DB
        is the authoritative source of nutrition data.

        **Strategy B — LLM ingredient decomposition (`llm_ingredient_decomposition`):**
        If Strategy A returns no confident match, the LLM decomposes the queried dish into
        a list of known ingredient names and approximate gram weights. Each ingredient name
        is then resolved via an L1-style exact/FTS lookup against `foods`. Resolved ingredients
        are aggregated with the same arithmetic as Level 2:
        `nutrient_total = SUM( food_nutrient_per_100g[i] * gramWeight[i] / 100 )`.
        Unresolved ingredients are counted; confidence is `"medium"` if all resolved,
        `"low"` if any unresolved.

        Both strategies use `chat.completions.create` with `OPENAI_CHAT_MODEL` (default:
        `gpt-4o-mini`). Responses are cached in Redis under the same unified key as all
        other levels. The LLM prompt includes only DB entity names (never raw nutritional
        values), so the LLM cannot fabricate nutrient figures.

        Level 4 result: `level4Hit: true`, `estimationMethod: "llm"`, `confidenceLevel:
        "medium"` (Strategy A full match or Strategy B all-resolved) or `"low"` (Strategy B
        partial). `source.type: "estimated"`, `source.name: "LLM-assisted identification"`.

        **Level 4 skip conditions (fail-gracefully):**
        - `OPENAI_API_KEY` is not configured → Level 4 silently skipped; total miss.
        - `OPENAI_CHAT_MODEL` is not configured → Level 4 silently skipped; total miss.
        - OpenAI API call fails after retries → Level 4 silently skipped; error logged at
          `warn` level; total miss.
        - LLM response cannot be parsed into a valid entity reference → skipped; total miss.
        - LLM returns a name that does not resolve to any DB entity → skipped; total miss.

        **Cost control:**
        - LLM call results are cached in Redis (same unified key, TTL 300 s).
        - Max prompt tokens controlled by `OPENAI_CHAT_MAX_TOKENS` (default: 512).
        - Temperature fixed at 0 (deterministic output; no creative hallucination).
        - Target: <0.05 EUR per uncached query. Monitored via logged `usage.total_tokens`.

        **Latency note:** Level 3 adds ~200–500 ms due to the OpenAI embedding call. Level 4
        adds ~500–1500 ms for the chat completion call. Both are only reached on a cache miss
        and when lower levels also miss. The response is cached after any level executes, so
        repeated queries benefit from the cache.

        **Scope:** `chainSlug` / `restaurantId` scoping applies to dish strategies at all
        four levels. Food strategies (Level 1 strategies 3–4, Level 3 food similarity,
        Level 4 Strategy A) are always global. If `restaurantId` is provided with `chainSlug`,
        `restaurantId` takes precedence.

        **Cache:** Unified cache key `fxp:estimate:<query>:<chainSlug>:<restaurantId>`. Stores
        the final response regardless of which level produced it (L1 hit, L2 hit, L3 hit, or
        total miss). TTL = 300 seconds, fail-open. The `cachedAt` field is non-null when data
        came from cache.

        **Miss semantics:** A complete miss (no match at any level) returns HTTP 200 with
        `level1Hit: false`, `level2Hit: false`, `level3Hit: false`, `level4Hit: false`,
        and `result: null`. This is NOT a 404.

        **Auth:** No auth required (Phase 1 — internal use). API key auth added in F026.

        **Rate limiting (F026):** Anonymous: 30 req/15min/IP. Free key: 100/15min. Pro key: 1000/15min.
      operationId: estimateAllLevels
      tags:
        - Estimation
      security:
        - {}
        - ApiKeyAuth: []
      parameters:
        - name: query
          in: query
          required: true
          description: |
            The dish or food name to look up. Trimmed, whitespace-collapsed, and
            lowercased before matching. Passed to `plainto_tsquery` for FTS strategies
            (prevents injection of FTS operators).
          schema:
            type: string
            minLength: 1
            maxLength: 255
            example: "Big Mac"
        - name: chainSlug
          in: query
          required: false
          description: |
            Scope dish search to a single restaurant chain. Must match a value in the
            `restaurants.chain_slug` column (e.g. "mcdonalds-es", "burger-king-es").
            If `restaurantId` is also provided, this parameter is ignored for scoping
            (but is echoed back in the response).
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
            minLength: 1
            maxLength: 100
            example: "mcdonalds-es"
        - name: restaurantId
          in: query
          required: false
          description: |
            Scope dish search to a specific restaurant row (UUID). Takes precedence over
            `chainSlug` when both are provided.
          schema:
            type: string
            format: uuid
            example: "00000000-0000-0000-0001-000000000001"
        - name: portionMultiplier
          in: query
          required: false
          description: |
            Portion size multiplier applied to all nutrient values and `portionGrams`
            **after** the cascade resolves the base dish or food (F042). The query text
            supplied must NOT contain size modifiers — the bot strips them before calling
            (see `extractPortionModifier` in `packages/bot/src/lib/portionModifier.ts`).

            Applied as: `result.nutrients.* = base_value * portionMultiplier` and
            `result.portionGrams = base_portionGrams * portionMultiplier` (when non-null).
            When multiplier ≠ 1.0, `referenceBasis` is set to `per_serving` regardless of
            the original value.

            The multiplier is applied **uniformly** to all `matchType` values, including
            `llm_ingredient_decomposition`. The bot strips size modifiers before calling,
            so L4 never sees them in the query text. Callers are responsible for stripping
            modifiers from the query when using this parameter.

            **Cache key:** the effective multiplier is included as a segment in the Redis
            cache key (`fxp:estimate:<query>:<chainSlug>:<restaurantId>:<multiplier>`),
            so results for different multipliers are cached independently.

            When absent, the default effective multiplier is 1.0 (no scaling).
            The response always includes `data.portionMultiplier` echoing the effective value.
          schema:
            type: number
            format: float
            minimum: 0.1
            maximum: 5.0
            example: 1.5
        - name: cookingState
          in: query
          required: false
          description: |
            Declares whether the queried quantity refers to raw (pre-cooking) or cooked
            (post-cooking) food weight (F072). Only applied when the resolved entity is
            a generic `Food` (not a restaurant dish — dishes are always `as_served`).

            - `raw`: reported weight is pre-cooking. DB nutrients (per-100g USDA/BEDCA)
              apply directly without yield correction.
            - `cooked`: reported weight is post-cooking. Engine derives corrected raw weight
              as `reportedGrams / yieldFactor` before applying nutrient lookup.
            - `as_served`: no yield correction — treat reported weight as final serving.

            When omitted, default assumptions apply based on the resolved food's `foodGroup`:
            - `grains`, `legumes`, `pasta` → `cooked`
            - `meat`, `fish` → `raw`
            - `vegetables` → `raw`
            - composite / unknown → `as_served`

            Not applicable when the match is a restaurant dish (matchType contains "dish").
            The response's `yieldAdjustment` block documents whether correction was applied.

            **Cache key:** the effective `cookingState` value is included as a segment in the
            Redis cache key, so corrections for different states are cached independently.
          schema:
            $ref: '#/components/schemas/CookingState'
      responses:
        '200':
          description: |
            Query completed successfully. Always HTTP 200 whether or not a match was found.
            - `level1Hit: true`  — official data found; `result` contains nutrients + source.
              All other level flags are false (lower levels not attempted).
            - `level2Hit: true`  — Level 1 missed; Level 2 found ingredients to aggregate.
              `result` contains computed nutrients. All other level flags are false.
            - `level3Hit: true`  — Levels 1 and 2 both missed; Level 3 found a similar entity
              via pgvector cosine similarity. `result` contains the similar entity's nutrients.
              `level1Hit`, `level2Hit`, and `level4Hit` are false.
            - `level4Hit: true`  — Levels 1, 2, and 3 all missed; Level 4 (LLM identification)
              resolved the query to a known DB entity. `result` contains DB nutrients.
              `level1Hit`, `level2Hit`, and `level3Hit` are false.
            - All four false    — no match at any level; `result` is null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstimateResponse'
              examples:
                exactDishHit:
                  summary: Exact dish match — McDonald's Big Mac (Level 1 hit)
                  value:
                    success: true
                    data:
                      query: "Big Mac"
                      chainSlug: "mcdonalds-es"
                      portionMultiplier: 1.0
                      level1Hit: true
                      level2Hit: false
                      level3Hit: false
                      level4Hit: false
                      matchType: "exact_dish"
                      result:
                        entityType: "dish"
                        entityId: "uuid-of-dish"
                        name: "Big Mac"
                        nameEs: "Big Mac"
                        restaurantId: "uuid-of-restaurant"
                        chainSlug: "mcdonalds-es"
                        portionGrams: 200
                        nutrients:
                          calories: 550
