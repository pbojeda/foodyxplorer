  /waitlist:
    post:
      summary: Register a waitlist lead
      description: |
        Persists a waitlist submission. Public endpoint — no API key required.

        - Per-route rate limit: 5 requests per 15 minutes per IP.
        - Anti-spam honeypot: `honeypot` field must be empty. Non-empty returns 400.
        - Duplicate email returns 409 with the existing record (idempotent).
        - Accepts both `application/json` and `application/x-www-form-urlencoded`.
        - Form POSTs (non-JS) redirect via 303 to `/?waitlist=success`.
      operationId: createWaitlistSubmission
      tags:
        - Waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, variant, source]
              properties:
                email:
