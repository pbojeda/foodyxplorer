                    $ref: '#/components/schemas/MissedQueryTracking'
        '404':
          description: Tracking entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # F113 — Web Metrics Receiver
  # ---------------------------------------------------------------------------

  /analytics/web-events:
    post:
      summary: Receive web assistant session metrics
      description: |
        Receives a MetricsSnapshot payload from the /hablar web assistant via
        navigator.sendBeacon on page unload (F112, ADR-018). No authentication
        required — sendBeacon cannot set custom headers. Protected by a dedicated
        per-IP rate limit (10 req/min/IP) applied at the route level.

        Accepts both application/json and text/plain content types. sendBeacon
        with a plain string body sends text/plain;charset=UTF-8 — the route
        handler JSON-parses the raw body string before Zod validation when
        Content-Type is text/plain.

        Always returns 202 Accepted with { "success": true }. If the DB insert
        fails, the error is logged server-side but the 202 is still returned
        (fire-and-forget: client ignores the response body).

        Stores one row per beacon event in web_metrics_events (Prisma). The IP
        is stored as SHA-256(request.ip) for privacy-preserving deduplication.
        No PII is stored — no query text, no actorId (ADR-018).
      operationId: receiveWebMetrics
      tags:
        - Analytics
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebMetricsSnapshot'
            example:
              queryCount: 5
              successCount: 4
              errorCount: 1
              retryCount: 0
              intents:
                nutritional_query: 3
                comparison: 1
              errors:
                NETWORK_ERROR: 1
              avgResponseTimeMs: 1200
              sessionStartedAt: "2026-04-08T10:00:00.000Z"
          text/plain:
            schema:
              type: string
              description: |
                JSON-encoded WebMetricsSnapshot sent by navigator.sendBeacon.
                The server parses this as JSON and validates against
                WebMetricsSnapshot before storing.
            example: '{"queryCount":5,"successCount":4,"errorCount":1,"retryCount":0,"intents":{"nutritional_query":3},"errors":{},"avgResponseTimeMs":1200,"sessionStartedAt":"2026-04-08T10:00:00.000Z"}'
      responses:
        '202':
          description: Metrics accepted for storage (fire-and-forget).
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
                    enum: [true]
              example:
                success: true
        '400':
          description: |
            Payload is not valid JSON, fails schema validation, or violates
            cross-field constraints (e.g. successCount > queryCount,
            sessionStartedAt older than 24h or in the future).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
        '429':
          description: |
            Per-IP rate limit exceeded (10 req/min/IP). Fail-open when Redis
            is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Too many requests, please try again later."
                  code: "RATE_LIMIT_EXCEEDED"

    get:
      summary: Aggregate web assistant session metrics
      description: |
        Aggregates web_metrics_events rows into summary statistics for admin
        visibility. Returns event count, total/success/error/retry counts,
        average response time, top intents, and top errors. All values are
        summed across rows in the selected time window (not averaged per row).
        avgResponseTimeMs is the weighted mean: sum(avgResponseTimeMs *
        successCount) / sum(successCount) across all rows. Returns null when
        no rows with successCount > 0 exist in the window.
        Admin-only (F113).
      operationId: getWebMetricsAnalytics
      tags:
        - Analytics
      security:
        - AdminKeyAuth: []
      parameters:
        - name: timeRange
          in: query
          required: false
          schema:
            type: string
            enum: [24h, 7d, 30d, all]
            default: 7d
          description: Time window to scope the aggregation. 'all' applies no time filter.
      responses:
        '200':
          description: Web metrics aggregation successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebMetricsAggregateResponse'
              example:
                success: true
                data:
                  eventCount: 42
                  totalQueries: 310
                  totalSuccesses: 285
                  totalErrors: 25
                  totalRetries: 8
                  avgResponseTimeMs: 980.5
                  topIntents:
                    - intent: nutritional_query
                      count: 180
                    - intent: comparison
                      count: 75
                  topErrors:
                    - errorCode: NETWORK_ERROR
                      count: 15
                    - errorCode: TIMEOUT
                      count: 10
                  timeRange: 7d
        '401':
          description: Missing or invalid admin API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Unauthorized"
                  code: "UNAUTHORIZED"
        '500':
          description: Database unavailable during aggregation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Database query failed during web metrics aggregation"
                  code: "DB_UNAVAILABLE"

  /restaurants:
    get:
      summary: List restaurants
      description: |
        Returns a paginated list of restaurants with optional filters. Each item includes
        a `dishCount` (total dishes for that restaurant). Responses are cached for 60s.

        When `q` is provided, the list is filtered by trigram similarity on `restaurants.name`
        using the pg_trgm `%` operator (threshold ≥ 0.15). The `q` filter is implemented
        via Kysely (not Prisma) and is combined with any other active filters (countryCode,
        chainSlug, isActive). When `q` is omitted the behaviour is unchanged from F025
        (Prisma-based filter + sort by name ASC).
      operationId: listRestaurants
      tags:
        - Catalog
      security:
        - {}            # Anonymous allowed (30 req/15min/IP)
        - ApiKeyAuth: [] # Free: 100/15min, Pro: 1000/15min
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
          description: |
            Trigram similarity search on restaurant name (pg_trgm, threshold ≥ 0.15).
            Case-insensitive. Used by the bot's /restaurante command to resolve a user-typed
            name to a restaurant UUID. When omitted the full filtered list is returned.
            When provided, results are ordered by trigram similarity score descending.
        - name: countryCode
          in: query
          required: false
          schema:
            type: string
            pattern: '^[A-Z]{2}$'
          description: Filter by 2-letter uppercase country code (e.g. ES, FR).
        - name: chainSlug
          in: query
          required: false
          schema:
            type: string
            pattern: '^[a-z0-9-]+$'
            maxLength: 100
          description: Filter by chain slug (e.g. mcdonalds-es).
        - name: isActive
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by active status. Omit to return both active and inactive.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated list of restaurants.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required: [items, pagination]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/RestaurantListItem'
                      pagination:
                        $ref: '#/components/schemas/PaginationMeta'
        '400':
          description: Validation error (invalid query parameter).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
        '401':
          description: |
            API key was provided but is invalid (not found or expired).
            Only returned when a key is actively supplied — anonymous requests are not rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Invalid or expired API key"
                  code: "UNAUTHORIZED"
        '403':
          description: API key was provided and found, but has been revoked (is_active = false).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "API key has been revoked"
                  code: "FORBIDDEN"
        '500':
          description: Database unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Database query failed"
                  code: "DB_UNAVAILABLE"

    post:
      summary: Create a restaurant
      description: |
        Creates a new restaurant record. Admin-only endpoint (F032).

        **Chain vs Independent restaurants:**
        - **Chain restaurant** (e.g. a new McDonald's outlet): provide `chainSlug` matching
          an existing chain. The `@@unique([chainSlug, countryCode])` DB constraint applies —
          a duplicate (chainSlug, countryCode) pair is rejected with 409.
        - **Independent restaurant** (no chain affiliation): omit `chainSlug`. The server
          auto-generates a slug using the pattern `independent-<name-slugified>-<uuid-short>`
          (e.g. `independent-la-tasca-de-pepe-a3f2`). This slug is stored in `chainSlug` so
          the unique constraint remains satisfied. Independent restaurants are identifiable by
          the `independent-` prefix on their `chainSlug`.

        **New location fields (all optional, Phase 1 — manual entry only):**
        - `address` — free-text street address (max 500 chars).
        - `latitude` / `longitude` — decimal GPS coordinates (range ±90 / ±180).
        - `googleMapsUrl` — URL to the restaurant's Google Maps listing (Phase 2: bot will
          auto-fill from short link; Phase 1: caller provides the full URL or omits).

        **DataSource for bot-uploaded dishes:**
        A fixed "Telegram Upload" DataSource with UUID `00000000-0000-0000-0000-000000000099`
        is used when the bot creates a restaurant and subsequently uploads dishes via
        `POST /ingest/image`. This source is seeded in `seed.ts` (F032 migration).

        **Idempotency:** If a chain restaurant with the same (chainSlug, countryCode) already
        exists, returns 409 DUPLICATE_RESTAURANT. Does not upsert.
      operationId: createRestaurant
      tags:
        - Catalog
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRestaurantBody'
            examples:
              chainRestaurant:
                summary: New outlet of an existing chain
                value:
                  name: "McDonald's Paseo de Gracia"
                  nameEs: "McDonald's Paseo de Gracia"
                  chainSlug: "mcdonalds-es"
                  countryCode: "ES"
                  website: "https://www.mcdonalds.es"
                  address: "Paseo de Gracia, 40, 08007 Barcelona"
                  latitude: 41.3917
                  longitude: 2.1650
              independentRestaurant:
                summary: Independent restaurant (no chain — chainSlug auto-generated)
                value:
                  name: "La Tasca de Pepe"
                  countryCode: "ES"
                  address: "Calle Mayor, 12, 28013 Madrid"
      responses:
        '201':
          description: Restaurant created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRestaurantResponse'
              examples:
                chainCreated:
                  summary: Chain restaurant created
                  value:
                    success: true
                    data:
                      id: "00000000-0000-0000-0006-000000000020"
                      name: "McDonald's Paseo de Gracia"
                      nameEs: "McDonald's Paseo de Gracia"
                      chainSlug: "mcdonalds-es"
                      countryCode: "ES"
                      isActive: true
                      website: "https://www.mcdonalds.es"
                      logoUrl: null
                      address: "Paseo de Gracia, 40, 08007 Barcelona"
                      latitude: 41.3917
                      longitude: 2.1650
                      googleMapsUrl: null
                      createdAt: "2026-03-24T12:00:00.000Z"
                independentCreated:
                  summary: Independent restaurant created (auto-generated chainSlug)
                  value:
                    success: true
                    data:
                      id: "00000000-0000-0000-0006-000000000021"
                      name: "La Tasca de Pepe"
                      nameEs: null
                      chainSlug: "independent-la-tasca-de-pepe-a3f2"
                      countryCode: "ES"
                      isActive: true
                      website: null
                      logoUrl: null
                      address: "Calle Mayor, 12, 28013 Madrid"
                      latitude: null
                      longitude: null
                      googleMapsUrl: null
                      createdAt: "2026-03-24T12:00:00.000Z"
        '400':
          description: Validation error (missing required fields, invalid UUID, invalid coordinates, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingName:
                  summary: name field missing
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["name"]
                          message: "Required"
                          code: "invalid_type"
                invalidLatitude:
                  summary: latitude out of range
                  value:
                    success: false
                    error:
                      message: "Validation failed"
                      code: "VALIDATION_ERROR"
                      details:
                        - path: ["latitude"]
                          message: "Number must be greater than or equal to -90"
                          code: "too_small"
        '401':
          description: Missing or invalid admin API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Admin API key required"
                  code: "UNAUTHORIZED"
        '409':
          description: |
            A restaurant with the same (chainSlug, countryCode) already exists.
            Only possible when `chainSlug` is explicitly provided (chain restaurants).
            Independent restaurants cannot collide because their slug includes a UUID fragment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "A restaurant with this chainSlug and countryCode already exists"
                  code: "DUPLICATE_RESTAURANT"
        '500':
          description: Database error during insert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Database write failed"
                  code: "DB_UNAVAILABLE"

