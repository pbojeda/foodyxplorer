# ===========================================
# CI Pipeline — foodXPlorer (monorepo)
# ===========================================
# Separate jobs per package with path filters.
# - packages/shared changes trigger ALL jobs (shared dependency)
# - Root config changes (package.json, tsconfig, workflows) trigger ALL jobs
# - docs-only changes trigger NO jobs
# - Only test-api needs PostgreSQL + Redis services

name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  # Path filtering is handled at the job level by dorny/paths-filter.
  # The workflow always triggers so that the ci-success rollup job
  # reports a status even on docs-only PRs (all test jobs skip → rollup passes).
  # Previously, top-level path filters prevented the workflow from running
  # at all on docs-only changes, which deadlocked branch protection.

# ───────────────────────────────────────────
# Detect which packages changed
# ───────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      api: ${{ steps.filter.outputs.api }}
      bot: ${{ steps.filter.outputs.bot }}
      scraper: ${{ steps.filter.outputs.scraper }}
      landing: ${{ steps.filter.outputs.landing }}
      web: ${{ steps.filter.outputs.web }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'packages/shared/**'
            api:
              - 'packages/api/**'
            bot:
              - 'packages/bot/**'
            scraper:
              - 'packages/scraper/**'
            landing:
              - 'packages/landing/**'
            web:
              - 'packages/web/**'
            root:
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'eslint.config.mjs'
              - '**/.eslintrc*'
              - '.eslintignore'
              - '.github/workflows/**'

  # ───────────────────────────────────────────
  # Test shared
  # ───────────────────────────────────────────
  test-shared:
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared
        run: npm run build -w @foodxplorer/shared

      - name: Typecheck shared
        run: npm run typecheck -w @foodxplorer/shared

      - name: Lint shared
        run: npm run lint -w @foodxplorer/shared

      - name: Test shared
        run: npm run test -w @foodxplorer/shared

  # ───────────────────────────────────────────
  # Test API
  # Triggers: shared, api, scraper, or root changes
  # Needs PostgreSQL (pgvector) + Redis
  # ───────────────────────────────────────────
  test-api:
    needs: changes
    if: >-
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.scraper == 'true' ||
      needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: foodxplorer
          POSTGRES_PASSWORD: foodxplorer
          POSTGRES_DB: foodxplorer_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U foodxplorer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://foodxplorer:foodxplorer@localhost:5433/foodxplorer_dev
      DATABASE_URL_TEST: postgresql://foodxplorer:foodxplorer@localhost:5433/foodxplorer_test
      DIRECT_URL: postgresql://foodxplorer:foodxplorer@localhost:5433/foodxplorer_dev
      REDIS_URL: redis://localhost:6380

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Setup PostgreSQL extensions and test database
        env:
          PGPASSWORD: foodxplorer
        run: |
          psql -h localhost -p 5433 -U foodxplorer -d foodxplorer_dev \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm;"

          psql -h localhost -p 5433 -U foodxplorer -d postgres \
            -c "CREATE DATABASE foodxplorer_test OWNER foodxplorer;"

          psql -h localhost -p 5433 -U foodxplorer -d foodxplorer_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Run migrations (dev + test)
        run: |
          npx prisma migrate deploy --schema=packages/api/prisma/schema.prisma
          DATABASE_URL=$DATABASE_URL_TEST DIRECT_URL=$DATABASE_URL_TEST npx prisma migrate deploy --schema=packages/api/prisma/schema.prisma

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      - name: Build shared
        run: npm run build -w @foodxplorer/shared

      - name: Build scraper
        run: npm run build -w @foodxplorer/scraper

      - name: Typecheck API
        run: npm run typecheck -w @foodxplorer/api

      - name: Lint API
        run: npm run lint -w @foodxplorer/api || true

      - name: Test API
        run: npm run test -w @foodxplorer/api

  # ───────────────────────────────────────────
  # Test Bot
  # Triggers: shared, bot, or root changes
  # ───────────────────────────────────────────
  test-bot:
    needs: changes
    if: >-
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.bot == 'true' ||
      needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared
        run: npm run build -w @foodxplorer/shared

      - name: Typecheck bot
        run: npm run typecheck -w @foodxplorer/bot

      - name: Lint bot
        run: npm run lint -w @foodxplorer/bot

      - name: Test bot
        run: npm run test -w @foodxplorer/bot

  # ───────────────────────────────────────────
  # Test Scraper
  # Triggers: shared, scraper, or root changes
  # ───────────────────────────────────────────
  test-scraper:
    needs: changes
    if: >-
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.scraper == 'true' ||
      needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      - name: Build shared
        run: npm run build -w @foodxplorer/shared

      - name: Typecheck scraper
        run: npm run typecheck -w @foodxplorer/scraper

      - name: Test scraper
        run: npm run test -w @foodxplorer/scraper

  # ───────────────────────────────────────────
  # Test Landing
  # Triggers: landing or root changes
  # No DB/Redis needed — standalone Next.js package
  # ───────────────────────────────────────────
  test-landing:
    needs: changes
    if: >-
      needs.changes.outputs.landing == 'true' ||
      needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: cd packages/landing && npm ci

      - name: Typecheck landing
        run: cd packages/landing && npm run typecheck

      - name: Lint landing
        run: cd packages/landing && npm run lint

      - name: Test landing
        run: cd packages/landing && npm test

      - name: Build landing
        run: cd packages/landing && npm run build

  # ───────────────────────────────────────────
  # Test Web
  # Triggers: web, shared, or root changes
  # No DB/Redis needed — Next.js package (imports from shared)
  # ───────────────────────────────────────────
  test-web:
    needs: changes
    if: >-
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared
        run: npm run build -w @foodxplorer/shared

      - name: Typecheck web
        run: npm run typecheck -w @foodxplorer/web

      - name: Lint web
        run: npm run lint -w @foodxplorer/web

      - name: Test web
        run: npm run test -w @foodxplorer/web

      - name: Build web
        run: npm run build -w @foodxplorer/web

  # ───────────────────────────────────────────
  # CI Rollup — the ONLY required check in branch protection
  # ───────────────────────────────────────────
  # Passes when all jobs pass OR were skipped (docs-only PRs).
  # Fails if any job failed. Branch protection should require
  # ONLY this job, not the individual test-* jobs.
  # See: sdd-devflow template ci.yml "Scaling tips" comment.
  ci-success:
    runs-on: ubuntu-latest
    needs: [test-shared, test-api, test-bot, test-scraper, test-landing, test-web]
    if: always()
    steps:
      - name: All required jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All jobs passed or were skipped — CI green"
