# ===========================================
# CI Pipeline — nutriXplorer
# ===========================================
# Runs on pushes and PRs to develop and main branches.
# Tests run against local PostgreSQL (pgvector + pg_trgm) and Redis.

name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: foodxplorer
          POSTGRES_PASSWORD: foodxplorer
          POSTGRES_DB: foodxplorer_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U foodxplorer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://foodxplorer:foodxplorer@localhost:5433/foodxplorer_dev
      DATABASE_URL_TEST: postgresql://foodxplorer:foodxplorer@localhost:5433/foodxplorer_test
      DIRECT_URL: postgresql://foodxplorer:foodxplorer@localhost:5433/foodxplorer_dev
      REDIS_URL: redis://localhost:6380

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Setup PostgreSQL extensions and test database
        env:
          PGPASSWORD: foodxplorer
        run: |
          # Enable extensions on dev database
          psql -h localhost -p 5433 -U foodxplorer -d foodxplorer_dev \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm;"

          # Create test database
          psql -h localhost -p 5433 -U foodxplorer -d postgres \
            -c "CREATE DATABASE foodxplorer_test OWNER foodxplorer;" || true

          # Enable extensions on test database
          psql -h localhost -p 5433 -U foodxplorer -d foodxplorer_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm;" || true

      - name: Run migrations
        run: npx prisma migrate deploy --schema=packages/api/prisma/schema.prisma

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      - name: Build workspace dependencies
        run: npm run build -w @foodxplorer/shared

      - name: Typecheck
        run: npm run typecheck -w @foodxplorer/shared -w @foodxplorer/api -w @foodxplorer/bot

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
